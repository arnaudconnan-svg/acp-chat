<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Facilitat.io — Mon compte</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="color-scheme" content="light">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    @keyframes pageIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: white;
      font-family: Arial, sans-serif;
      color: #1a1a1a;
      animation: pageIn 0.68s ease 0.05s both;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 48px;
    }

    header {
      width: 100%;
      max-width: 520px;
      padding: 28px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    header img {
      height: 144px;
      width: auto;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn-link {
      font-size: 13px;
      color: #888;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
    }

    .btn-link:hover { color: #1a1a1a; }

    main {
      width: 100%;
      max-width: 520px;
      padding: 28px 24px 0;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 6px;
    }

    .user-email {
      font-size: 14px;
      color: #666;
      margin: 0 0 28px;
    }

    .card {
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 24px;
      background: #fff;
    }

    .section-title {
      font-size: 15px;
      font-weight: 600;
      margin: 0 0 14px;
      color: #333;
    }

    .field-group {
      margin-bottom: 14px;
    }

    .field-label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .setting-help {
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
      color: #555;
    }

    .import-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 12px 0;
    }

    .import-item {
      border: 1px solid #e3e3e3;
      border-radius: 10px;
      padding: 10px 12px;
      background: #fafafa;
    }

    .import-item label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
    }

    .import-item-main {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .import-item-title {
      font-size: 14px;
      color: #1f1f1f;
      line-height: 1.3;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .import-item-meta {
      font-size: 12px;
      color: #666;
      line-height: 1.3;
    }

    .import-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .import-actions .action-btn {
      width: auto;
      min-width: 130px;
      padding: 10px 14px;
      font-size: 14px;
    }

    .secondary-btn {
      border: 1.5px solid #d3d3d3;
      border-radius: 8px;
      background: #fff;
      color: #444;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 14px;
      cursor: pointer;
    }

    .secondary-btn:hover {
      background: #f5f5f5;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      color: #1a1a1a;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus,
    input[type="text"]:focus {
      border-color: #1a1a1a;
      background: #fff;
    }

    .password-field-wrap {
      position: relative;
    }

    .password-field-wrap input[type="password"],
    .password-field-wrap input[type="text"] {
      padding-right: 68px;
    }

    .toggle-password-btn {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      color: #777;
      font-size: 11px;
      cursor: pointer;
      padding: 4px 0;
      width: 50px;
      text-align: center;
      border-radius: 6px;
      line-height: 1.1;
    }

    .toggle-password-btn:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    .action-btn {
      width: 100%;
      padding: 12px;
      background: #b8c2c4;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: default;
      transition: background-color 0.15s ease;
    }

    .action-btn.is-ready {
      background: #245e66;
      cursor: pointer;
    }

    .action-btn:disabled {
      opacity: 1;
      cursor: default;
    }

    .notice {
      font-size: 13px;
      color: #c0392b;
      margin-top: 12px;
      min-height: 18px;
    }

    .notice.success {
      color: #245e66;
    }

    .empty-state, .loading-state, .error-notice {
      font-size: 14px;
      color: #aaa;
      text-align: center;
      padding: 24px 0;
    }

    .error-notice { color: #c0392b; }

    .upgrade-banner {
      border: 1.5px solid #245e66;
      border-radius: 12px;
      padding: 16px 20px;
      background: rgba(36, 94, 102, 0.06);
      margin-bottom: 24px;
    }

    .upgrade-banner p {
      margin: 0 0 12px;
      font-size: 14px;
      color: #245e66;
    }

    .upgrade-banner button {
      font-size: 13px;
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      background: #245e66;
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    .upgrade-banner button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <header>
    <img src="/images/logo.png" alt="Facilitat.io">
    <div class="header-actions">
      <button class="btn-link" id="logoutBtn" onclick="handleLogout()">Se déconnecter</button>
    </div>
  </header>

  <main id="mainContent">
    <div class="loading-state">Chargement…</div>
  </main>

  <script>
    (function () {
      "use strict";

      const USER_ID_KEY = "facilitatio_user_id";
      const CONVERSATIONS_INDEX_KEY = "facilitatio_conversations_index";
      const CONVERSATION_STORAGE_KEY_PREFIX = "facilitatio_conversation_data_";

      let currentUser = null;

      function navigateAway(url, options = {}) {
        document.body.style.animation = "none";
        document.body.style.transition = "opacity 0.32s ease, transform 0.32s ease";
        document.body.style.opacity = "0";
        document.body.style.transform = "translateY(10px)";
        setTimeout(() => {
          if (options.replace === true) {
            window.location.replace(url);
            return;
          }
          window.location.href = url;
        }, 320);
      }

      const accountHistoryState = history.state || {};
      if (accountHistoryState.__page !== "account" || accountHistoryState.__guard !== true) {
        history.replaceState({ __page: "account", __base: true }, "", window.location.href);
        history.pushState({ __page: "account", __guard: true }, "", window.location.href);
      }

      window.addEventListener("popstate", event => {
        const state = event.state || {};
        if (state.__page === "account" && state.__base === true) {
          navigateAway("/?screen=conversationsScreen", { replace: true });
        }
      });

      window.addEventListener("pageshow", () => {
        document.body.style.animation = "";
        document.body.style.transition = "";
        document.body.style.opacity = "";
        document.body.style.transform = "";
      });

      async function init() {
        try {
          const res = await fetch("/api/auth/session", { credentials: "include" });
          const data = await res.json().catch(() => ({}));

          if (!data || data.authenticated !== true) {
            navigateAway("/auth.html?next=/account.html");
            return;
          }

          currentUser = data.user || {};
          renderPage();
        } catch (_) {
          showError("Impossible de charger la session. Réessayez.");
        }
      }

      function renderPage() {
        const main = document.getElementById("mainContent");

        main.innerHTML = "";

        const h1 = document.createElement("h1");
        h1.textContent = "Mon compte";
        main.appendChild(h1);

        const emailEl = document.createElement("p");
        emailEl.className = "user-email";
        emailEl.textContent = String(currentUser.email || "");
        main.appendChild(emailEl);

        main.appendChild(buildPrivateDefaultCard());
        main.appendChild(buildLocalImportCard());
        main.appendChild(buildPasswordCard());
      }

      function getConversationStorageKey(conversationId) {
        return `${CONVERSATION_STORAGE_KEY_PREFIX}${conversationId}`;
      }

      function loadLocalConversationsForImport() {
        let index = [];

        try {
          const rawIndex = JSON.parse(localStorage.getItem(CONVERSATIONS_INDEX_KEY) || "[]");
          index = Array.isArray(rawIndex) ? rawIndex : [];
        } catch {
          index = [];
        }

        return index
          .map(item => {
            const id = String(item?.id || "").trim();
            if (!id) return null;

            let data = null;
            try {
              const rawData = localStorage.getItem(getConversationStorageKey(id));
              data = rawData ? JSON.parse(rawData) : null;
            } catch {
              data = null;
            }

            const messages = Array.isArray(data?.messages) ? data.messages : [];
            const titleFromIndex = typeof item?.title === "string" ? item.title.trim() : "";
            const fallbackTitle = messages.find(entry => entry && entry.role === "user" && typeof entry.content === "string")?.content?.slice(0, 60) || "Conversation sans titre";

            return {
              id,
              title: titleFromIndex || fallbackTitle,
              updatedAt: Number(item?.updatedAt || data?.updatedAt || Date.now()),
              isCustomTitle: item?.isCustomTitle === true,
              isPrivate: item?.isPrivate === true || data?.isPrivate === true,
              memory: typeof data?.memory === "string" ? data.memory : "",
              flags: data?.flags && typeof data.flags === "object" && !Array.isArray(data.flags) ? data.flags : {},
              messages
            };
          })
          .filter(Boolean)
          .sort((a, b) => Number(b.updatedAt || 0) - Number(a.updatedAt || 0));
      }

      function formatImportDate(timestamp) {
        const value = Number(timestamp || 0);
        if (!Number.isFinite(value) || value <= 0) return "date inconnue";

        try {
          return new Date(value).toLocaleString("fr-FR", {
            day: "2-digit",
            month: "2-digit",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit"
          });
        } catch {
          return "date inconnue";
        }
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function buildPrivateLockIcon() {
        return [
          '<svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" style="display:inline-block;vertical-align:middle;">',
          '  <path d="M6.5 11.2h11a1.5 1.5 0 0 1 1.5 1.5v5.8a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-5.8a1.5 1.5 0 0 1 1.5-1.5z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path>',
          '  <path d="M8.4 11.2V8.9a3.6 3.6 0 1 1 7.2 0v2.3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>',
          '</svg>'
        ].join("");
      }

      function buildLocalImportCard() {
        const card = document.createElement("div");
        card.className = "card";

        const title = document.createElement("div");
        title.className = "section-title";
        title.textContent = "Importer des conversations locales";
        card.appendChild(title);

        const help = document.createElement("p");
        help.className = "setting-help";
        help.textContent = "Ces conversations sont detectees uniquement sur cet appareil. Les conversations privees locales sont indiquees par un cadenas.";
        card.appendChild(help);

        const list = document.createElement("div");
        list.className = "import-list";
        list.id = "localImportList";
        card.appendChild(list);

        const actions = document.createElement("div");
        actions.className = "import-actions";

        const refreshBtn = document.createElement("button");
        refreshBtn.type = "button";
        refreshBtn.className = "secondary-btn";
        refreshBtn.textContent = "Rafraichir";

        const importBtn = document.createElement("button");
        importBtn.type = "button";
        importBtn.className = "action-btn";
        importBtn.textContent = "Importer la selection";
        importBtn.disabled = true;

        actions.appendChild(refreshBtn);
        actions.appendChild(importBtn);
        card.appendChild(actions);

        const notice = document.createElement("div");
        notice.className = "notice";
        notice.id = "localImportNotice";
        card.appendChild(notice);

        let localItems = [];
        let remoteOwnedIds = new Set();

        const syncRemoteOwnedConversationIds = async () => {
          try {
            const res = await fetch("/api/account/conversations", {
              method: "GET",
              credentials: "include",
              cache: "no-store"
            });

            if (!res.ok) {
              remoteOwnedIds = new Set();
              return;
            }

            const data = await res.json().catch(() => ({}));
            const conversations = Array.isArray(data?.conversations) ? data.conversations : [];
            remoteOwnedIds = new Set(
              conversations
                .map(item => String(item?.id || "").trim())
                .filter(Boolean)
            );
          } catch {
            remoteOwnedIds = new Set();
          }
        };

        const updateImportButtonState = () => {
          const checked = Array.from(list.querySelectorAll('input[type="checkbox"]')).filter(input => input.checked);
          const ready = checked.length > 0;
          importBtn.disabled = !ready;
          importBtn.classList.toggle("is-ready", ready);
        };

        const renderItems = async () => {
          await syncRemoteOwnedConversationIds();

          localItems = loadLocalConversationsForImport();
          const importableItems = localItems.filter(item => !remoteOwnedIds.has(item.id));
          list.innerHTML = "";
          notice.textContent = "";
          notice.className = "notice";

          if (localItems.length === 0) {
            const empty = document.createElement("div");
            empty.className = "import-item-meta";
            empty.textContent = "Aucune conversation locale disponible sur cet appareil.";
            list.appendChild(empty);
            updateImportButtonState();
            return;
          }

          if (importableItems.length === 0) {
            const empty = document.createElement("div");
            empty.className = "import-item-meta";
            empty.textContent = "Toutes les conversations locales sont deja liees a ce compte.";
            list.appendChild(empty);
            updateImportButtonState();
            return;
          }

          importableItems.forEach(item => {
            const row = document.createElement("div");
            row.className = "import-item";

            const label = document.createElement("label");
            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.value = item.id;
            checkbox.addEventListener("change", updateImportButtonState);

            const main = document.createElement("div");
            main.className = "import-item-main";

            const titleLine = document.createElement("div");
            titleLine.className = "import-item-title";
            titleLine.innerHTML = `${item.isPrivate ? buildPrivateLockIcon() : ""}<span>${escapeHtml(item.title)}</span>`;

            const metaLine = document.createElement("div");
            metaLine.className = "import-item-meta";
            metaLine.textContent = `${item.messages.length} message(s) · ${formatImportDate(item.updatedAt)}${item.isPrivate ? " · locale privee" : ""}`;

            main.appendChild(titleLine);
            main.appendChild(metaLine);
            label.appendChild(checkbox);
            label.appendChild(main);
            row.appendChild(label);
            list.appendChild(row);
          });

          updateImportButtonState();
        };

        refreshBtn.addEventListener("click", async () => {
          await renderItems();
        });

        importBtn.addEventListener("click", async () => {
          const selectedIds = Array.from(list.querySelectorAll('input[type="checkbox"]'))
            .filter(input => input.checked)
            .map(input => String(input.value || "").trim())
            .filter(Boolean);

          if (selectedIds.length === 0) {
            updateImportButtonState();
            return;
          }

          const selectedConversations = selectedIds
            .map(id => localItems.find(item => item.id === id))
            .filter(Boolean);

          importBtn.disabled = true;
          importBtn.classList.remove("is-ready");
          notice.textContent = "";
          notice.className = "notice";

          try {
            const res = await fetch("/api/account/conversations/import-local", {
              method: "POST",
              credentials: "include",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                anonymousUserId: String(localStorage.getItem(USER_ID_KEY) || "").trim(),
                conversations: selectedConversations.map(item => ({
                  id: item.id,
                  title: item.title,
                  isCustomTitle: item.isCustomTitle === true,
                  isPrivate: item.isPrivate === true,
                  memory: item.memory,
                  flags: item.flags,
                  updatedAt: item.updatedAt,
                  messages: item.messages
                }))
              })
            });

            const data = await res.json().catch(() => ({}));

            if (!res.ok) {
              notice.textContent = data.error || "Import impossible pour le moment.";
              updateImportButtonState();
              return;
            }

            const importedCount = Number(data.importedCount || 0);
            const alreadyOwnedCount = Number(data.alreadyOwnedCount || 0);
            const skippedCount = Number(data.skippedCount || 0);

            notice.textContent = `Import termine: ${importedCount} importee(s), ${alreadyOwnedCount} deja rattachee(s), ${skippedCount} ignoree(s).`;
            notice.className = "notice success";

            await renderItems();
          } catch (_) {
            notice.textContent = "Erreur reseau. Reessayez.";
            updateImportButtonState();
          }
        });

        renderItems();
        return card;
      }

      function buildPrivateDefaultCard() {
        const card = document.createElement("div");
        card.className = "card";

        const title = document.createElement("div");
        title.className = "section-title";
        title.textContent = "Confidentialite par defaut";
        card.appendChild(title);

        const row = document.createElement("label");
        row.className = "setting-row";
        row.setAttribute("for", "privateDefaultToggle");

        const rowText = document.createElement("span");
        rowText.textContent = "Mode prive par defaut pour les futures conversations";
        rowText.style.fontSize = "14px";
        rowText.style.color = "#333";

        const toggle = document.createElement("input");
        toggle.id = "privateDefaultToggle";
        toggle.type = "checkbox";
        toggle.checked = currentUser && currentUser.privateConversationsByDefault === true;

        row.appendChild(rowText);
        row.appendChild(toggle);
        card.appendChild(row);

        const help = document.createElement("p");
        help.className = "setting-help";
        help.textContent = "Si active, les nouvelles conversations seront locales par defaut (non stockees dans Firebase), tout en transitant par ChatGPT/OpenAI pour generer les reponses.";
        card.appendChild(help);

        const saveBtn = document.createElement("button");
        saveBtn.type = "button";
        saveBtn.className = "action-btn";
        saveBtn.id = "savePrivateDefaultBtn";
        saveBtn.textContent = "Enregistrer";
        card.appendChild(saveBtn);

        const notice = document.createElement("div");
        notice.className = "notice";
        notice.id = "privateDefaultNotice";
        card.appendChild(notice);

        const refreshSaveButtonState = () => {
          const current = currentUser && currentUser.privateConversationsByDefault === true;
          const changed = toggle.checked !== current;
          saveBtn.disabled = !changed;
          saveBtn.classList.toggle("is-ready", changed);
        };

        toggle.addEventListener("change", refreshSaveButtonState);

        saveBtn.addEventListener("click", async () => {
          notice.textContent = "";
          notice.className = "notice";
          saveBtn.disabled = true;

          try {
            const res = await fetch("/api/account/preferences", {
              method: "PUT",
              credentials: "include",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                privateConversationsByDefault: toggle.checked === true
              })
            });

            const data = await res.json().catch(() => ({}));

            if (!res.ok) {
              notice.textContent = data.error || "Impossible d'enregistrer la preference.";
              refreshSaveButtonState();
              return;
            }

            currentUser.privateConversationsByDefault = data.privateConversationsByDefault === true;
            toggle.checked = currentUser.privateConversationsByDefault === true;
            notice.textContent = "Preference enregistree.";
            notice.className = "notice success";
            refreshSaveButtonState();
          } catch (_) {
            notice.textContent = "Erreur reseau. Reessayez.";
            refreshSaveButtonState();
          }
        });

        refreshSaveButtonState();
        return card;
      }

      function buildPasswordCard() {
        const card = document.createElement("div");
        card.className = "card";

        const title = document.createElement("div");
        title.className = "section-title";
        title.textContent = "Changer mon mot de passe";
        card.appendChild(title);

        const form = document.createElement("form");
        form.id = "changePasswordForm";
        form.innerHTML = [
          '<div class="field-group">',
          '  <label class="field-label" for="currentPassword">Mot de passe actuel</label>',
          '  <div class="password-field-wrap">',
          '    <input type="password" id="currentPassword" autocomplete="current-password" required>',
          '    <button type="button" class="toggle-password-btn" data-target="currentPassword">Voir</button>',
          '  </div>',
          '</div>',
          '<div class="field-group">',
          '  <label class="field-label" for="newPassword">Nouveau mot de passe</label>',
          '  <div class="password-field-wrap">',
          '    <input type="password" id="newPassword" autocomplete="new-password" required>',
          '    <button type="button" class="toggle-password-btn" data-target="newPassword">Voir</button>',
          '  </div>',
          '</div>',
          '<div class="field-group">',
          '  <label class="field-label" for="confirmNewPassword">Confirmer le nouveau mot de passe</label>',
          '  <div class="password-field-wrap">',
          '    <input type="password" id="confirmNewPassword" autocomplete="new-password" required>',
          '    <button type="button" class="toggle-password-btn" data-target="confirmNewPassword">Voir</button>',
          '  </div>',
          '</div>',
          '<button type="submit" class="action-btn" id="changePasswordBtn" disabled>Enregistrer</button>',
          '<div class="notice" id="changePasswordNotice"></div>'
        ].join('');
        form.addEventListener("submit", handlePasswordChange);
        card.appendChild(form);

        initPasswordToggles(card);
        initChangePasswordButtonState(form);
        return card;
      }

      function initChangePasswordButtonState(form) {
        const currentInput = form.querySelector("#currentPassword");
        const newInput = form.querySelector("#newPassword");
        const confirmInput = form.querySelector("#confirmNewPassword");
        const btn = form.querySelector("#changePasswordBtn");
        if (!currentInput || !newInput || !confirmInput || !btn) return;

        const refresh = () => {
          const currentValue = String(currentInput.value || "");
          const newValue = String(newInput.value || "");
          const confirmValue = String(confirmInput.value || "");
          const ready = currentValue.length > 0 && newValue.length > 0 && confirmValue.length > 0 && newValue === confirmValue;
          btn.disabled = !ready;
          btn.classList.toggle("is-ready", ready);
        };

        currentInput.addEventListener("input", refresh);
        newInput.addEventListener("input", refresh);
        confirmInput.addEventListener("input", refresh);
        refresh();
      }

      function initPasswordToggles(root) {
        root.querySelectorAll(".toggle-password-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            const targetId = btn.getAttribute("data-target");
            const input = targetId ? document.getElementById(targetId) : null;
            if (!input) return;
            const isHidden = input.type === "password";
            input.type = isHidden ? "text" : "password";
            btn.textContent = isHidden ? "Masquer" : "Voir";
          });
        });
      }

      async function handlePasswordChange(event) {
        event.preventDefault();
        const notice = document.getElementById("changePasswordNotice");
        const btn = document.getElementById("changePasswordBtn");
        const currentPassword = String(document.getElementById("currentPassword").value || "");
        const newPassword = String(document.getElementById("newPassword").value || "");
        const confirmNewPassword = String(document.getElementById("confirmNewPassword").value || "");

        notice.textContent = "";
        notice.className = "notice";

        if (!currentPassword || !newPassword || !confirmNewPassword) {
          notice.textContent = "Veuillez remplir tous les champs.";
          return;
        }

        if (newPassword !== confirmNewPassword) {
          notice.textContent = "Les nouveaux mots de passe ne correspondent pas.";
          return;
        }

        if (newPassword.length < 10) {
          notice.textContent = "Le mot de passe doit faire au moins 10 caractères.";
          return;
        }

        btn.disabled = true;
        try {
          const res = await fetch("/api/auth/change-password", {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ currentPassword, newPassword })
          });
          const data = await res.json().catch(() => ({}));

          if (res.ok && data.success) {
            notice.textContent = "Mot de passe mis à jour.";
            notice.className = "notice success";
            event.target.reset();
            event.target.querySelectorAll('.toggle-password-btn').forEach(btnEl => {
              btnEl.textContent = 'Voir';
            });
            btn.classList.remove("is-ready");
          } else {
            notice.textContent = data.error || "Impossible de changer le mot de passe.";
          }
        } catch (_) {
          notice.textContent = "Erreur réseau. Réessayez.";
        } finally {
          const currentValue = String(document.getElementById("currentPassword").value || "");
          const newValue = String(document.getElementById("newPassword").value || "");
          const confirmValue = String(document.getElementById("confirmNewPassword").value || "");
          const ready = currentValue.length > 0 && newValue.length > 0 && confirmValue.length > 0 && newValue === confirmValue;
          btn.disabled = !ready;
          btn.classList.toggle("is-ready", ready);
        }
      }

      window.handleLogout = async function handleLogout() {
        try {
          await fetch("/api/auth/logout", { method: "POST", credentials: "include" });
        } catch (_) {}
        navigateAway("/");
      };

      function showError(msg) {
        const main = document.getElementById("mainContent");
        main.innerHTML = "";
        const err = document.createElement("div");
        err.className = "error-notice";
        err.textContent = msg;
        main.appendChild(err);
      }

      init();
    })();
  </script>
</body>
</html>
