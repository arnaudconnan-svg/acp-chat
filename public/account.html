<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Facilitat.io — Mon compte</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4f9f9">
  <meta name="color-scheme" content="light">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    @keyframes pageIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #f4f9f9;
      font-family: Arial, sans-serif;
      color: #1a1a1a;
      animation: pageIn 0.68s ease 0.05s both;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 48px;
    }

    header {
      width: 100%;
      max-width: 520px;
      padding: 28px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    header img {
      height: 144px;
      width: auto;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn-link {
      font-size: 13px;
      color: #888;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
    }

    .btn-link:hover { color: #1a1a1a; }

    main {
      width: 100%;
      max-width: 520px;
      padding: 28px 24px 0;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 6px;
    }

    .user-email {
      font-size: 14px;
      color: #666;
      margin: 0 0 28px;
    }

    .card {
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 24px;
      background: #fff;
    }

    .card.clickable-card {
      cursor: pointer;
      transition: border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
    }

    .card.clickable-card:hover {
      border-color: #c8d8db;
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(20, 63, 69, 0.08);
    }

    .section-title {
      font-size: 15px;
      font-weight: 600;
      margin: 0 0 14px;
      color: #333;
    }

    .card-link-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .card-link-arrow {
      font-size: 24px;
      line-height: 1;
      color: #8a989a;
      flex: 0 0 auto;
    }

    .field-group {
      margin-bottom: 14px;
    }

    .field-label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .setting-help {
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
      color: #555;
    }

    .import-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 12px 0;
    }

    .import-item {
      border: 1px solid #e3e3e3;
      border-radius: 10px;
      padding: 10px 12px;
      background: #fafafa;
    }

    .import-item label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
    }

    .import-item-main {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .import-item-title {
      font-size: 14px;
      color: #1f1f1f;
      line-height: 1.3;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .import-item-meta {
      font-size: 12px;
      color: #666;
      line-height: 1.3;
    }

    .import-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .import-actions .action-btn {
      width: auto;
      min-width: 130px;
      padding: 10px 14px;
      font-size: 14px;
    }

    .secondary-btn {
      border: 1.5px solid #d3d3d3;
      border-radius: 8px;
      background: #fff;
      color: #444;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 14px;
      cursor: pointer;
    }

    .secondary-btn:hover {
      background: #f5f5f5;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      color: #1a1a1a;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus,
    input[type="text"]:focus {
      border-color: #1a1a1a;
      background: #fff;
    }

    .password-field-wrap {
      position: relative;
    }

    .password-field-wrap input[type="password"],
    .password-field-wrap input[type="text"] {
      padding-right: 68px;
    }

    .toggle-password-btn {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      color: #777;
      font-size: 11px;
      cursor: pointer;
      padding: 4px 0;
      width: 50px;
      text-align: center;
      border-radius: 6px;
      line-height: 1.1;
    }

    .toggle-password-btn:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    .action-btn {
      width: 100%;
      padding: 12px;
      background: #b8c2c4;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: default;
      transition: background-color 0.15s ease;
    }

    .action-btn.is-ready {
      background: #245e66;
      cursor: pointer;
    }

    .action-btn:disabled {
      opacity: 1;
      cursor: default;
    }

    .notice {
      font-size: 13px;
      color: #c0392b;
      margin-top: 12px;
      min-height: 18px;
    }

    .notice.success {
      color: #245e66;
    }

    .empty-state, .loading-state, .error-notice {
      font-size: 14px;
      color: #aaa;
      text-align: center;
      padding: 24px 0;
    }

    .error-notice { color: #c0392b; }

    .longterm-memory-warning {
      font-size: 13px;
      color: #888;
      margin: 0 0 12px;
    }

    .longterm-memory-textarea {
      width: 100%;
      font-family: monospace;
      font-size: 13px;
      padding: 10px 12px;
      border: 1.5px solid #d0d0d0;
      border-radius: 8px;
      resize: vertical;
      box-sizing: border-box;
      line-height: 1.5;
    }

    .longterm-memory-counter {
      text-align: right;
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }

    .history-toggle {
      background: none;
      border: none;
      padding: 0;
      font-size: 13px;
      color: #888;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .history-item-btn {
      background: none;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      width: 100%;
      color: #245e66;
    }

    .history-item-btn:hover {
      background: rgba(36,94,102,0.05);
    }

    .upgrade-banner {
      border: 1.5px solid #245e66;
      border-radius: 12px;
      padding: 16px 20px;
      background: rgba(36, 94, 102, 0.06);
      margin-bottom: 24px;
    }

    .upgrade-banner p {
      margin: 0 0 12px;
      font-size: 14px;
      color: #245e66;
    }

    .upgrade-banner button {
      font-size: 13px;
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      background: #245e66;
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    .upgrade-banner button:hover { opacity: 0.85; }

    .subscreen-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 16px;
    }

    .setting-inline-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .setting-inline-controls select {
      flex: 1;
      min-width: 0;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 14px;
      background: #fafafa;
    }
  </style>
</head>
<body>
  <header>
    <img src="/images/logo.png" alt="Facilitat.io">
    <div class="header-actions">
      <button class="btn-link" id="logoutBtn" onclick="handleLogout()">Se déconnecter</button>
    </div>
  </header>

  <main id="mainContent">
    <div class="loading-state">Chargement…</div>
  </main>

  <script>
    (function () {
      "use strict";

      const USER_ID_KEY = "facilitatio_user_id";
      const CONVERSATIONS_INDEX_KEY = "facilitatio_conversations_index";
      const CONVERSATION_STORAGE_KEY_PREFIX = "facilitatio_conversation_data_";
      const PRIVATE_CONVERSATION_IDS_KEY = "facilitatio_private_conversation_ids";
      const BIOMETRIC_CREDENTIAL_KEY_PREFIX = "facilitatio_bio_cred_v1_";

      let currentUser = null;
      let accountSubscreen = "main";

      function getCountryName(code) {
        if (!code) return "";
        try {
          return new Intl.DisplayNames(["fr"], { type: "region" }).of(code.toUpperCase()) || code;
        } catch (_) { return code; }
      }

      async function autoSaveCountry(code) {
        try {
          const res = await fetch("/api/account/profile", {
            method: "PUT",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ country: code })
          });
          const d = await res.json().catch(() => ({}));
          if (res.ok && d.success && currentUser) {
            currentUser.country = typeof d.country === "string" ? d.country : code;
          }
        } catch (_) {}
      }

      function navigateAway(url, options = {}) {
        document.body.style.animation = "none";
        document.body.style.transition = "opacity 0.32s ease, transform 0.32s ease";
        document.body.style.opacity = "0";
        document.body.style.transform = "translateY(10px)";
        setTimeout(() => {
          if (options.replace === true) {
            window.location.replace(url);
            return;
          }
          window.location.href = url;
        }, 320);
      }

      const accountHistoryState = history.state || {};
      if (accountHistoryState.__page !== "account" || accountHistoryState.__guard !== true) {
        history.replaceState({ __page: "account", __base: true }, "", window.location.href);
        history.pushState({ __page: "account", __guard: true }, "", window.location.href);
      }

      function openPrivacySubscreen() {
        accountSubscreen = "privacy";
        history.pushState({ __page: "account", __subscreen: "privacy" }, "", window.location.href);
        renderPage();
      }

      window.addEventListener("popstate", event => {
        const state = event.state || {};
        if (state.__page === "account" && state.__subscreen === "privacy") {
          accountSubscreen = "privacy";
          renderPage();
          return;
        }
        if (state.__page === "account" && state.__guard === true) {
          accountSubscreen = "main";
          renderPage();
          return;
        }
        if (state.__page === "account" && state.__base === true) {
          navigateAway("/?screen=conversationsScreen", { replace: true });
        }
      });

      window.addEventListener("pageshow", () => {
        document.body.style.animation = "";
        document.body.style.transition = "";
        document.body.style.opacity = "";
        document.body.style.transform = "";
      });

      async function init() {
        const _initParams = new URLSearchParams(window.location.search);
        const _pendingCountry = _initParams.get("_android_country_selected");
        const _openPrivacySubscreen = _initParams.get("_account_subscreen") === "privacy";
        if (_pendingCountry) {
          try {
            const _cleanUrl = new URL(window.location.href);
            _cleanUrl.searchParams.delete("_android_country_selected");
            _cleanUrl.searchParams.delete("_android_country");
            _cleanUrl.searchParams.delete("_android_snapshot_pref_saved");
            _cleanUrl.searchParams.delete("_android_snapshot_enabled");
            _cleanUrl.searchParams.delete("_account_subscreen");
            history.replaceState(history.state, "", _cleanUrl.toString());
          } catch (_) {}
        } else if (_openPrivacySubscreen) {
          try {
            const _cleanUrl = new URL(window.location.href);
            _cleanUrl.searchParams.delete("_android_snapshot_pref_saved");
            _cleanUrl.searchParams.delete("_android_snapshot_enabled");
            _cleanUrl.searchParams.delete("_account_subscreen");
            history.replaceState(history.state, "", _cleanUrl.toString());
          } catch (_) {}
        }

        try {
          const res = await fetch("/api/auth/session", { credentials: "include" });
          const data = await res.json().catch(() => ({}));

          if (!data || data.authenticated !== true) {
            navigateAway("/auth.html?next=/account.html");
            return;
          }

          currentUser = data.user || {};

          if (_pendingCountry) {
            await autoSaveCountry(_pendingCountry.toUpperCase());
          }

          if (_openPrivacySubscreen) {
            openPrivacySubscreen();
            return;
          }

          renderPage();
        } catch (_) {
          showError("Impossible de charger la session. Réessayez.");
        }
      }

      function renderPage() {
        const main = document.getElementById("mainContent");

        main.innerHTML = "";

        if (accountSubscreen === "privacy") {
          main.appendChild(buildPrivacySubscreen());
          return;
        }

        const h1 = document.createElement("h1");
        h1.textContent = "Mon compte";
        main.appendChild(h1);

        const emailEl = document.createElement("p");
        emailEl.className = "user-email";
        emailEl.textContent = String(currentUser.email || "");
        main.appendChild(emailEl);

        main.appendChild(buildProfileCard());
        main.appendChild(buildPrivacyEntryCard());
        main.appendChild(buildLocalImportCard());
        main.appendChild(buildLongtermMemoryCard());
      }

      function getConversationStorageKey(conversationId) {
        return `${CONVERSATION_STORAGE_KEY_PREFIX}${conversationId}`;
      }

      function loadPrivateConversationIds() {
        try {
          const raw = JSON.parse(localStorage.getItem(PRIVATE_CONVERSATION_IDS_KEY) || "[]");
          if (!Array.isArray(raw)) return new Set();
          return new Set(
            raw
              .map(value => String(value || "").trim())
              .filter(Boolean)
          );
        } catch {
          return new Set();
        }
      }

      function loadLocalConversationsForImport() {
        let index = [];

        try {
          const rawIndex = JSON.parse(localStorage.getItem(CONVERSATIONS_INDEX_KEY) || "[]");
          index = Array.isArray(rawIndex) ? rawIndex : [];
        } catch {
          index = [];
        }

        const privateConversationIds = loadPrivateConversationIds();
        const indexById = new Map(
          index
            .map(item => [String(item?.id || "").trim(), item])
            .filter(([id]) => Boolean(id))
        );

        const allConversationIds = new Set(indexById.keys());
        for (const privateId of privateConversationIds) {
          allConversationIds.add(privateId);
        }

        for (let i = 0; i < localStorage.length; i += 1) {
          const key = String(localStorage.key(i) || "");
          if (!key.startsWith(CONVERSATION_STORAGE_KEY_PREFIX)) continue;

          const id = key.slice(CONVERSATION_STORAGE_KEY_PREFIX.length).trim();
          if (id) {
            allConversationIds.add(id);
          }
        }

        return Array.from(allConversationIds)
          .map(id => {
            const indexItem = indexById.get(id) || null;

            let data = null;
            try {
              const rawData = localStorage.getItem(getConversationStorageKey(id));
              data = rawData ? JSON.parse(rawData) : null;
            } catch {
              data = null;
            }

            const messages = Array.isArray(data?.messages) ? data.messages : [];
            const hasUserMessage = messages.some(entry => entry && entry.role === "user" && typeof entry.content === "string" && entry.content.trim());
            const titleFromIndex = typeof indexItem?.title === "string" ? indexItem.title.trim() : "";
            const fallbackTitle = messages.find(entry => entry && entry.role === "user" && typeof entry.content === "string")?.content?.slice(0, 60) || "Conversation sans titre";

            if (!indexItem && !data) {
              return null;
            }

            // Ignore orphan local artifacts that never reached the app conversation index
            // and never received a real user message.
            if (!indexItem && !hasUserMessage) {
              return null;
            }

            return {
              id,
              title: titleFromIndex || fallbackTitle,
              updatedAt: Number(indexItem?.updatedAt || data?.updatedAt || Date.now()),
              isCustomTitle: indexItem?.isCustomTitle === true,
              isPrivate: (indexItem?.isPrivate === true) || (data?.isPrivate === true) || privateConversationIds.has(id),
              memory: typeof data?.memory === "string" ? data.memory : "",
              flags: data?.flags && typeof data.flags === "object" && !Array.isArray(data.flags) ? data.flags : {},
              messages
            };
          })
          .filter(Boolean)
          .sort((a, b) => Number(b.updatedAt || 0) - Number(a.updatedAt || 0));
      }

      function formatImportDate(timestamp) {
        const value = Number(timestamp || 0);
        if (!Number.isFinite(value) || value <= 0) return "date inconnue";

        try {
          return new Date(value).toLocaleString("fr-FR", {
            day: "2-digit",
            month: "2-digit",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit"
          });
        } catch {
          return "date inconnue";
        }
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function buildPrivateLockIcon() {
        return [
          '<svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" style="display:inline-block;vertical-align:middle;">',
          '  <path d="M6.5 11.2h11a1.5 1.5 0 0 1 1.5 1.5v5.8a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-5.8a1.5 1.5 0 0 1 1.5-1.5z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path>',
          '  <path d="M8.4 11.2V8.9a3.6 3.6 0 1 1 7.2 0v2.3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>',
          '</svg>'
        ].join("");
      }

      function buildLongtermMemoryCard() {
        const card = document.createElement("div");
        card.className = "card";
        const title = document.createElement("div");
        title.className = "section-title";
        title.textContent = "M\u00e9moire longue terme";
        card.appendChild(title);
        const content = document.createElement("div");
        content.innerHTML = '<p class="loading-state">Chargement\u2026</p>';
        card.appendChild(content);
        loadLongtermMemoryCardContent(content);
        return card;
      }

      async function loadLongtermMemoryCardContent(container) {
        try {
          const res = await fetch("/api/intersession-memory", {
            cache: "no-store",
            credentials: "include"
          });
          if (!res.ok) {
            container.innerHTML = '<p class="error-notice">Impossible de charger la m\u00e9moire.</p>';
            return;
          }
          const data = await res.json().catch(() => ({}));
          const memoryValue = typeof data.memorySource === "string"
            ? data.memorySource
            : typeof data.memory === "string"
              ? data.memory
              : "";
          const history = Array.isArray(data.intersessionMemoryHistory) ? data.intersessionMemoryHistory : [];

          container.innerHTML = "";

          const warning = document.createElement("p");
          warning.className = "longterm-memory-warning";
          warning.textContent = "Ce bloc est la source humaine inter-session et remplace la version existante.";
          container.appendChild(warning);

          const textarea = document.createElement("textarea");
          textarea.className = "longterm-memory-textarea";
          textarea.rows = 8;
          textarea.maxLength = 6000;
          textarea.value = memoryValue;
          container.appendChild(textarea);

          const counter = document.createElement("div");
          counter.className = "longterm-memory-counter";
          counter.textContent = `${memoryValue.length} / 6000`;
          textarea.addEventListener("input", () => {
            counter.textContent = `${textarea.value.length} / 6000`;
          });
          container.appendChild(counter);

          const saveBtn = document.createElement("button");
          saveBtn.className = "action-btn is-ready";
          saveBtn.style.marginTop = "12px";
          saveBtn.textContent = "Enregistrer";
          container.appendChild(saveBtn);

          const saveNotice = document.createElement("div");
          saveNotice.className = "notice";
          container.appendChild(saveNotice);

          saveBtn.addEventListener("click", async () => {
            saveBtn.disabled = true;
            saveNotice.textContent = "";
            saveNotice.className = "notice";
            try {
              const saveRes = await fetch("/api/intersession-memory/direct", {
                method: "PATCH",
                credentials: "include",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ memory: textarea.value })
              });
              if (saveRes.ok) {
                saveNotice.className = "notice success";
                saveNotice.textContent = "Vos modifications seront prises en compte d\u00e8s le prochain message envoy\u00e9.";
                await loadLongtermMemoryCardContent(container);
              } else {
                saveNotice.textContent = "Erreur lors de la sauvegarde. R\u00e9essayez.";
              }
            } catch {
              saveNotice.textContent = "Erreur r\u00e9seau.";
            } finally {
              saveBtn.disabled = false;
            }
          });

          if (history.length > 0) {
            const historySection = document.createElement("div");
            historySection.style.marginTop = "18px";

            const historyToggle = document.createElement("button");
            historyToggle.type = "button";
            historyToggle.className = "history-toggle";
            historyToggle.textContent = "\u25b6 Versions pr\u00e9c\u00e9dentes";
            historySection.appendChild(historyToggle);

            const historyContent = document.createElement("div");
            historyContent.style.display = "none";
            historyContent.style.marginTop = "10px";
            let historyOpen = false;
            historyToggle.addEventListener("click", () => {
              historyOpen = !historyOpen;
              historyContent.style.display = historyOpen ? "block" : "none";
              historyToggle.textContent = (historyOpen ? "\u25bc" : "\u25b6") + " Versions pr\u00e9c\u00e9dentes";
            });

            const historyList = document.createElement("div");
            historyList.style.cssText = "display:flex;flex-direction:column;gap:8px;";

            let selectedPreviewIndex = -1;
            const previewEl = document.createElement("div");
            previewEl.style.display = "none";
            previewEl.style.marginTop = "8px";

            const previewTextarea = document.createElement("textarea");
            previewTextarea.className = "longterm-memory-textarea";
            previewTextarea.readOnly = true;
            previewTextarea.rows = 6;
            previewTextarea.style.color = "#555";
            previewTextarea.style.background = "#fafafa";
            previewEl.appendChild(previewTextarea);

            const previewRestoreBtn = document.createElement("button");
            previewRestoreBtn.type = "button";
            previewRestoreBtn.className = "secondary-btn";
            previewRestoreBtn.style.marginTop = "8px";
            previewRestoreBtn.textContent = "Restaurer cette version";
            previewRestoreBtn.addEventListener("click", () => {
              if (selectedPreviewIndex < 0) return;
              const confirmed = window.confirm("Restaurer cette version\u202f? Le contenu actuel sera archiv\u00e9.");
              if (!confirmed) return;
              textarea.value = previewTextarea.value;
              counter.textContent = `${textarea.value.length} / 6000`;

          importBtn.classList.toggle("is-ready", ready);
        };

        const renderItems = async () => {
          await syncRemoteOwnedConversationIds();

          localItems = loadLocalConversationsForImport();
          const importableItems = localItems.filter(item => !remoteOwnedIds.has(item.id));
          list.innerHTML = "";
          notice.textContent = "";
          notice.className = "notice";

            empty.textContent = "Toutes les conversations locales sont deja liees a ce compte.";
            list.appendChild(empty);

          const selectedIds = Array.from(list.querySelectorAll('input[type="checkbox"]'))
            .filter(input => input.checked)
            .map(input => String(input.value || "").trim())
            .filter(Boolean);

          if (selectedIds.length === 0) {

            return;
          }

            .filter(Boolean);

          importBtn.disabled = true;
          importBtn.classList.remove("is-ready");
          notice.textContent = "";
          notice.className = "notice";

              body: JSON.stringify({

            const data = await res.json().catch(() => ({}));

            if (!res.ok) {
              notice.textContent = data.error || "Import impossible pour le moment.";
              updateImportButtonState();
              return;

            const alreadyOwnedCount = Number(data.alreadyOwnedCount || 0);

            notice.textContent = `Import termine: ${importedCount} importee(s), ${alreadyOwnedCount} deja rattachee(s), ${skippedCount} ignoree(s).`;
            notice.className = "notice success";

            await renderItems();
          } catch (_) {
            notice.textContent = "Erreur reseau. Reessayez.";
            updateImportButtonState();
          }
        });

        renderItems();
        return card;
      }

      function normalizeBiometricRelockSeconds(value) {
        const n = Number(value);
        if (!Number.isFinite(n)) return 120;
        if (n === 0 || n === 30 || n === 120 || n === 300) return n;
        return 120;
      }

      function getBiometricCredentialStorageKey() {
        const userId = currentUser && typeof currentUser.id === "string" ? currentUser.id.trim() : "";
        if (!userId) return null;
        return `${BIOMETRIC_CREDENTIAL_KEY_PREFIX}${userId}`;
      }

      function toBase64Url(buffer) {
        const bytes = new Uint8Array(buffer);
        let binary = "";
        for (let i = 0; i < bytes.length; i += 1) {
          binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
      }

      function fromBase64Url(value) {
        if (typeof value !== "string" || !value.trim()) return null;
        const normalized = value.replace(/-/g, "+").replace(/_/g, "/");
        const padded = normalized + "=".repeat((4 - (normalized.length % 4 || 4)) % 4);
        const binary = atob(padded);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) {
          bytes[i] = binary.charCodeAt(i);
        }
        return bytes.buffer;
      }

      function getRandomChallenge(size = 32) {
        const bytes = new Uint8Array(size);
        crypto.getRandomValues(bytes);
        return bytes;
      }

      async function isBiometricAvailable() {
        if (typeof window.PublicKeyCredential !== "function") {
          return false;
        }

        if (typeof window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable !== "function") {
          return false;
        }

        try {
          return await window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
        } catch {
          return false;
        }
      }

      function loadStoredBiometricCredentialId() {
        const key = getBiometricCredentialStorageKey();
        if (!key) return "";
        return String(localStorage.getItem(key) || "").trim();
      }

      function saveStoredBiometricCredentialId(credentialId) {
        const key = getBiometricCredentialStorageKey();
        if (!key) return;
        if (typeof credentialId === "string" && credentialId.trim()) {
          localStorage.setItem(key, credentialId.trim());
        }
      }

      function clearStoredBiometricCredentialId() {
        const key = getBiometricCredentialStorageKey();
        if (!key) return;
        localStorage.removeItem(key);
      }

      async function registerBiometricCredential() {
        if (!(await isBiometricAvailable())) {
          throw new Error("Biometrie indisponible sur cet appareil.");
        }

        if (!window.isSecureContext || !navigator.credentials || typeof navigator.credentials.create !== "function") {
          throw new Error("Contexte securise requis pour activer la biometrie.");
        }

        const userId = currentUser && typeof currentUser.id === "string" ? currentUser.id.trim() : "";
        const email = currentUser && typeof currentUser.email === "string" ? currentUser.email.trim() : "Utilisateur";
        if (!userId) {
          throw new Error("Session utilisateur introuvable.");
        }

        const credential = await navigator.credentials.create({
          publicKey: {
            challenge: getRandomChallenge(32),
            rp: {
              name: "Facilitat.io",
              id: window.location.hostname
            },
            user: {
              id: new TextEncoder().encode(userId),
              name: email || userId,
              displayName: email || userId
            },
            pubKeyCredParams: [
              { type: "public-key", alg: -7 },
              { type: "public-key", alg: -257 }
            ],
            timeout: 60000,
            authenticatorSelection: {
              authenticatorAttachment: "platform",
              userVerification: "required",
              residentKey: "preferred"
            },
            attestation: "none"
          }
        });

        if (!credential || !credential.rawId) {
          throw new Error("Impossible de creer une cle biometrie.");
        }

        const id = toBase64Url(credential.rawId);
        saveStoredBiometricCredentialId(id);
        return id;
      }

            if (!currentUser.biometricLockEnabled) {
              clearStoredBiometricCredentialId();

            notice.textContent = "Preference enregistree.";
            notice.className = "notice success";
            refreshSaveState();
          } catch (_) {
            notice.textContent = "Erreur reseau ou biometrie. Reessayez.";
            refreshSaveState();
          }
        });

        refreshSaveState();
        return card;
      }

            const data = await res.json().catch(() => ({}));

            if (!res.ok) {
              notice.textContent = data.error || "Impossible d'enregistrer la preference.";
              refreshSaveState();
              return;
            }

            currentUser.screenCaptureEnabled = data.screenCaptureEnabled === true;
            toggle.checked = currentUser.screenCaptureEnabled === true;

            if (/Android/i.test(navigator.userAgent || "")) {
              await syncNativeScreenCapturePreference(currentUser.screenCaptureEnabled === true);
              return;
            }

            notice.textContent = "Preference enregistree.";
            notice.className = "notice success";
            refreshSaveState();
          } catch (_) {
            notice.textContent = "Erreur reseau. Reessayez.";
            refreshSaveState();
          }
        });

        refreshSaveState();
        return card;
      }

      function buildPrivateDefaultCard() {
        const card = document.createElement("div");
        card.className = "card";

        const title = document.createElement("div");
        title.className = "section-title";
        title.textContent = "Confidentialite par defaut";
        card.appendChild(title);

        const row = document.createElement("label");
        row.className = "setting-row";
        row.setAttribute("for", "privateDefaultToggle");

        const rowText = document.createElement("span");
        rowText.textContent = "Mode prive par defaut pour les futures conversations";
        rowText.style.fontSize = "14px";
        rowText.style.color = "#333";

        const toggle = document.createElement("input");
        toggle.id = "privateDefaultToggle";
        toggle.type = "checkbox";
        toggle.checked = currentUser && currentUser.privateConversationsByDefault === true;

        row.appendChild(rowText);
        row.appendChild(toggle);
        card.appendChild(row);

        const help = document.createElement("p");
        help.className = "setting-help";
        help.textContent = "Si active, les nouvelles conversations seront locales par defaut (non stockees dans Firebase), tout en transitant par ChatGPT/OpenAI pour generer les reponses.";
        card.appendChild(help);

        const saveBtn = document.createElement("button");
        saveBtn.type = "button";
        saveBtn.className = "action-btn";
        saveBtn.id = "savePrivateDefaultBtn";
        saveBtn.textContent = "Enregistrer";
        card.appendChild(saveBtn);

        const notice = document.createElement("div");
        notice.className = "notice";
        notice.id = "privateDefaultNotice";
        card.appendChild(notice);

        const refreshSaveButtonState = () => {
          const current = currentUser && currentUser.privateConversationsByDefault === true;
          const changed = toggle.checked !== current;
          saveBtn.disabled = !changed;
          saveBtn.classList.toggle("is-ready", changed);
        };

        toggle.addEventListener("change", refreshSaveButtonState);

        saveBtn.addEventListener("click", async () => {
          notice.textContent = "";
          notice.className = "notice";
          saveBtn.disabled = true;

          try {
            const res = await fetch("/api/account/preferences", {
              method: "PUT",
              credentials: "include",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                privateConversationsByDefault: toggle.checked === true
              })
            });

            const data = await res.json().catch(() => ({}));

            if (!res.ok) {
              notice.textContent = data.error || "Impossible d'enregistrer la preference.";
              refreshSaveButtonState();
              return;
            }

            currentUser.privateConversationsByDefault = data.privateConversationsByDefault === true;
            toggle.checked = currentUser.privateConversationsByDefault === true;
            notice.textContent = "Preference enregistree.";
            notice.className = "notice success";
            refreshSaveButtonState();
          } catch (_) {
            notice.textContent = "Erreur reseau. Reessayez.";
            refreshSaveButtonState();
          }
        });

        refreshSaveButtonState();
        return card;
      }

      function buildPasswordCard() {
        const card = document.createElement("div");
        card.className = "card";

        const title = document.createElement("div");
        title.className = "section-title";
        title.textContent = "Changer mon mot de passe";
        card.appendChild(title);

        const form = document.createElement("form");
        form.id = "changePasswordForm";
        form.innerHTML = [
          '<div class="field-group">',
          '  <label class="field-label" for="currentPassword">Mot de passe actuel</label>',
          '  <div class="password-field-wrap">',
          '    <input type="password" id="currentPassword" autocomplete="current-password" required>',
          '    <button type="button" class="toggle-password-btn" data-target="currentPassword">Voir</button>',
          '  </div>',
          '</div>',
          '<div class="field-group">',
          '  <label class="field-label" for="newPassword">Nouveau mot de passe</label>',
          '  <div class="password-field-wrap">',
          '    <input type="password" id="newPassword" autocomplete="new-password" required>',
          '    <button type="button" class="toggle-password-btn" data-target="newPassword">Voir</button>',
          '  </div>',
          '</div>',
          '<div class="field-group">',
          '  <label class="field-label" for="confirmNewPassword">Confirmer le nouveau mot de passe</label>',
          '  <div class="password-field-wrap">',
          '    <input type="password" id="confirmNewPassword" autocomplete="new-password" required>',
          '    <button type="button" class="toggle-password-btn" data-target="confirmNewPassword">Voir</button>',
          '  </div>',
          '</div>',
          '<button type="submit" class="action-btn" id="changePasswordBtn" disabled>Enregistrer</button>',
          '<div class="notice" id="changePasswordNotice"></div>'
        ].join('');
        form.addEventListener("submit", handlePasswordChange);
        card.appendChild(form);

        initPasswordToggles(card);
        initChangePasswordButtonState(form);
        return card;
      }

      function initChangePasswordButtonState(form) {
        const currentInput = form.querySelector("#currentPassword");
        const newInput = form.querySelector("#newPassword");
        const confirmInput = form.querySelector("#confirmNewPassword");
        const btn = form.querySelector("#changePasswordBtn");
        if (!currentInput || !newInput || !confirmInput || !btn) return;

        const refresh = () => {
          const currentValue = String(currentInput.value || "");
          const newValue = String(newInput.value || "");
          const confirmValue = String(confirmInput.value || "");
          const ready = currentValue.length > 0 && newValue.length > 0 && confirmValue.length > 0 && newValue === confirmValue;
          btn.disabled = !ready;
          btn.classList.toggle("is-ready", ready);
        };

        currentInput.addEventListener("input", refresh);
        newInput.addEventListener("input", refresh);
        confirmInput.addEventListener("input", refresh);
        refresh();
      }

      function initPasswordToggles(root) {
        root.querySelectorAll(".toggle-password-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            const targetId = btn.getAttribute("data-target");
            const input = targetId ? document.getElementById(targetId) : null;
            if (!input) return;
            const isHidden = input.type === "password";
            input.type = isHidden ? "text" : "password";
            btn.textContent = isHidden ? "Masquer" : "Voir";
          });
        });
      }

      async function handlePasswordChange(event) {
        event.preventDefault();
        const notice = document.getElementById("changePasswordNotice");
        const btn = document.getElementById("changePasswordBtn");
        const currentPassword = String(document.getElementById("currentPassword").value || "");
        const newPassword = String(document.getElementById("newPassword").value || "");
        const confirmNewPassword = String(document.getElementById("confirmNewPassword").value || "");

        notice.textContent = "";
        notice.className = "notice";

        if (!currentPassword || !newPassword || !confirmNewPassword) {
          notice.textContent = "Veuillez remplir tous les champs.";
          return;
        }

        if (newPassword !== confirmNewPassword) {
          notice.textContent = "Les nouveaux mots de passe ne correspondent pas.";
          return;
        }

        if (newPassword.length < 10) {
          notice.textContent = "Le mot de passe doit faire au moins 10 caractères.";
          return;
        }

        btn.disabled = true;
        try {
          const res = await fetch("/api/auth/change-password", {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ currentPassword, newPassword })
          });
          const data = await res.json().catch(() => ({}));

          if (res.ok && data.success) {
            notice.textContent = "Mot de passe mis à jour.";
            notice.className = "notice success";
            event.target.reset();
            event.target.querySelectorAll('.toggle-password-btn').forEach(btnEl => {
              btnEl.textContent = 'Voir';
            });
            btn.classList.remove("is-ready");
          } else {
            notice.textContent = data.error || "Impossible de changer le mot de passe.";
          }
        } catch (_) {
          notice.textContent = "Erreur réseau. Réessayez.";
        } finally {
          const currentValue = String(document.getElementById("currentPassword").value || "");
          const newValue = String(document.getElementById("newPassword").value || "");
          const confirmValue = String(document.getElementById("confirmNewPassword").value || "");
          const ready = currentValue.length > 0 && newValue.length > 0 && confirmValue.length > 0 && newValue === confirmValue;
          btn.disabled = !ready;
          btn.classList.toggle("is-ready", ready);
        }
      }

      window.handleLogout = async function handleLogout() {
        try {
          await fetch("/api/auth/logout", { method: "POST", credentials: "include" });
        } catch (_) {}
        navigateAway("/");
      };

      function showError(msg) {
        const main = document.getElementById("mainContent");
        main.innerHTML = "";
        const err = document.createElement("div");
        err.className = "error-notice";
        err.textContent = msg;
        main.appendChild(err);
      }

      init();
    })();
  </script>
</body>
</html>
