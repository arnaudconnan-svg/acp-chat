<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat ACP</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffffff">

<style>
body{
font-family: Arial;
max-width:600px;
margin:40px auto;
}

#chat{
border:1px solid #ccc;
padding:10px;
height:300px;
overflow-y:auto;
margin-bottom:10px;
}

.message{
margin:5px 0;
}
</style>

</head>

<body>

<h2>Prototype Chat ACP - Bêta</h2>

<div id="chat"></div>

<input id="input" type="text" placeholder="Écrire..." style="width:80%">
<button onclick="send()">Envoyer</button>

<script>

const MEMORY_KEY = "acp_chat_history_v1";
const MAX_TURNS = 20; // 20 tours = 40 messages

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(MEMORY_KEY) || "[]"); }
  catch { return []; }
}

function saveHistory(h) {
  localStorage.setItem(MEMORY_KEY, JSON.stringify(h));
}

function pushMsg(role, content) {
  const h = loadHistory();
  h.push({ role, content, t: Date.now() });
  const trimmed = h.slice(-MAX_TURNS * 2);
  saveHistory(trimmed);
  return trimmed;
}

function clearHistory() {
  localStorage.removeItem(MEMORY_KEY);
}

async function send(){

const input = document.getElementById("input")
const chat = document.getElementById("chat")

const text = input.value

if(text === "") return

const historyAfterUser = pushMsg("user", text);

const userMessage = document.createElement("div")
userMessage.className = "message"
userMessage.textContent = "Utilisateur : " + text

chat.appendChild(userMessage)

input.value = ""

const response = await fetch("/chat", {

method: "POST",

headers: {
"Content-Type": "application/json"
},

body: JSON.stringify({
  message: text,
  history: historyAfterUser
})

})

const data = await response.json()

pushMsg("assistant", data.reply);

const botMessage = document.createElement("div")
botMessage.className = "message"
botMessage.textContent = "Chatbot : " + data.reply

chat.appendChild(botMessage)

chat.scrollTop = chat.scrollHeight

}

</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>

</body>
</html>
