<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ACP Chat</title>
<script src="app-config.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    document.title = window.APP_CONFIG.title;
    document.getElementById("pageTitle").textContent = window.APP_CONFIG.title;
  });
</script>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: white;
  overscroll-behavior-y: none;
}

body {
  font-family: Arial, sans-serif;
  box-sizing: border-box;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  padding: 12px;
  background: white;
  overflow-x: hidden;
}

#topBar {
  flex: 0 0 auto;
  background: white;
  position: sticky;
  top: 0;
  z-index: 5;
  padding-bottom: 4px;
}

h2 {
  text-align: center;
  font-size: 22px;
  margin: 10px 0 16px 0;
}

#chat {
  border: 1px solid #ccc;
  padding: 12px;
  flex: 1 1 auto;
  min-height: 220px;
  overflow-y: auto;
  margin: 8px 0 10px 0;
  font-size: 16px;
  line-height: 1.4;
  box-sizing: border-box;
  scroll-padding-bottom: 220px;
  
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}

#inputArea {
  flex: 0 0 auto;
  background: white;
  position: sticky;
  bottom: 0;
  z-index: 6;
  padding-top: 6px;
  padding-bottom: 8px;
}

#input {
  width: 100%;
  font-size: 18px;
  padding: 12px;
  box-sizing: border-box;
  min-height: 72px;
  max-height: 150px;
  resize: none;
  overflow-y: hidden;
  font-family: inherit;
  line-height: 1.4;
}

.actions {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin-top: 8px;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}

button {
  font-size: 18px;
  padding: 10px 16px;
}

#editLastBtn {
  display: none;
  background: none;
  border: none;
  font-size: 13px;
  color: #666;
  cursor: pointer;
  padding: 0;
}

#editLastBtn:hover {
  text-decoration: underline;
}

.message {
  margin: 14px 0;
  display: flex;
}

.message.user {
  justify-content: flex-end;
}

.message.bot {
  justify-content: flex-start;
}

.bubble {
  max-width: 80%;
  padding: 12px 14px;
  border-radius: 14px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: break-word;
}

.user .bubble {
  background: #d8ecff;
}

.bot .bubble {
  background: #f1f1f1;
}

.system-message {
  text-align: center;
  font-size: 13px;
  color: #666;
  margin: 10px 0;
  font-style: italic;
}

.glossary-term {
  text-decoration: underline dotted;
  cursor: pointer;
}

#glossaryModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  display: none;
  align-items: flex-end;
  justify-content: center;
  padding: 0;
  z-index: 1000;
}

#glossaryBox {
  background: white;
  width: calc(100% - 24px);
  max-width: 640px;
  margin: 0 12px 12px 12px;
  border-radius: 14px 14px 0 0;
  padding: 18px 18px 12px 18px;
  box-shadow: 0 -8px 30px rgba(0,0,0,0.25);
  font-size: 16px;
  display: flex;
  flex-direction: column;
}

#glossaryBox::before {
  content: "";
  width: 40px;
  height: 4px;
  background: #ccc;
  border-radius: 2px;
  align-self: center;
  margin-bottom: 10px;
}

#glossaryContent {
  margin-bottom: 14px;
  line-height: 1.5;
}

#glossaryBox button {
  align-self: flex-end;
  font-size: 14px;
  padding: 6px 10px;
  border: none;
  background: transparent;
  color: #666;
  cursor: pointer;
}

#glossaryBox button:hover {
  text-decoration: underline;
}

</style>
</head>

<body>

<div id="topBar">
  <h2 id="pageTitle">ACP Chat</h2>
</div>

<div id="chat"></div>

<div id="inputArea">
  <textarea id="input" placeholder="Écrire..."></textarea>

  <div class="actions">
    <button id="editLastBtn" onclick="editLastTurn()">modifier</button>
    <button id="sendBtn" onclick="send()">Envoyer</button>
  </div>
</div>

<div id="glossaryModal">
  <div id="glossaryBox">
    <div id="glossaryContent"></div>
    <button onclick="closeGlossary()">fermer</button>
  </div>
</div>

<script>

const SESSION_TIMEOUT = 30 * 60 * 1000;
const MAX_HISTORY_FOR_SERVER = 20;

const SESSION_KEY = "acp_session_history_v1";
const SUMMARY_KEY = "acp_longterm_summary_v1";
const FLAGS_KEY   = "acp_state_flags_v1";

const GLOSSARY = {
  "centre d’évaluation interne": {
    definition: "Capacité de la personne à sentir, évaluer et orienter son expérience à partir d’elle-même plutôt qu’à partir d’une autorité extérieure."
  },
  "centre d'evaluation interne": {
    alias: "centre d’évaluation interne"
  }
};

let sessionExpiredAtLoad = false;
let isSending = false;



function loadSessionHistory() {
  try {
    return JSON.parse(localStorage.getItem(SESSION_KEY) || "[]");
  } catch {
    return [];
  }
}

function saveSessionHistory(history) {
  localStorage.setItem(SESSION_KEY, JSON.stringify(history));
}

function pushMsg(role, content) {
  const now = Date.now();
  const oldHistory = loadSessionHistory();

  let previousHistory = [];
  let history = oldHistory;
  let isNewSession = false;

  if (oldHistory.length > 0) {
    const lastTime = oldHistory[oldHistory.length - 1].t;
    const gap = now - lastTime;

    if (gap > SESSION_TIMEOUT) {
      previousHistory = oldHistory;
      history = [];
      isNewSession = true;
    }
  } else {
    isNewSession = true;
  }

  history.push({ role, content, t: now });
  saveSessionHistory(history);

  return { previousHistory, history, isNewSession };
}

function addAssistantToCurrentSession(content) {
  const history = loadSessionHistory();

  history.push({
    role: "assistant",
    content,
    t: Date.now()
  });

  saveSessionHistory(history);
}

function isSessionExpired() {
  const history = loadSessionHistory();

  if (!history.length) return false;

  const lastTime = history[history.length - 1].t;
  return Date.now() - lastTime > SESSION_TIMEOUT;
}



function loadSummary() {
  return localStorage.getItem(SUMMARY_KEY) || "";
}

function saveSummary(summary) {
  localStorage.setItem(SUMMARY_KEY, summary);
}



function normalizeFlags(flags) {
  return (flags && typeof flags === "object") ? flags : {};
}

function loadFlags() {
  try {
    return normalizeFlags(JSON.parse(localStorage.getItem(FLAGS_KEY) || "{}"));
  } catch {
    return normalizeFlags({});
  }
}

function saveFlags(flags) {
  localStorage.setItem(FLAGS_KEY, JSON.stringify(normalizeFlags(flags)));
}



function escapeRegExp(text) {
  return text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function escapeHTML(text) {
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function applyGlossary(text) {
  let result = escapeHTML(text);

  const terms = Object.keys(GLOSSARY).sort((a, b) => b.length - a.length);

  terms.forEach(term => {
    const entry = GLOSSARY[term];
    const canonicalTerm = entry.alias || term;
    const escapedTerm = escapeRegExp(term);
    const regex = new RegExp(`\\b${escapedTerm}\\b`, "gi");

    result = result.replace(regex, match => {
      const safeCanonical = canonicalTerm.replace(/'/g, "\\'");
      return `<span class="glossary-term" onclick="showDefinition('${safeCanonical}')">${match}</span>`;
    });
  });

  return result;
}

function showDefinition(term) {
  const entry = GLOSSARY[term];
  if (!entry) return;

  const modal = document.getElementById("glossaryModal");
  const content = document.getElementById("glossaryContent");

  content.textContent = entry.definition;
  modal.style.display = "flex";
}

function closeGlossary() {
  document.getElementById("glossaryModal").style.display = "none";
}



function isUserNearBottom() {
  const chat = document.getElementById("chat");
  const threshold = 120;
  return chat.scrollHeight - chat.scrollTop - chat.clientHeight < threshold;
}

function scrollChatToBottom() {
  const chat = document.getElementById("chat");
  chat.scrollTop = chat.scrollHeight;
}

function ensureLastUserVisibleAboveInput() {
  const chat = document.getElementById("chat");
  const inputArea = document.getElementById("inputArea");
  const userMessages = chat.querySelectorAll(".message.user");
  const lastUser = userMessages[userMessages.length - 1];

  if (!lastUser) return;

  const chatRect = chat.getBoundingClientRect();
  const inputRect = inputArea.getBoundingClientRect();
  const userRect = lastUser.getBoundingClientRect();

  const visibleBottom = Math.min(chatRect.bottom, inputRect.top) - 12;

  if (userRect.bottom > visibleBottom) {
    chat.scrollTop += (userRect.bottom - visibleBottom);
  }
}

function addMessage(roleLabel, text) {
  const chat = document.getElementById("chat");

  const msg = document.createElement("div");
  const roleClass = roleLabel === "Utilisateur" ? "user" : "bot";

  msg.className = "message " + roleClass;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = applyGlossary(text);

  msg.appendChild(bubble);
  chat.appendChild(msg);

  if (roleLabel === "Utilisateur") {
    requestAnimationFrame(() => {
      scrollChatToBottom();
      ensureLastUserVisibleAboveInput();
    });
  }
}

function addMessageSilently(roleLabel, text) {
  const chat = document.getElementById("chat");

  const msg = document.createElement("div");
  const roleClass = roleLabel === "Utilisateur" ? "user" : "bot";

  msg.className = "message " + roleClass;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = applyGlossary(text);

  msg.appendChild(bubble);
  chat.appendChild(msg);
}

function addSystemMessage(text) {
  const chat = document.getElementById("chat");

  const msg = document.createElement("div");
  msg.className = "system-message";
  msg.textContent = text;

  chat.appendChild(msg);
  scrollChatToBottom();
}

function rehydrateChatFromSession() {
  const chat = document.getElementById("chat");
  const history = loadSessionHistory();

  chat.innerHTML = "";

  for (const msg of history) {
    if (msg.role === "user") {
      addMessageSilently("Utilisateur", msg.content);
    } else if (msg.role === "assistant") {
      addMessageSilently("Chatbot", msg.content);
    }
  }

  scrollChatToBottom();
  updateEditButtonVisibility();
}

function scrollToLastUserMessage() {
  const chat = document.getElementById("chat");
  const userMessages = chat.querySelectorAll(".message.user");
  const lastUser = userMessages[userMessages.length - 1];

  if (!lastUser) return;

  lastUser.scrollIntoView({
    block: "end",
    behavior: "instant"
  });

  ensureLastUserVisibleAboveInput();
}

function addBotReply(text) {
  const shouldScroll = isUserNearBottom();

  addAssistantToCurrentSession(text);
  addMessage("Chatbot", text);

  if (shouldScroll) {
    requestAnimationFrame(() => {
      scrollToLastUserMessage();
    });
  }

  updateEditButtonVisibility();
}

function autoResizeInput() {
  const input = document.getElementById("input");
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 150) + "px";
}

function canEditLastTurn() {
  if (sessionExpiredAtLoad) return false;

  const history = loadSessionHistory();
  if (history.length < 2) return false;

  const last = history[history.length - 1];
  const beforeLast = history[history.length - 2];

  return beforeLast.role === "user" && last.role === "assistant";
}

function updateEditButtonVisibility() {
  const btn = document.getElementById("editLastBtn");
  btn.style.display = canEditLastTurn() ? "inline-block" : "none";
}

function editLastTurn() {
  if (sessionExpiredAtLoad) return;

  const history = loadSessionHistory();
  if (history.length < 2) return;

  const last = history[history.length - 1];
  const beforeLast = history[history.length - 2];

  if (!(beforeLast.role === "user" && last.role === "assistant")) return;

  const input = document.getElementById("input");
  input.value = beforeLast.content;

  history.splice(-2, 2);
  saveSessionHistory(history);

  rehydrateChatFromSession();
  autoResizeInput();
  input.focus();

  const len = input.value.length;
  input.setSelectionRange(len, len);
}

function setSendingState(sending) {
  isSending = sending;
  document.getElementById("sendBtn").disabled = sending;
  document.getElementById("editLastBtn").disabled = sending;
}



async function send() {
  if (isSending) return;

  const input = document.getElementById("input");
  const text = input.value.trim();

  if (!text) return;

  setSendingState(true);

  const pushed = pushMsg("user", text);

  const historyAfterUser = pushed.history;
  const previousHistory = pushed.previousHistory;
  const isNewSession = pushed.isNewSession;

  const historyForServer = historyAfterUser.slice(-MAX_HISTORY_FOR_SERVER);
  const previousHistoryForServer = previousHistory.slice(-MAX_HISTORY_FOR_SERVER);
  const safeIsNewSession = isNewSession && previousHistoryForServer.length > 0;

  addMessage("Utilisateur", text);
  updateEditButtonVisibility();

  input.value = "";
  input.style.height = "auto";
  input.style.height = "72px";

  try {
    const response = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message: text,
        history: historyForServer,
        previousHistory: previousHistoryForServer,
        summary: loadSummary(),
        flags: loadFlags(),
        isNewSession: safeIsNewSession
      })
    });

    if (!response.ok) {
      throw new Error("Réponse serveur invalide");
    }

    const data = await response.json();

    if (data.summary) saveSummary(data.summary);
    if (data.flags) saveFlags(data.flags);

    if (data.sessionRestarted) {
      sessionExpiredAtLoad = false;
    }

    if (!data.reply || !String(data.reply).trim()) {
      addSystemMessage("La réponse n’a pas pu être récupérée. Réessaie.");
      return;
    }

    addBotReply(data.reply);

  } catch (err) {
    console.error("Erreur envoi message :", err);
    addSystemMessage("La réponse n’a pas pu être récupérée. Réessaie.");
  } finally {
    setSendingState(false);
    updateEditButtonVisibility();
  }
}



document.addEventListener("DOMContentLoaded", function() {
  autoResizeInput();

  document.getElementById("glossaryModal").onclick = function(e) {
    if (e.target.id === "glossaryModal") closeGlossary();
  };

  if (isSessionExpired()) {
    saveSessionHistory([]);
    document.getElementById("chat").innerHTML = "";

    addSystemMessage(
      "La session précédente a pris fin après 30 minutes d’inactivité. Elle a été mémorisée sous forme de résumé pour maintenir la fluidité de la conversation."
    );

    sessionExpiredAtLoad = true;
    updateEditButtonVisibility();
  } else {
    rehydrateChatFromSession();
  }
});

document.getElementById("input").addEventListener("input", autoResizeInput);

document.getElementById("input").addEventListener("keydown", function(event) {
  if (event.key === "Enter" && event.ctrlKey) {
    event.preventDefault();
    send();
  }
});

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}

</script>

</body>
</html>
