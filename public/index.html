<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prototype Chat ACP - Bêta</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body { font-family: Arial, sans-serif; margin: 25px; }

  h2 { text-align: center; font-size: 32px; margin-bottom: 20px; }

  #chat {
    border: 1px solid #ccc;
    padding: 16px;
    height: 60vh;
    overflow-y: auto;
    margin: 12px 0;
    font-size: 16px;
    line-height: 1.4;
  }

  #input {
    width: 100%;
    font-size: 18px;
    padding: 12px;
    box-sizing: border-box;
    margin-bottom: 12px;
  }

  button {
    display: inline-block;
    font-size: 14px;
    padding: 6px 10px;
    margin: 4px 4px 0 0;
  }

  .main-btn {
    display: block;
    margin: 0 auto;
    font-size: 20px;
    padding: 12px 18px;
  }

  .message { margin: 12px 0; }
  .role { font-weight: bold; }

  .theory-box {
    border-left: 4px solid #888;
    background: #f5f5f5;
    padding: 10px;
    margin: 12px 0;
    font-size: 14px;
  }

  .theory-title {
    font-weight: bold;
    margin-bottom: 6px;
  }
</style>
</head>

<body>

<h2>Prototype Chat ACP - Bêta</h2>

<div id="chat"></div>

<input id="input" type="text" placeholder="Écrire...">
<button class="main-btn" onclick="send()">Envoyer</button>

<script>
const SESSION_TIMEOUT = 30 * 60 * 1000;

const SESSION_KEY = "acp_session_history_v1";
const SUMMARY_KEY = "acp_longterm_summary_v1";
const FLAGS_KEY   = "acp_state_flags_v1";

function loadSessionHistory() {
  try { return JSON.parse(localStorage.getItem(SESSION_KEY) || "[]"); }
  catch { return []; }
}

function saveSessionHistory(h) {
  localStorage.setItem(SESSION_KEY, JSON.stringify(h));
}

function pushMsg(role, content) {
  const now = Date.now();
  let history = loadSessionHistory();
  let isNewSession = false;

  if (history.length > 0) {
    const gap = now - history[history.length - 1].t;
    if (gap > SESSION_TIMEOUT) {
      history = [];
      isNewSession = true;
    }
  } else {
    isNewSession = true;
  }

  history.push({ role, content, t: now });
  saveSessionHistory(history);

  return { history, isNewSession };
}

function loadSummary() {
  return localStorage.getItem(SUMMARY_KEY) || "";
}

function saveSummary(text) {
  localStorage.setItem(SUMMARY_KEY, text);
}

function loadFlags() {
  try { return JSON.parse(localStorage.getItem(FLAGS_KEY) || "{}"); }
  catch { return {}; }
}

function saveFlags(flags) {
  localStorage.setItem(FLAGS_KEY, JSON.stringify(flags));
}

function addMessage(roleLabel, text) {
  const chat = document.getElementById("chat");
  const msg = document.createElement("div");
  msg.className = "message";
  msg.innerHTML = "<span class='role'>" + roleLabel + " :</span> " + text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function addTheoryBox(theory) {
  const chat = document.getElementById("chat");
  const box = document.createElement("div");
  box.className = "theory-box";

  box.innerHTML = `
    <div class="theory-title">💬 ${theory.offer}</div>
    <button onclick="showTheory(this)">Afficher</button>
    <button onclick="dismissTheory(this)">Plus tard</button>
    <button onclick="disableTheory(this)">Ne plus proposer</button>
  `;

  box.dataset.content = theory.content;
  chat.appendChild(box);
  chat.scrollTop = chat.scrollHeight;
}

function showTheory(btn) {
  const box = btn.parentElement;
  box.innerHTML = "<div>" + box.dataset.content + "</div>";
}

function dismissTheory(btn) {
  btn.parentElement.remove();
}

function disableTheory(btn) {
  const flags = loadFlags();
  flags.noTheory = true;
  saveFlags(flags);
  btn.parentElement.remove();
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  const pushed = pushMsg("user", text);
  const historyAfterUser = pushed.history;
  const isNewSession = pushed.isNewSession;

  addMessage("Utilisateur", text);
  input.value = "";

  const response = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      message: text,
      history: historyAfterUser,
      summary: loadSummary(),
      flags: loadFlags(),
      isNewSession
    })
  });

  const data = await response.json();
  alert(JSON.stringify(data, null, 2));

  pushMsg("assistant", data.reply);
  addMessage("Chatbot", data.reply);

  if (data.summary) saveSummary(data.summary);
  if (data.flags) saveFlags(data.flags);

  if (data.theory && !loadFlags().noTheory) {
    addTheoryBox(data.theory);
  }
}

document.getElementById("input").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});
</script>

</body>
</html>
