<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Facilitat.io</title>
<link rel="manifest" href="/manifest.json">
<link rel="preload" as="image" href="/images/logo.png">
<meta name="theme-color" content="#ffffff">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: white;
  overflow: hidden;
}

body {
  font-family: Arial, sans-serif;
  box-sizing: border-box;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 12px;
}

/* ---------- ÉCRANS ---------- */

.screen {
  display: none;
  height: 100%;
}

.screen.active {
  display: flex;
  flex-direction: column;
}

/* ---------- WELCOME ---------- */

#welcomeScreen {
  justify-content: center;
  align-items: center;
  text-align: center;
}

#welcomeLogo {
  width: 160px;
  margin-bottom: 20px;
}

.welcomeBtnPrimary {
  border: none;
  background: #245e66;
  color: white;
  padding: 12px 18px;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
}

/* ---------- CHAT ---------- */

#topBar {
  position: relative;
  text-align: center;
}

#refreshBtn {
  position: absolute;
  right: 0;
  top: 8px;
  font-size: 20px;
  background: none;
  border: none;
  cursor: pointer;
}

h2 {
  margin: 10px 0 16px 0;
}

#chat {
  border: 1px solid #ccc;
  padding: 12px;
  flex: 1;
  overflow-y: auto;
  margin: 8px 0;
}

#input {
  width: 100%;
  font-size: 18px;
  padding: 12px;
  min-height: 72px;
  max-height: 150px;
  resize: none;
}

.actions {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 8px;
}

button {
  font-size: 16px;
  padding: 8px 14px;
  cursor: pointer;
}

#editLastBtn {
  display: none;
  background: none;
  border: none;
  font-size: 13px;
  color: #666;
}

#editLastBtn:hover {
  text-decoration: underline;
}

/* ---------- MESSAGES ---------- */

.message {
  margin: 12px 0;
  display: flex;
}

.message.user {
  justify-content: flex-end;
}

.message.bot {
  justify-content: flex-start;
}

.bubble {
  padding: 10px 12px;
  border-radius: 12px;
  max-width: 75%;
  white-space: pre-wrap;
}

.user .bubble {
  background: #d8ecff;
}

.bot .bubble {
  background: #f1f1f1;
}

.debug-block {
  font-size: 11px;
  color: #666;
  margin-bottom: 4px;
}
</style>
</head>

<body>

<!-- WELCOME -->
<div id="welcomeScreen" class="screen active">
  <div>
    <img id="welcomeLogo" src="/images/logo.png" alt="logo">
    <p>Un miroir conversationnel</p>
    <button class="welcomeBtnPrimary" onclick="enterChat()">Entrer</button>
  </div>
</div>

<!-- CHAT -->
<div id="chatScreen" class="screen">
  <div id="topBar">
    <h2>Facilitat.io</h2>
    <button id="refreshBtn" onclick="location.reload()">↻</button>
  </div>

  <div id="chat"></div>

  <textarea id="input" placeholder="Écrire..."></textarea>

  <div class="actions">
    <button id="editLastBtn">modifier</button>
    <button id="sendBtn">Envoyer</button>
  </div>
</div>

<script>
const SESSION_KEY = "facilitatio_v0_history";
const MEMORY_KEY = "facilitatio_v0_memory";
const MAX_RECENT_TURNS = 8;

let isSending = false;

/* ---------- MEMORY ---------- */

function defaultMemory() {
  return [
    "Thèmes déjà évoqués :",
    "- ",
    "",
    "Points de vigilance relationnels :",
    "- ",
    "",
    "Questions encore ouvertes :",
    "- "
  ].join("\n");
}

function loadMemory() {
  return localStorage.getItem(MEMORY_KEY) || defaultMemory();
}

function saveMemory(memory) {
  localStorage.setItem(MEMORY_KEY, memory);
}

/* ---------- HISTORY ---------- */

function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem(SESSION_KEY) || "[]");
  } catch {
    return [];
  }
}

function saveHistory(history) {
  localStorage.setItem(SESSION_KEY, JSON.stringify(history));
}

function pushHistory(role, content, debug = []) {
  const history = loadHistory();
  history.push({ role, content, debug });
  saveHistory(history);
}

/* ---------- UI ---------- */

function showScreen(id) {
  document.getElementById("welcomeScreen").classList.remove("active");
  document.getElementById("chatScreen").classList.remove("active");
  document.getElementById(id).classList.add("active");
}

function enterChat() {
  showScreen("chatScreen");
}

function addMessage(role, text, debug = []) {
  const chat = document.getElementById("chat");

  const msg = document.createElement("div");
  msg.className = "message " + role;

  const wrap = document.createElement("div");

  if (role === "bot" && debug.length) {
    const dbg = document.createElement("div");
    dbg.className = "debug-block";
    dbg.textContent = debug.join(" | ");
    wrap.appendChild(dbg);
  }

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;

  wrap.appendChild(bubble);
  msg.appendChild(wrap);
  chat.appendChild(msg);

  chat.scrollTop = chat.scrollHeight;
}

function renderHistory() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  loadHistory().forEach(m => {
    addMessage(m.role === "user" ? "user" : "bot", m.content, m.debug || []);
  });

  updateEditButtonVisibility();
}

/* ---------- EDIT ---------- */

function canEditLastTurn() {
  const h = loadHistory();
  if (h.length < 2) return false;
  return h[h.length-2].role === "user" && h[h.length-1].role === "assistant";
}

function updateEditButtonVisibility() {
  document.getElementById("editLastBtn").style.display =
    canEditLastTurn() ? "inline-block" : "none";
}

function editLastTurn() {
  const h = loadHistory();
  if (!canEditLastTurn()) return;

  const input = document.getElementById("input");
  input.value = h[h.length-2].content;

  h.splice(-2, 2);
  saveHistory(h);

  renderHistory();
  input.focus();
}

/* ---------- SEND ---------- */

function buildPayload(message) {
  const full = loadHistory().map(({role,content}) => ({role,content}));
  return {
    message,
    recentHistory: full.slice(-MAX_RECENT_TURNS),
    fullHistory: full,
    memory: loadMemory()
  };
}

async function send() {
  if (isSending) return;

  const input = document.getElementById("input");
  const message = input.value.trim();
  if (!message) return;

  isSending = true;

  pushHistory("user", message);
  addMessage("user", message);

  input.value = "";
  updateEditButtonVisibility();

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(buildPayload(message))
    });

    const data = await res.json();

    if (data.memory) saveMemory(data.memory);

    pushHistory("assistant", data.reply, data.debug || []);
    addMessage("bot", data.reply, data.debug || []);

  } catch {
    addMessage("bot", "Erreur serveur");
  }

  isSending = false;
  updateEditButtonVisibility();
}

/* ---------- EVENTS ---------- */

document.getElementById("sendBtn").onclick = send;
document.getElementById("editLastBtn").onclick = editLastTurn;

document.getElementById("input").addEventListener("keydown", e => {
  if (e.key === "Enter" && e.ctrlKey) {
    e.preventDefault();
    send();
  }
});

window.onload = () => {
  renderHistory();
};

/* ---------- SW ---------- */

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>

</body>
</html>
