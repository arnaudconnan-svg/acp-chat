<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ACP Chat</title>
<script src="app-config.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    document.title = window.APP_CONFIG.title;
    document.getElementById("pageTitle").textContent = window.APP_CONFIG.title;
  });
</script>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 25px;
  }

  h2 {
    text-align: center;
    font-size: 32px;
    margin-bottom: 20px;
  }

  #chat {
    border: 1px solid #ccc;
    padding: 16px;
    height: 60vh;
    overflow-y: auto;
    margin: 12px 0;
    font-size: 16px;
    line-height: 1.4;
  }

  #input {
    width: 100%;
    font-size: 18px;
    padding: 12px;
    box-sizing: border-box;
    margin-bottom: 12px;
    min-height: 80px;
    max-height: 240px;
    resize: none;
    overflow-y: hidden;
    font-family: inherit;
    line-height: 1.4;
  }

  button {
    display: block;
    margin: 0 auto;
    font-size: 20px;
    padding: 12px 18px;
  }

  .message {
    margin: 18px 0;
    display: flex;
  }

  .message.user {
    justify-content: flex-end;
  }

  .message.bot {
    justify-content: flex-start;
  }

  .bubble {
  max-width: 80%;
  padding: 12px 14px;
  border-radius: 14px;
  line-height: 1.5;
  white-space: pre-wrap;
  
  word-break: break-word;
  overflow-wrap: break-word;
}

  .user .bubble {
    background: #d8ecff;
  }

  .bot .bubble {
    background: #f1f1f1;
  }

  .program-message {
    border-left: 4px solid #999;
    padding-left: 12px;
    margin: 20px 0;
  }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  #popup {
    background: #ffffff;
    width: 85%;
    max-width: 420px;
    border-radius: 18px;
    padding: 22px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    text-align: center;
  }

  #popupText {
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 18px;
  }

  .popup-buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .popup-buttons button {
    margin: 0;
    font-size: 18px;
    padding: 12px;
  }
</style>
</head>

<body>

<h2 id="pageTitle">ACP Chat</h2>

<div id="chat"></div>

<textarea id="input" placeholder="Écrire..."></textarea>
<button onclick="send()">Envoyer</button>

<div id="overlay">
  <div id="popup">
    <p id="popupText"></p>
    <div id="popupButtons" class="popup-buttons"></div>
  </div>
</div>

<script>

const SESSION_TIMEOUT = 30 * 60 * 1000;

const SESSION_KEY = "acp_session_history_v1";
const SUMMARY_KEY = "acp_longterm_summary_v1";
const FLAGS_KEY   = "acp_state_flags_v1";

let pendingReply = null;
let pendingTheory = null;


// --------------------
// Mémoire session
// --------------------

function loadSessionHistory() {
  try {
    return JSON.parse(localStorage.getItem(SESSION_KEY) || "[]");
  } catch {
    return [];
  }
}

function saveSessionHistory(history) {
  localStorage.setItem(SESSION_KEY, JSON.stringify(history));
}

function pushMsg(role, content) {

  const now = Date.now();
  const oldHistory = loadSessionHistory();

  let previousHistory = [];
  let history = oldHistory;
  let isNewSession = false;

  if (oldHistory.length > 0) {

    const lastTime = oldHistory[oldHistory.length - 1].t;
    const gap = now - lastTime;

    if (gap > SESSION_TIMEOUT) {
      previousHistory = oldHistory;
      history = [];
      isNewSession = true;
    }
  }

  else {
    isNewSession = true;
  }

  history.push({ role, content, t: now });

  saveSessionHistory(history);

  return { previousHistory, history, isNewSession };

}

function addAssistantToCurrentSession(content) {

  const history = loadSessionHistory();

  history.push({ role: "assistant", content, t: Date.now() });

  saveSessionHistory(history);

}


// --------------------
// Mémoire long terme
// --------------------

function loadSummary() {
  return localStorage.getItem(SUMMARY_KEY) || "";
}

function saveSummary(summary) {
  localStorage.setItem(SUMMARY_KEY, summary);
}


// --------------------
// Flags
// --------------------

function normalizeFlags(flags) {

  const safe = (flags && typeof flags === "object") ? flags : {};

  if (!safe.theoryPrefs || typeof safe.theoryPrefs !== "object") {
    safe.theoryPrefs = {};
  }

  return safe;

}

function loadFlags() {

  try {
    return normalizeFlags(JSON.parse(localStorage.getItem(FLAGS_KEY) || "{}"));
  }

  catch {
    return normalizeFlags({});
  }

}

function saveFlags(flags) {
  localStorage.setItem(FLAGS_KEY, JSON.stringify(normalizeFlags(flags)));
}

function isTheoryDisabled(themeKey) {

  const flags = loadFlags();

  return flags.theoryPrefs?.[themeKey]?.disabled === true;

}

function disableTheory(themeKey) {

  const flags = loadFlags();

  if (!flags.theoryPrefs) flags.theoryPrefs = {};

  if (!flags.theoryPrefs[themeKey]) flags.theoryPrefs[themeKey] = {};

  flags.theoryPrefs[themeKey].disabled = true;

  saveFlags(flags);

}


// --------------------
// UI helpers
// --------------------

function isUserNearBottom() {
  const chat = document.getElementById("chat");
  const threshold = 120;
  return chat.scrollHeight - chat.scrollTop - chat.clientHeight < threshold;
}

function addMessage(roleLabel, text) {

  const chat = document.getElementById("chat");

  const msg = document.createElement("div");

  const roleClass = roleLabel === "Utilisateur" ? "user" : "bot";

  msg.className = "message " + roleClass;

  const bubble = document.createElement("div");

  bubble.className = "bubble";

  bubble.textContent = text;

  msg.appendChild(bubble);

  chat.appendChild(msg);

  if (roleLabel === "Utilisateur") {
    chat.scrollTop = chat.scrollHeight;
  }

}

function addProgramMessage(text) {

  const chat = document.getElementById("chat");

  const msg = document.createElement("div");

  msg.className = "message program-message";

  msg.innerHTML = "<span class='role'>Programme :</span> " + text;

  chat.appendChild(msg);

  chat.scrollTop = chat.scrollHeight;

}

function scrollToLastUserMessage() {
  const userMessages = document.querySelectorAll(".message.user");
  const lastUser = userMessages[userMessages.length - 1];
  
  if (!lastUser) return;
  
  lastUser.scrollIntoView({
    block: "start",
    behavior: "instant"
  });
  
  const chat = document.getElementById("chat");
  chat.scrollTop -= 20;
}

function addBotReply(text) {

  const shouldScroll = isUserNearBottom();

  addAssistantToCurrentSession(text);

  addMessage("Chatbot", text);

  if (shouldScroll) {
    scrollToLastUserMessage();
  }

}

function autoResizeInput() {

  const input = document.getElementById("input");

  input.style.height = "auto";

  input.style.height = Math.min(input.scrollHeight, 240) + "px";

}


// --------------------
// Popup
// --------------------

function openPopup() {
  document.getElementById("overlay").style.display = "flex";
}

function closePopup() {
  document.getElementById("overlay").style.display = "none";
}

function setPopupContent(text, buttonsHtml) {

  document.getElementById("popupText").textContent = text;

  document.getElementById("popupButtons").innerHTML = buttonsHtml;

}

function showTheoryInvite(theory) {

  pendingTheory = theory;

  setPopupContent(
    theory.offer || "Le programme peut proposer un éclairage bref sur cette sensation.",
    `
      <button onclick="acceptTheory()">Afficher</button>
      <button onclick="laterTheory()">Plus tard</button>
      <button onclick="neverTheory()">Ne plus proposer</button>
    `
  );

  openPopup();

}

function acceptTheory() {

  if (!pendingTheory) {
    closePopup();
    return;
  }

  setPopupContent(
    pendingTheory.content || "",
    `<button onclick="closeTheoryContent()">OK</button>`
  );

}

function closeTheoryContent() {

  closePopup();

  if (pendingTheory && pendingTheory.content) {
    addProgramMessage(pendingTheory.content);
  }

  pendingReply = null;
  pendingTheory = null;

}

function laterTheory() {

  closePopup();

  if (pendingReply) {
    addBotReply(pendingReply);
  }

  pendingReply = null;
  pendingTheory = null;

}

function neverTheory() {

  if (pendingTheory && pendingTheory.key) {
    disableTheory(pendingTheory.key);
  }

  closePopup();

  if (pendingReply) {
    addBotReply(pendingReply);
  }

  pendingReply = null;
  pendingTheory = null;

}


// --------------------
// Envoi message
// --------------------

async function send() {

  const input = document.getElementById("input");

  const text = input.value.trim();

  if (!text) return;

  pendingReply = null;
  pendingTheory = null;

  const pushed = pushMsg("user", text);

  const historyAfterUser = pushed.history;

  const previousHistory = pushed.previousHistory;

  const isNewSession = pushed.isNewSession;

  addMessage("Utilisateur", text);

  input.value = "";

  input.style.height = "80px";

  const response = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      message: text,
      history: historyAfterUser,
      previousHistory: previousHistory,
      summary: loadSummary(),
      flags: loadFlags(),
      isNewSession: isNewSession
    })
  });

  const data = await response.json();

  if (data.summary) saveSummary(data.summary);

  if (data.flags) saveFlags(data.flags);

  const theory = data.theory || null;

  if (theory && !isTheoryDisabled(theory.key)) {

    pendingReply = data.reply;

    showTheoryInvite(theory);

  }

  else {

    addBotReply(data.reply);

  }

}


// --------------------
// Entrée clavier
// --------------------

document.getElementById("input").addEventListener("input", autoResizeInput);

document.getElementById("input").addEventListener("keydown", function(event) {

  if (event.key === "Enter" && event.ctrlKey) {

    event.preventDefault();

    send();

  }

});


// --------------------
// Service Worker
// --------------------

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}

</script>

</body>
</html>
