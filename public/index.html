<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat ACP</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
  font-family: Arial, sans-serif;
  margin: 25px;
}

/* 1 — Titre centré */
h2 {
  text-align: center;
  font-size: 32px;
  margin-bottom: 20px;
}

/* 2 — Fenêtre chat */
#chat {
  border: 1px solid #ccc;
  padding: 16px;
  height: 60vh;
  overflow-y: auto;
  margin: 12px 0;
  font-size: 16px;
  line-height: 1.4;
}

/* 3 — Barre de saisie pleine largeur */
#input {
  width: 100%;
  font-size: 18px;
  padding: 12px;
  box-sizing: border-box;
  margin-bottom: 12px;
}

/* 4 — Bouton centré */
button {
  display: block;
  margin: 0 auto;
  font-size: 20px;
  padding: 12px 18px;
}

/* Messages */
.message {
  margin: 12px 0;
}

.role {
  font-weight: bold;
}
</style>

</head>

<body>

<h2>Prototype Chat ACP - Bêta</h2>

<div id="chat"></div>

<input id="input" type="text" placeholder="Écrire...">
<button onclick="send()">Envoyer</button>

<script>

const MEMORY_KEY = "acp_chat_history_v1";
const MAX_TURNS = 20; // 20 tours = 40 messages

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(MEMORY_KEY) || "[]"); }
  catch { return []; }
}

function saveHistory(h) {
  localStorage.setItem(MEMORY_KEY, JSON.stringify(h));
}

function pushMsg(role, content) {
  const h = loadHistory();
  h.push({ role, content, t: Date.now() });
  const trimmed = h.slice(-MAX_TURNS * 2);
  saveHistory(trimmed);
  return trimmed;
}

function clearHistory() {
  localStorage.removeItem(MEMORY_KEY);
}

async function send(){

const input = document.getElementById("input")
const chat = document.getElementById("chat")

const text = input.value

if(text === "") return

const historyAfterUser = pushMsg("user", text);

const userMessage = document.createElement("div")
userMessage.className = "message"
userMessage.innerHTML = "<span class='role'>Utilisateur :</span> " + text

chat.appendChild(userMessage)

input.value = ""

const response = await fetch("/chat", {

method: "POST",

headers: {
"Content-Type": "application/json"
},

body: JSON.stringify({
  message: text,
  history: historyAfterUser
})

})

const data = await response.json()

pushMsg("assistant", data.reply);

const botMessage = document.createElement("div")
botMessage.className = "message"
botMessage.innerHTML = "<span class='role'>Chatbot :</span> " + data.reply

chat.appendChild(botMessage)

chat.scrollTop = chat.scrollHeight

}

</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>

<script>
document.getElementById("input").addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    event.preventDefault();
    send();
  }
});
</script>

</body>
</html>
