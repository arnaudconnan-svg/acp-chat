<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Facilitat.io</title>
<link rel="manifest" href="/manifest.json">
<link rel="preload" as="image" href="/images/logo.png">
<meta name="theme-color" content="#ffffff">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: white;
  overflow: hidden;
}

body {
  font-family: Arial, sans-serif;
  box-sizing: border-box;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 12px;
}

/* ---------- ÉCRANS ---------- */

.screen {
  display: none;
  height: 100%;
}

.screen.active {
  display: flex;
  flex-direction: column;
}

/* ---------- ACCUEIL ---------- */

#welcomeScreen {
  overflow: hidden;
  justify-content: center;
  align-items: center;
  padding: 10px 10px 14px 10px;
}

#welcomeInner {
  width: 100%;
  max-width: 640px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100%;
}

#welcomeLogoWrap {
  display: flex;
  justify-content: center;
  margin-bottom: 10px;
}

#welcomeLogo {
  width: min(220px, 62vw);
}

.welcomeLead {
  text-align: center;
  font-size: 16px;
  line-height: 1.45;
  color: #1f3f44;
  margin-bottom: 12px;
}

.welcomeText {
  font-size: 15px;
  line-height: 1.5;
  text-align: center;
}

.welcomeDisclaimer {
  font-size: 14px;
  background: #f6f8f8;
  border-radius: 12px;
  padding: 12px;
  margin: 12px 0;
  text-align: center;
}

.welcomeActions {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.welcomeBtnPrimary,
.welcomeBtnSecondary {
  border-radius: 12px;
  padding: 12px;
  font-size: 16px;
  cursor: pointer;
}

.welcomeBtnPrimary {
  background: #245e66;
  color: white;
  border: none;
}

.welcomeBtnSecondary {
  border: 1px solid #b9c9cc;
  background: white;
}

/* ---------- CHAT ---------- */

#topBar {
  position: relative;
  text-align: center;
}

#refreshBtn {
  position: absolute;
  right: 0;
  top: 8px;
  font-size: 20px;
  background: none;
  border: none;
  cursor: pointer;
}

h2 {
  margin: 10px 0 16px 0;
}

#chat {
  border: 1px solid #ccc;
  padding: 12px;
  flex: 1;
  overflow-y: auto;
  margin: 8px 0;
}

#input {
  width: 100%;
  font-size: 18px;
  padding: 12px;
  min-height: 72px;
  max-height: 150px;
  resize: none;
}

.actions {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 8px;
}

button {
  font-size: 16px;
  padding: 8px 14px;
  cursor: pointer;
}

#editLastBtn {
  display: none;
  background: none;
  border: none;
  font-size: 13px;
  color: #666;
}

/* ---------- MODALE ---------- */

#aboutModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  display: none;
  align-items: flex-end;
  justify-content: center;
}

#aboutBox {
  background: white;
  width: min(640px, 100%);
  border-radius: 20px 20px 0 0;
  padding: 20px;
}
</style>
</head>

<body>

<!-- WELCOME -->
<div id="welcomeScreen" class="screen active">
  <div id="welcomeInner">

    <div id="welcomeLogoWrap">
      <img id="welcomeLogo" src="/images/logo.png">
    </div>

    <p class="welcomeLead">
      Un miroir conversationnel pour explorer ce que vous vivez.
    </p>

    <p class="welcomeText">
      Facilitat.io propose un espace de réflexion inspiré de l’Approche Centrée sur la Personne.
    </p>

    <div class="welcomeDisclaimer">
      Cet outil ne remplace pas un accompagnement humain.
    </div>

    <div class="welcomeActions">
      <button class="welcomeBtnSecondary" onclick="openAboutModal()">
        Pourquoi cette application est différente
      </button>

      <button class="welcomeBtnPrimary" onclick="enterChat()">
        Entrer
      </button>
    </div>

  </div>
</div>

<!-- CHAT -->
<div id="chatScreen" class="screen">
  <div id="topBar">
    <h2>Facilitat.io</h2>
    <button id="refreshBtn" onclick="location.reload()">↻</button>
  </div>

  <div id="chat"></div>

  <textarea id="input" placeholder="Écrire..."></textarea>

  <div class="actions">
    <button id="editLastBtn">modifier</button>
    <button id="sendBtn">Envoyer</button>
  </div>
</div>

<!-- ABOUT MODAL -->
<div id="aboutModal">
  <div id="aboutBox">
    <p>Facilitat.io ne donne pas de conseils ni de solutions toutes faites.</p>
    <button onclick="closeAboutModal()">fermer</button>
  </div>
</div>

<script>
function openAboutModal(){
  document.getElementById("aboutModal").style.display="flex"
}
function closeAboutModal(){
  document.getElementById("aboutModal").style.display="none"
}
</script>

<script>
const SESSION_KEY = "facilitatio_v0_history";
const MEMORY_KEY = "facilitatio_v0_memory";
const MAX_RECENT_TURNS = 8;

let isSending = false;

/* ---------- MEMORY ---------- */

function defaultMemory() {
  return [
    "Thèmes déjà évoqués :",
    "- ",
    "",
    "Points de vigilance relationnels :",
    "- ",
    "",
    "Questions encore ouvertes :",
    "- "
  ].join("\n");
}

function loadMemory() {
  return localStorage.getItem(MEMORY_KEY) || defaultMemory();
}

function saveMemory(memory) {
  localStorage.setItem(MEMORY_KEY, memory);
}

/* ---------- HISTORY ---------- */

function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem(SESSION_KEY) || "[]");
  } catch {
    return [];
  }
}

function saveHistory(history) {
  localStorage.setItem(SESSION_KEY, JSON.stringify(history));
}

function pushHistory(role, content, debug = []) {
  const history = loadHistory();
  history.push({ role, content, debug });
  saveHistory(history);
}

/* ---------- UI ---------- */

function showScreen(id) {
  document.getElementById("welcomeScreen").classList.remove("active");
  document.getElementById("chatScreen").classList.remove("active");
  document.getElementById(id).classList.add("active");
}

function enterChat() {
  showScreen("chatScreen");
}

function addMessage(role, text, debug = []) {
  const chat = document.getElementById("chat");

  const msg = document.createElement("div");
  msg.className = "message " + role;

  const wrap = document.createElement("div");

  if (role === "bot" && debug.length) {
    const dbg = document.createElement("div");
    dbg.className = "debug-block";
    dbg.textContent = debug.join(" | ");
    wrap.appendChild(dbg);
  }

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;

  wrap.appendChild(bubble);
  msg.appendChild(wrap);
  chat.appendChild(msg);

  chat.scrollTop = chat.scrollHeight;
}

function renderHistory() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  loadHistory().forEach(m => {
    addMessage(m.role === "user" ? "user" : "bot", m.content, m.debug || []);
  });

  updateEditButtonVisibility();
}

/* ---------- EDIT ---------- */

function canEditLastTurn() {
  const h = loadHistory();
  if (h.length < 2) return false;
  return h[h.length-2].role === "user" && h[h.length-1].role === "assistant";
}

function updateEditButtonVisibility() {
  document.getElementById("editLastBtn").style.display =
    canEditLastTurn() ? "inline-block" : "none";
}

function editLastTurn() {
  const h = loadHistory();
  if (!canEditLastTurn()) return;

  const input = document.getElementById("input");
  input.value = h[h.length-2].content;

  h.splice(-2, 2);
  saveHistory(h);

  renderHistory();
  input.focus();
}

/* ---------- SEND ---------- */

function buildPayload(message) {
  const full = loadHistory().map(({role,content}) => ({role,content}));
  return {
    message,
    recentHistory: full.slice(-MAX_RECENT_TURNS),
    fullHistory: full,
    memory: loadMemory()
  };
}

async function send() {
  if (isSending) return;

  const input = document.getElementById("input");
  const message = input.value.trim();
  if (!message) return;

  isSending = true;

  pushHistory("user", message);
  addMessage("user", message);

  input.value = "";
  updateEditButtonVisibility();

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(buildPayload(message))
    });

    const data = await res.json();

    if (data.memory) saveMemory(data.memory);

    pushHistory("assistant", data.reply, data.debug || []);
    addMessage("bot", data.reply, data.debug || []);

  } catch {
    addMessage("bot", "Erreur serveur");
  }

  isSending = false;
  updateEditButtonVisibility();
}

/* ---------- EVENTS ---------- */

document.getElementById("sendBtn").onclick = send;
document.getElementById("editLastBtn").onclick = editLastTurn;

document.getElementById("input").addEventListener("keydown", e => {
  if (e.key === "Enter" && e.ctrlKey) {
    e.preventDefault();
    send();
  }
});

window.onload = () => {
  renderHistory();
};

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>

</body>
</html>
