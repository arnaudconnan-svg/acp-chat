<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prototype Chat ACP - Bêta</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 25px;
  }

  h2 {
    text-align: center;
    font-size: 32px;
    margin-bottom: 20px;
  }

  #chat {
    border: 1px solid #ccc;
    padding: 16px;
    height: 60vh;
    overflow-y: auto;
    margin: 12px 0;
    font-size: 16px;
    line-height: 1.4;
  }

  #input {
    width: 100%;
    font-size: 18px;
    padding: 12px;
    box-sizing: border-box;
    margin-bottom: 12px;
  }

  button {
    display: block;
    margin: 0 auto;
    font-size: 20px;
    padding: 12px 18px;
  }

  .message {
    margin: 12px 0;
  }

  .role {
    font-weight: bold;
  }

  /* -------------------- */
  /* POPUP PROGRAMME      */
  /* -------------------- */

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  #popup {
    background: #ffffff;
    width: 85%;
    max-width: 420px;
    border-radius: 12px;
    padding: 22px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    text-align: center;
  }

  #popup p {
    font-size: 16px;
    line-height: 1.5;
    margin-bottom: 18px;
  }

  .popup-btn {
    width: 100%;
    font-size: 16px;
    padding: 12px;
    margin: 8px 0;
  }

</style>
</head>

<body>

<h2>Prototype Chat ACP - Bêta</h2>

<div id="chat"></div>

<input id="input" type="text" placeholder="Écrire...">
<button onclick="send()">Envoyer</button>


<!-- -------------------- -->
<!-- POPUP PROGRAMME      -->
<!-- -------------------- -->

<div id="overlay">
  <div id="popup">
    <p>💬 Le programme peut proposer un éclairage bref sur cette sensation.</p>
    <button class="popup-btn" onclick="showPsycho()">Afficher</button>
    <button class="popup-btn" onclick="closePopup()">Plus tard</button>
    <button class="popup-btn" onclick="disablePsycho()">Ne plus proposer</button>
  </div>
</div>


<script>
const SESSION_TIMEOUT = 30 * 60 * 1000;

const SESSION_KEY = "acp_session_history_v1";
const SUMMARY_KEY = "acp_longterm_summary_v1";
const FLAGS_KEY   = "acp_state_flags_v1";


// --------------------
// Mémoire session
// --------------------

function loadSessionHistory() {
  try { return JSON.parse(localStorage.getItem(SESSION_KEY) || "[]"); }
  catch { return []; }
}

function saveSessionHistory(h) {
  localStorage.setItem(SESSION_KEY, JSON.stringify(h));
}

function pushMsg(role, content) {
  const now = Date.now();
  let history = loadSessionHistory();
  history.push({ role, content, t: now });
  saveSessionHistory(history);
  return history;
}


// --------------------
// Flags
// --------------------

function loadFlags() {
  try { return JSON.parse(localStorage.getItem(FLAGS_KEY) || "{}"); }
  catch { return {}; }
}

function saveFlags(flags) {
  localStorage.setItem(FLAGS_KEY, JSON.stringify(flags));
}


// --------------------
// Popup control
// --------------------

function openPopup() {
  document.getElementById("overlay").style.display = "flex";
}

function closePopup() {
  document.getElementById("overlay").style.display = "none";
}

function disablePsycho() {
  const flags = loadFlags();
  flags.noPsycho = true;
  saveFlags(flags);
  closePopup();
}

function showPsycho() {
  closePopup();

  const chat = document.getElementById("chat");

  const box = document.createElement("div");
  box.className = "message";
  box.style.borderLeft = "4px solid #999";
  box.style.paddingLeft = "12px";
  box.style.marginTop = "18px";
  box.textContent =
    "Il arrive que l’esprit se mette à distance de l’expérience pour continuer à fonctionner malgré une charge émotionnelle ou cognitive. Cette mise à distance peut donner l’impression d’être spectateur de soi-même. C’est un mécanisme humain fréquent qui vise d’abord la protection.";

  chat.appendChild(box);
  chat.scrollTop = chat.scrollHeight;
}


// --------------------
// Envoi message
// --------------------

async function send() {
  const input = document.getElementById("input");
  const chat  = document.getElementById("chat");

  const text = input.value.trim();
  if (!text) return;

  pushMsg("user", text);

  const userMessage = document.createElement("div");
  userMessage.className = "message";
  userMessage.innerHTML =
    "<span class='role'>Utilisateur :</span> " + text;
  chat.appendChild(userMessage);

  input.value = "";

  const response = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      message: text,
      history: loadSessionHistory(),
      flags: loadFlags()
    })
  });

  const data = await response.json();

  pushMsg("assistant", data.reply);

  const botMessage = document.createElement("div");
  botMessage.className = "message";
  botMessage.innerHTML =
    "<span class='role'>Chatbot :</span> " + data.reply;
  chat.appendChild(botMessage);

  chat.scrollTop = chat.scrollHeight;

  // Déclenche popup si autorisé
  const flags = loadFlags();
  if (!flags.noPsycho && data.showPsycho) {
    openPopup();
  }
}


// --------------------
// Entrée clavier
// --------------------

document.getElementById("input")
  .addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
      event.preventDefault();
      send();
    }
  });


// --------------------
// Service Worker
// --------------------

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>

</body>
</html>
