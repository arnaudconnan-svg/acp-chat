<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prototype Chat ACP - Bêta</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 25px;
  }

  h2 {
    text-align: center;
    font-size: 32px;
    margin-bottom: 20px;
  }

  #chat {
    border: 1px solid #ccc;
    padding: 16px;
    height: 60vh;
    overflow-y: auto;
    margin: 12px 0;
    font-size: 16px;
    line-height: 1.4;
  }

  #input {
    width: 100%;
    font-size: 18px;
    padding: 12px;
    box-sizing: border-box;
    margin-bottom: 12px;
  }

  button {
    display: block;
    margin: 12px auto;
    font-size: 18px;
    padding: 12px 18px;
  }

  .message {
    margin: 12px 0;
  }

  .role {
    font-weight: bold;
  }

  /* Popup overlay */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }

  #popup {
    background: white;
    width: 85%;
    max-width: 420px;
    border-radius: 18px;
    padding: 22px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  #popup p {
    font-size: 16px;
    line-height: 1.5;
    margin-bottom: 18px;
  }

  .popup-buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .popup-buttons button {
    margin: 0;
  }
</style>
</head>

<body>

<h2>Prototype Chat ACP - Bêta</h2>

<div id="chat"></div>

<input id="input" type="text" placeholder="Écrire...">
<button onclick="send()">Envoyer</button>

<!-- Popup -->
<div id="overlay">
  <div id="popup">
    <p id="popupText"></p>
    <div class="popup-buttons">
      <button onclick="acceptPsycho()">Afficher</button>
      <button onclick="laterPsycho()">Plus tard</button>
      <button onclick="neverPsycho()">Ne plus proposer</button>
    </div>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

let pendingReply = null;
let pendingPsychoText = null;

function addMessage(role, text) {
  const msg = document.createElement("div");
  msg.className = "message";
  msg.innerHTML = "<span class='role'>" + role + " :</span> " + text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function showPopup(text) {
  pendingPsychoText = text;
  document.getElementById("popupText").textContent = text;
  document.getElementById("overlay").style.display = "flex";
}

function hidePopup() {
  document.getElementById("overlay").style.display = "none";
}

function acceptPsycho() {
  hidePopup();
  addMessage("Programme", pendingPsychoText);
}

function laterPsycho() {
  hidePopup();
  if (pendingReply) addMessage("Chatbot", pendingReply);
}

function neverPsycho() {
  hidePopup();
  if (pendingReply) addMessage("Chatbot", pendingReply);
  // Ici tu pourras stocker un flag "neverPsycho"
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  addMessage("Utilisateur", text);
  input.value = "";

  const response = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: text })
  });

  const data = await response.json();

  pendingReply = data.reply;

  if (data.showPsycho && data.psychoText) {
    showPopup(data.psychoText);
  } else {
    addMessage("Chatbot", data.reply);
  }
}

input.addEventListener("keydown", function(e){
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});
</script>

</body>
</html>
