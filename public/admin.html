<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin - Conversations</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 16px;
}

h1 {
  font-size: 20px;
}

<button onclick="goBack()" style="margin-bottom:12px;">
  ← Retour
</button>

#list {
  margin-top: 16px;
}

.item {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  cursor: pointer;
}

.item:hover {
  background: #f5f5f5;
}
</style>
</head>

<body>

<h1>Conversations</h1>

<div id="list">Chargement...</div>

<script>
  function getConversationIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get("c");
  }
  
  async function loadConversations() {
    const res = await fetch("/api/admin/conversations");
    const data = await res.json();
    
    const list = document.getElementById("list");
    list.innerHTML = "";
    
    if (!data.length) {
      list.textContent = "Aucune conversation";
      return;
    }
    
    data.forEach(conv => {
      const div = document.createElement("div");
      div.className = "item";
      
      div.textContent =
        conv.id +
        " | " +
        new Date(conv.createdAt).toLocaleString();
      
      div.onclick = () => {
        window.location.href = "/admin.html?c=" + conv.id;
      };
      
      list.appendChild(div);
    });
  }
  
  async function loadMessages(conversationId) {
    const res = await fetch("/api/admin/conversations/" + conversationId + "/messages");
    const data = await res.json();
    
    const list = document.getElementById("list");
    list.innerHTML = "";
    
    if (!data.length) {
      list.textContent = "Aucun message";
      return;
    }
    
    data.forEach(msg => {
      const div = document.createElement("div");
      div.className = "item";
      
      div.innerHTML = `
  <div style="font-size:12px; color:#666;">
    ${new Date(msg.t || msg.createdAt || Date.now()).toLocaleString()} — ${msg.role}
  </div>
  <div>
    ${msg.content}
  </div>
`;
      
      list.appendChild(div);
    });
  }
  
  async function init() {
    const conversationId = getConversationIdFromUrl();
    
    if (conversationId) {
      await loadMessages(conversationId);
    } else {
      await loadConversations();
    }
  }
  
  function goBack() {
    window.location.href = "/admin.html";
  }
  
  async function init() {
    const conversationId = getConversationIdFromUrl();
    
    if (conversationId) {
      document.getElementById("backBtn").style.display = "block";
      await loadMessages(conversationId);
    } else {
      document.getElementById("backBtn").style.display = "none";
      await loadConversations();
  }
}
</script>
</body>
</html>
