<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <title>Admin - Conversations</title>
  
  <style>
    * {
      box-sizing: border-box;
    }
    
    html,
    body {
      margin: 0;
      padding: 0;
      background: #d7e4e3;
      color: #1f2937;
      font-family: Arial, sans-serif;
      color-scheme: light;
    }
    
    body {
      min-height: 100vh;
    }
    
    #app {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 12px 12px calc(24px + env(safe-area-inset-bottom, 0px));
    }
    
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #d7e4e3;
      padding: 6px 0 8px;
    }

    .topbar-head {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
    }

    #adminActionsWrap {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
    }

    #adminActionsBtn {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: #245e66;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    #adminActionsBtn svg {
      width: 20px;
      height: 20px;
    }

    #adminActionsBtn:hover {
      background: rgba(36, 94, 102, 0.1);
    }

    #adminActionsMenu {
      display: none;
      position: absolute;
      top: 40px;
      right: 0;
      min-width: 220px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(222, 228, 230, 0.92);
      border-radius: 18px;
      box-shadow: 0 14px 28px rgba(20, 36, 40, 0.18);
      overflow: hidden;
      z-index: 80;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .adminActionsMenuAction {
      width: 100%;
      border: none;
      background: transparent;
      padding: 13px 14px;
      text-align: left;
      font: inherit;
      font-size: 14px;
      color: #1f3f44;
      cursor: pointer;
    }

    .adminActionsMenuAction:hover {
      background: rgba(36, 94, 102, 0.08);
    }

    .adminActionsMenuActionDanger {
      color: #a63a32;
    }
    
    h1 {
      font-size: 20px;
      line-height: 1.15;
      margin: 0;
      color: #1f3f44;
      text-align: center;
    }
    
    #backBtn {
      display: none;
      width: 100%;
      min-height: 48px;
      border: 1px solid #cfd8db;
      border-radius: 12px;
      background: white;
      color: #245e66;
      font-size: 17px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }
    
    #list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .item {
      background: #f7fbfa;
      border: 1px solid #d6e2e1;
      border-radius: 16px;
      padding: 14px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(43, 79, 82, 0.08);
    }

    .admin-conversation-card {
      position: relative;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: pan-y;
      padding: 0;
    }

    .admin-conversation-open-btn {
      width: 100%;
      border: none;
      background: transparent;
      text-align: left;
      cursor: pointer;
      color: inherit;
      font: inherit;
      padding: 14px;
      position: relative;
      z-index: 1;
      transition: transform 0.26s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .admin-conversation-main {
      font-size: 15px;
      font-weight: 600;
      color: #1f3f44;
      margin-bottom: 4px;
    }

    .admin-conversation-title {
      font-size: 15px;
      color: #334155;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    .admin-conversation-count {
      font-size: 13px;
      color: #6b7280;
    }

    .admin-swipe-action {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 72px;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
      z-index: 0;
      padding: 0;
    }

    .admin-swipe-action svg {
      width: 26px;
      height: 26px;
    }

    .admin-swipe-action-rename {
      left: 0;
      background: #245e66;
      transform: translateX(-14px);
    }

    .admin-swipe-action-delete {
      right: 0;
      background: #c44c43;
      transform: translateX(14px);
    }

    .admin-conversation-card.is-swipe-open-left .admin-swipe-action-delete,
    .admin-conversation-card.is-swipe-open-right .admin-swipe-action-rename {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }
    
    .item:hover {
      background: #fbfbfc;
    }
    
    .message-row {
      display: flex;
    }
    
    .message-row .item {
      cursor: default;
      box-shadow: none;
      -webkit-tap-highlight-color: transparent;
    }
    
    .message-row .item:hover {
      background: inherit;
    }

    .message-row .role-user:hover,
    .message-row .role-user:active {
      background: #4a7478;
    }

    .message-row .role-assistant:hover,
    .message-row .role-assistant:active {
      background: white;
    }
    
    .meta {
      font-size: 12px;
      line-height: 1.4;
      color: #6b7280;
      margin-bottom: 8px;
    }
    
    .main {
      font-size: 16px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: break-word;
    }
    
    .conv-id {
      font-size: 14px;
      line-height: 1.35;
      color: #1f2937;
      font-weight: 600;
      margin-bottom: 6px;
      word-break: break-all;
    }
    
    .loading,
    .empty,
    .error {
      background: white;
      border: 1px solid #dde4e7;
      border-radius: 16px;
      padding: 16px;
      font-size: 16px;
      line-height: 1.5;
    }
    
    .error {
      color: #991b1b;
    }
    
    .role-user {
      background: #4a7478;
      color: white;
      border: none;
    }
    
    .role-user .meta {
      color: rgba(255, 255, 255, 0.78);
    }
    
    .role-user .main {
      color: white;
    }
    
    .role-assistant {
      background: white;
      border: none;
    }
    
    .role-assistant .meta {
      color: #708487;
    }
    
    .role-assistant .main {
      color: #4b6366;
    }
    
    .preview {
      font-size: 16px;
      line-height: 1.5;
      color: #334155;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }

    .branch-panel {
      background: #f7fbfa;
      border: 1px solid #d6e2e1;
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 4px 14px rgba(43, 79, 82, 0.08);
      display: flex;
      align-items: stretch;
      gap: 10px;
    }

    .branch-panel-title {
      font-size: 12px;
      font-weight: 700;
      color: #1f3f44;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 18px;
    }

    .branch-panel-body {
      flex: 1;
      min-width: 0;
    }

    .branch-node {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .branch-card {
      background: white;
      border: 1px solid #d6e2e1;
      border-radius: 14px;
      padding: 12px;
      min-width: 0;
    }

    .branch-card.clickable {
      cursor: pointer;
    }

    .branch-card.current {
      border-color: #245e66;
      box-shadow: 0 0 0 1px rgba(36, 94, 102, 0.12);
      background: #f2fbfb;
    }

    .branch-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      justify-content: space-between;
      margin-bottom: 6px;
      min-width: 0;
    }

    .branch-card-title {
      font-size: 14px;
      font-weight: 700;
      color: #1f2937;
      min-width: 0;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .branch-card-subtitle {
      font-size: 13px;
      color: #4b6366;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .branch-card-chips {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }

    .branch-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      color: #245e66;
      background: rgba(36, 94, 102, 0.1);
      border: 1px solid rgba(36, 94, 102, 0.18);
    }

    .branch-card-meta {
      font-size: 12px;
      line-height: 1.45;
      color: #6b7280;
      word-break: break-word;
    }

    .branch-children {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .branch-child-row {
      display: flex;
      align-items: stretch;
      gap: 8px;
      min-width: 0;
    }

    .branch-edge {
      font-size: 11px;
      line-height: 1.1;
      color: #5f6f73;
      font-weight: 700;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 18px;
      padding: 2px 0;
    }

    .branch-child-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-left: 8px;
      border-left: 2px solid rgba(36, 94, 102, 0.15);
    }

    .branch-collapse-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 24px;
      border-radius: 999px;
      border: 1px solid rgba(36, 94, 102, 0.24);
      background: rgba(36, 94, 102, 0.08);
      color: #245e66;
      font-size: 14px;
      line-height: 1;
      font-weight: 700;
      cursor: pointer;
    }

    .branch-collapse-chip:hover {
      background: rgba(36, 94, 102, 0.14);
    }

    .branch-collapsed-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }

    .debug-toggle-btn {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 1px solid #b9cdd0;
      background: #ffffff;
      color: #245e66;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(43, 79, 82, 0.1);
    }

    .debug-toggle-btn.active {
      background: #4a7478;
      border-color: #4a7478;
      color: #ffffff;
    }
    
    @media (max-width: 640px) {
      #app {
        padding-left: 10px;
        padding-right: 10px;
      }
      
      h1 {
        font-size: 18px;
      }
      
      .item {
        padding: 12px;
        border-radius: 14px;
      }
      
      .main,
      .preview,
      .loading,
      .empty,
      .error {
        font-size: 15px;
      }
      
      .message-row .item {
        max-width: 88% !important;
      }

      .branch-panel {
        gap: 8px;
      }

      .branch-panel-title,
      .branch-edge {
        flex-basis: 16px;
        font-size: 10px;
      }
    }
  </style>
</head>

<body>
  
  <div id="app">
    <div class="topbar">
      <div class="topbar-head">
        <h1>Conversations</h1>
        <button id="debugToggleBtn" class="debug-toggle-btn" type="button" aria-label="Basculer les panneaux Debug">
          Debug
        </button>
        <div id="adminActionsWrap">
          <button id="adminActionsBtn" type="button" aria-label="Actions admin" aria-expanded="false">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="5" r="1.8" fill="currentColor"></circle>
              <circle cx="12" cy="12" r="1.8" fill="currentColor"></circle>
              <circle cx="12" cy="19" r="1.8" fill="currentColor"></circle>
            </svg>
          </button>
          <div id="adminActionsMenu">
            <button id="adminWipeDataBtn" type="button" class="adminActionsMenuAction adminActionsMenuActionDanger">Wipe data Firebase</button>
          </div>
        </div>
      </div>
      
      <div id="conversationMeta" class="meta" style="display:none;"></div>
      <div id="branchTreeWrap" style="display:none; margin-top:10px;"></div>
    </div>
    
    <div id="list">Chargement...</div>
  </div>
  
  <script>
    let activeAdminConversationSwipeElement = null;
    let activeAdminConversationSwipeCloser = null;
    let adminWipeCountdownTimer = null;

    function getConversationIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("c");
    }

    function closeAdminActionsMenu() {
      const menu = document.getElementById("adminActionsMenu");
      const btn = document.getElementById("adminActionsBtn");
      if (!menu || !btn) {
        return;
      }
      menu.style.display = "none";
      btn.setAttribute("aria-expanded", "false");
    }

    function toggleAdminActionsMenu(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }

      const menu = document.getElementById("adminActionsMenu");
      const btn = document.getElementById("adminActionsBtn");
      if (!menu || !btn) {
        return;
      }

      const shouldOpen = menu.style.display !== "block";
      menu.style.display = shouldOpen ? "block" : "none";
      btn.setAttribute("aria-expanded", shouldOpen ? "true" : "false");
    }

    function closeAdminWipeModal() {
      const modal = document.getElementById("adminWipeModal");
      if (adminWipeCountdownTimer) {
        clearInterval(adminWipeCountdownTimer);
        adminWipeCountdownTimer = null;
      }
      if (modal) {
        modal.remove();
      }
    }

    function openAdminWipeModal() {
      closeAdminActionsMenu();
      closeAdminWipeModal();

      const modal = document.createElement("div");
      modal.id = "adminWipeModal";
      modal.style.position = "fixed";
      modal.style.inset = "0";
      modal.style.background = "rgba(20, 36, 40, 0.36)";
      modal.style.display = "flex";
      modal.style.alignItems = "center";
      modal.style.justifyContent = "center";
      modal.style.padding = "16px";
      modal.style.zIndex = "1200";

      const box = document.createElement("div");
      box.style.width = "100%";
      box.style.maxWidth = "420px";
      box.style.background = "#ffffff";
      box.style.borderRadius = "16px";
      box.style.border = "1px solid #d6e2e1";
      box.style.padding = "16px";
      box.style.boxShadow = "0 18px 36px rgba(20, 36, 40, 0.18)";

      const title = document.createElement("div");
      title.textContent = "Confirmer le wipe Firebase";
      title.style.fontSize = "18px";
      title.style.fontWeight = "700";
      title.style.color = "#1f3f44";
      title.style.marginBottom = "10px";

      const text = document.createElement("div");
      text.textContent = "Cette action supprime conversations, messages, utilisateurs, labels et branches dans Firebase.";
      text.style.fontSize = "14px";
      text.style.lineHeight = "1.45";
      text.style.color = "#4b6366";
      text.style.marginBottom = "14px";

      const actions = document.createElement("div");
      actions.style.display = "flex";
      actions.style.gap = "8px";
      actions.style.justifyContent = "flex-end";

      const cancelBtn = document.createElement("button");
      cancelBtn.type = "button";
      cancelBtn.textContent = "Annuler";
      cancelBtn.style.border = "1px solid #cfd8db";
      cancelBtn.style.background = "#ffffff";
      cancelBtn.style.color = "#245e66";
      cancelBtn.style.borderRadius = "10px";
      cancelBtn.style.padding = "10px 14px";
      cancelBtn.style.cursor = "pointer";

      const confirmBtn = document.createElement("button");
      confirmBtn.type = "button";
      confirmBtn.style.border = "none";
      confirmBtn.style.background = "#c44c43";
      confirmBtn.style.color = "#ffffff";
      confirmBtn.style.borderRadius = "10px";
      confirmBtn.style.padding = "10px 14px";
      confirmBtn.style.cursor = "pointer";

      let remaining = 5;
      confirmBtn.disabled = true;
      confirmBtn.textContent = `Confirmer (${remaining})`;

      adminWipeCountdownTimer = setInterval(() => {
        remaining -= 1;
        if (remaining > 0) {
          confirmBtn.textContent = `Confirmer (${remaining})`;
          return;
        }

        clearInterval(adminWipeCountdownTimer);
        adminWipeCountdownTimer = null;
        confirmBtn.disabled = false;
        confirmBtn.textContent = "Confirmer";
      }, 1000);

      cancelBtn.onclick = () => {
        closeAdminWipeModal();
      };

      confirmBtn.onclick = async () => {
        if (confirmBtn.disabled) {
          return;
        }

        confirmBtn.disabled = true;
        cancelBtn.disabled = true;
        confirmBtn.textContent = "Suppression...";

        try {
          const res = await fetchWithTimeout("/api/admin/wipe-data", {
            method: "POST"
          }, 30000);
          const response = await readAdminJsonResponse(res);

          if (response.redirectedToLogin) {
            return;
          }

          if (!res.ok) {
            const message = typeof response.data?.error === "string" ? response.data.error : "Wipe impossible";
            alert(message);
            closeAdminWipeModal();
            return;
          }

          closeAdminWipeModal();
          alert("Wipe Firebase termine.");
          await loadConversations();
        } catch (err) {
          alert("Erreur wipe: " + (err?.message || "inconnue"));
          closeAdminWipeModal();
        }
      };

      modal.onclick = event => {
        if (event.target === modal) {
          closeAdminWipeModal();
        }
      };

      actions.appendChild(cancelBtn);
      actions.appendChild(confirmBtn);
      box.appendChild(title);
      box.appendChild(text);
      box.appendChild(actions);
      modal.appendChild(box);
      document.body.appendChild(modal);
    }
    
    function setupRootBackToIndex() {
      const conversationId = getConversationIdFromUrl();
      if (conversationId) return;
      
      history.replaceState({ adminRoot: true }, "", window.location.href);
      history.pushState({ adminTrap: true }, "", window.location.href);
      
      window.addEventListener("popstate", (e) => {
        if (e.state && e.state.adminRoot) {
          window.location.replace("/index.html");
        }
      });
    }

    async function readAdminJsonResponse(res) {
      if (res?.redirected && typeof res.url === "string" && res.url.includes("/admin-login.html")) {
        window.location.href = res.url;
        return {
          data: null,
          isJson: false,
          redirectedToLogin: true
        };
      }

      const contentType = String(res?.headers?.get("content-type") || "").toLowerCase();

      if (!contentType.includes("application/json")) {
        return {
          data: null,
          isJson: false,
          redirectedToLogin: false
        };
      }

      try {
        return {
          data: await res.json(),
          isJson: true,
          redirectedToLogin: false
        };
      } catch {
        return {
          data: null,
          isJson: false,
          redirectedToLogin: false
        };
      }
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = 12000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);

      try {
        const requestOptions = {
          credentials: "same-origin",
          cache: "no-store",
          ...options,
          signal: controller.signal
        };
        return await fetch(url, requestOptions);
      } finally {
        clearTimeout(timer);
      }
    }

    function normalizeReplayDebugMeta(debugMeta) {
      const safe = debugMeta && typeof debugMeta === "object" ? debugMeta : {};

      function normalizeInfoSubmode(value) {
        const raw = typeof value === "string" ? value.trim() : "";
        if (raw === "app") return "app_features";
        if (["pure", "psychoeducation", "app_features"].includes(raw)) return raw;
        return null;
      }

      function normalizeContactSubmode(value) {
        const raw = typeof value === "string" ? value.trim() : "";
        if (["regulated", "dysregulated"].includes(raw)) return raw;
        return null;
      }

      function normalizePipelineStages(pipelineStages) {
        if (!Array.isArray(pipelineStages)) {
          return [];
        }

        return pipelineStages
          .map(entry => ({
            stage: typeof entry?.stage === "string" ? entry.stage : null,
            deltaMs: Number.isFinite(entry?.deltaMs) ? entry.deltaMs : null
          }))
          .filter(entry => entry.stage);
      }

      return {
        topChips: Array.isArray(safe.topChips) ?
          safe.topChips.map(v => String(v || "").trim()).filter(Boolean) : [],
        memory: typeof safe.memory === "string" ? safe.memory.trim() : "",
        directivityText: typeof safe.directivityText === "string" ?
          safe.directivityText.trim() : (typeof safe.directivityLabel === "string" ? safe.directivityLabel.trim() : ""),
        conversationStateKey: typeof safe.conversationStateKey === "string" ? safe.conversationStateKey.trim() : null,
        consecutiveNonExplorationTurns: Number.isInteger(safe.consecutiveNonExplorationTurns) ? Math.max(0, safe.consecutiveNonExplorationTurns) : 0,
        infoSubmode: normalizeInfoSubmode(safe.infoSubmode),
        contactSubmode: normalizeContactSubmode(safe.contactSubmode),
        interpretationRejection: safe.interpretationRejection === true,
        needsSoberReadjustment: safe.needsSoberReadjustment === true,
        relationalAdjustmentTriggered: safe.relationalAdjustmentTriggered === true,
        pipelineStages: normalizePipelineStages(safe.pipelineStages),
        explorationCalibrationLevel: Number.isInteger(safe.explorationCalibrationLevel) ? safe.explorationCalibrationLevel : null,
        explorationSubmode: typeof safe.explorationSubmode === "string" ? safe.explorationSubmode.trim() : null,
        therapeuticAllianceSource: typeof safe.therapeuticAllianceSource === "string" ? safe.therapeuticAllianceSource.trim() : null,
        rewriteSource: typeof safe.rewriteSource === "string" ? safe.rewriteSource.trim() : null,
        memoryRewriteSource: typeof safe.memoryRewriteSource === "string" ? safe.memoryRewriteSource.trim() : null,
        memoryCompressed: safe.memoryCompressed === true,
        memoryBeforeCompression: typeof safe.memoryBeforeCompression === "string" ? safe.memoryBeforeCompression.trim() : null,
        soberReadjustmentOriginalReply: typeof safe.soberReadjustmentOriginalReply === "string" ? safe.soberReadjustmentOriginalReply.trim() : null,
        criticTriggered: safe.criticTriggered === true,
        criticIssues: Array.isArray(safe.criticIssues) ? safe.criticIssues.map(v => String(v || "").trim()).filter(Boolean) : [],
        writerMode: typeof safe.writerMode === "string" ? safe.writerMode.trim() : null,
        intent: typeof safe.intent === "string" ? safe.intent.trim() : null,
        forbidden: Array.isArray(safe.forbidden) ? safe.forbidden.map(v => String(v || "").trim()).filter(Boolean) : [],
        confidenceSignal: typeof safe.confidenceSignal === "string" ? safe.confidenceSignal.trim() : "high",
        allianceState: typeof safe.allianceState === "string" ? safe.allianceState.trim() : "good",
        engagementLevel: typeof safe.engagementLevel === "string" ? safe.engagementLevel.trim() : "active",
        stagnationTurns: Number.isInteger(safe.stagnationTurns) ? Math.max(0, safe.stagnationTurns) : 0,
        processingWindow: typeof safe.processingWindow === "string" ? safe.processingWindow.trim() : "open",
        dependencyRiskScore: Number.isFinite(safe.dependencyRiskScore) ? Math.max(0, Math.min(100, Math.round(Number(safe.dependencyRiskScore)))) : 0,
        dependencyRiskLevel: typeof safe.dependencyRiskLevel === "string" ? safe.dependencyRiskLevel.trim() : "low",
        externalSupportMode: typeof safe.externalSupportMode === "string" ? safe.externalSupportMode.trim() : "none",
        closureIntent: safe.closureIntent === true
      };
    }

    function buildReplayRecentHistory(messages) {
      if (!Array.isArray(messages)) {
        return [];
      }

      return messages
        .map(item => ({
          role: String(item?.role || "").trim(),
          content: String(item?.content || "").trim(),
          debug: Array.isArray(item?.debug) ? item.debug.map(line => String(line || "")) : [],
          debugMeta: normalizeReplayDebugMeta(item?.debugMeta),
          comparisonResults: Array.isArray(item?.comparisonResults) ? item.comparisonResults : null
        }))
        .filter(item => (item.role === "user" || item.role === "assistant") && item.content)
        .slice(-120);
    }

    function extractReplayMemory(messages) {
      if (!Array.isArray(messages)) {
        return "";
      }

      for (let i = messages.length - 1; i >= 0; i -= 1) {
        const candidate = messages[i];
        const memory = String(candidate?.debugMeta?.memory || "").trim();
        if (memory) {
          return memory;
        }
      }

      return "";
    }

    async function openReplayInChat(conversationId, anchorMessageId = "") {
      if (!conversationId) {
        return;
      }

      const list = document.getElementById("list");

      try {
        const res = await fetchWithTimeout("/api/admin/conversations/" + encodeURIComponent(conversationId) + "/messages");
        const response = await readAdminJsonResponse(res);

        if (response.redirectedToLogin) {
          list.innerHTML = '<div class="error">Session admin expiree. Redirection...</div>';
          return;
        }

        if (!res.ok || !response.isJson || !Array.isArray(response.data)) {
          const errorMessage = typeof response.data?.error === "string" ? response.data.error : "Impossible de preparer le replay";
          alert(errorMessage);
          return;
        }

        const safeMessages = buildReplayRecentHistory(response.data);
        if (!safeMessages.length) {
          alert("Impossible de preparer le replay");
          return;
        }

        let selectedMessages = safeMessages;
        if (anchorMessageId) {
          const anchorIndex = response.data.findIndex(item => String(item?.id || "") === anchorMessageId);
          if (anchorIndex >= 0) {
            selectedMessages = buildReplayRecentHistory(response.data.slice(0, anchorIndex + 1));
          }
        }

        const replayPayload = {
          sourceConversationId: conversationId,
          memory: extractReplayMemory(response.data),
          recentHistory: selectedMessages,
          anchorMessageId: anchorMessageId || "",
          timestamp: Date.now()
        };

        localStorage.setItem("facilitatio_admin_replay", JSON.stringify(replayPayload));
        window.location.href = "/index.html?adminReplay=1";
      } catch (err) {
        alert("Erreur replay: " + (err?.message || "inconnue"));
      }
    }

    async function ensureAdminSession() {
      const res = await fetchWithTimeout("/api/admin/session", {
        method: "GET"
      });

      const response = await readAdminJsonResponse(res);
      const isAuthenticated = response.isJson && response.data && response.data.authenticated === true;

      if (!res.ok || !isAuthenticated) {
        const next = encodeURIComponent(window.location.pathname + window.location.search);
        window.location.href = "/admin-login.html?next=" + next;

      }

      return true;
    }

    function formatAdminDate(value) {
      if (!value) {
        return "date inconnue";
      }

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return "date inconnue";
      }

      return date.toLocaleString("fr-FR", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function hideBranchTree() {
      const wrap = document.getElementById("branchTreeWrap");
      if (!wrap) return;
      wrap.style.display = "none";
      wrap.innerHTML = "";
    }

    function renderBranchTree(data) {
      const wrap = document.getElementById("branchTreeWrap");
      if (!wrap) return;

      const branches = Array.isArray(data?.branches) ? data.branches : [];
      const conversations = Array.isArray(data?.conversations) ? data.conversations : [];
      const rootConversationId = String(data?.rootConversationId || "").trim();
      const currentConversationId = String(data?.currentConversationId || "").trim();

      wrap.innerHTML = "";

      if (!rootConversationId || branches.length === 0) {
        wrap.style.display = "none";
        return;
      }

      wrap.style.display = "block";

      const panel = document.createElement("div");
      panel.className = "branch-panel";

      const title = document.createElement("div");
      title.className = "branch-panel-title";
      title.textContent = "Arborescence des branches";
      panel.appendChild(title);

      const panelBody = document.createElement("div");
      panelBody.className = "branch-panel-body";
      panel.appendChild(panelBody);

      const conversationsById = new Map(
        conversations.map(item => [String(item?.id || "").trim(), item])
      );
      const childrenBySource = new Map();

      branches.forEach(branch => {
        const sourceConversationId = String(branch?.sourceConversationId || "").trim();
        if (!sourceConversationId) {
          return;
        }

        if (!childrenBySource.has(sourceConversationId)) {
          childrenBySource.set(sourceConversationId, []);
        }

        childrenBySource.get(sourceConversationId).push(branch);
      });

      function openAdminConversation(conversationId) {
        const safeConversationId = String(conversationId || "").trim();
        if (!safeConversationId) {
          return;
        }
        window.location.href = "/admin.html?c=" + encodeURIComponent(safeConversationId);
      }

      function renderNode(conversationId, lineage = new Set(), branchLabel = "") {
        const safeConversationId = String(conversationId || "").trim();
        const node = document.createElement("div");
        node.className = "branch-node";

        if (!safeConversationId) {
          return node;
        }

        const conversation = conversationsById.get(safeConversationId) || {};
        const card = document.createElement("div");
        card.className = "branch-card" + (safeConversationId === currentConversationId ? " current" : "");
        card.className += " clickable";
        card.onclick = () => openAdminConversation(safeConversationId);

        const header = document.createElement("div");
        header.className = "branch-card-header";

        const cardTitle = document.createElement("div");
        cardTitle.className = "branch-card-title";
        let titleText = String(conversation?.title || safeConversationId || "Conversation");
        if (branchLabel && safeConversationId !== rootConversationId) {
          titleText = branchLabel + " • " + safeConversationId;
        }
        cardTitle.textContent = titleText;
        header.appendChild(cardTitle);

        const chips = document.createElement("div");
        chips.className = "branch-card-chips";

        if (safeConversationId === rootConversationId) {
          const rootBadge = document.createElement("span");
          rootBadge.className = "branch-badge";
          rootBadge.textContent = "Tronc";
          chips.appendChild(rootBadge);
        }

        if (chips.childNodes.length) {
          header.appendChild(chips);
        }

        card.appendChild(header);

        const meta = document.createElement("div");
        meta.className = "branch-card-meta";
        if (safeConversationId === rootConversationId) {
          meta.textContent = [
            safeConversationId,
            `${Number(conversation?.messageCount || 0)} messages`,
            `Maj ${formatAdminDate(conversation?.updatedAt || conversation?.createdAt)}`
          ].join(" • ");
        } else {
          meta.textContent = [
            `${Number(conversation?.messageCount || 0)} messages`,
            `Maj ${formatAdminDate(conversation?.updatedAt || conversation?.createdAt)}`
          ].join(" • ");
        }
        card.appendChild(meta);

        node.appendChild(card);

        if (lineage.has(safeConversationId)) {
          return node;
        }

        const nextLineage = new Set(lineage);
        nextLineage.add(safeConversationId);

        const childBranches = (childrenBySource.get(safeConversationId) || [])
          .slice()
          .sort((a, b) => String(a?.createdAt || "").localeCompare(String(b?.createdAt || "")));

        if (childBranches.length === 0) {
          return node;
        }

        const childrenWrap = document.createElement("div");
        childrenWrap.className = "branch-children";

        function renderChildRow(branch, index) {
          const row = document.createElement("div");
          row.className = "branch-child-row";

          const childBranchConversationId = String(branch?.branchConversationId || "").trim();
          const branchEdge = document.createElement("div");
          branchEdge.className = "branch-edge";
          branchEdge.textContent = childBranchConversationId === currentConversationId ? "Courante" : "";

          const childContent = document.createElement("div");
          childContent.className = "branch-child-content";
          childContent.appendChild(
            renderNode(
              childBranchConversationId,
              nextLineage,
              String(index + 1)
            )
          );

          row.appendChild(branchEdge);
          row.appendChild(childContent);
          return row;
        }

        const currentChildIndex = childBranches.findIndex(branch =>
          String(branch?.branchConversationId || "").trim() === currentConversationId
        );

        if (safeConversationId === rootConversationId && childBranches.length > 1 && currentChildIndex >= 0) {
          const hiddenBranches = childBranches
            .map((branch, index) => ({ branch, index }))
            .filter(entry => entry.index !== currentChildIndex);

          if (hiddenBranches.length > 0) {
            const collapseRow = document.createElement("div");
            collapseRow.className = "branch-child-row";

            const collapseEdge = document.createElement("div");
            collapseEdge.className = "branch-edge";

            const collapseContent = document.createElement("div");
            collapseContent.className = "branch-child-content";

            const collapseChip = document.createElement("button");
            collapseChip.type = "button";
            collapseChip.className = "branch-collapse-chip";
            collapseChip.textContent = "...";
            collapseChip.setAttribute("aria-expanded", "false");

            const hiddenList = document.createElement("div");
            hiddenList.className = "branch-collapsed-list";
            hiddenList.style.display = "none";

            hiddenBranches.forEach(({ branch, index }) => {
              hiddenList.appendChild(renderChildRow(branch, index));
            });

            collapseChip.addEventListener("click", () => {
              const isOpen = hiddenList.style.display !== "none";
              hiddenList.style.display = isOpen ? "none" : "flex";
              collapseChip.setAttribute("aria-expanded", isOpen ? "false" : "true");
            });

            collapseContent.appendChild(collapseChip);
            collapseContent.appendChild(hiddenList);
            collapseRow.appendChild(collapseEdge);
            collapseRow.appendChild(collapseContent);
            childrenWrap.appendChild(collapseRow);
          }

          childrenWrap.appendChild(renderChildRow(childBranches[currentChildIndex], currentChildIndex));
          node.appendChild(childrenWrap);
          return node;
        }

        childBranches.forEach((branch, index) => {
          childrenWrap.appendChild(renderChildRow(branch, index));
        });

        node.appendChild(childrenWrap);
        return node;
      }

      panelBody.appendChild(renderNode(rootConversationId));
      wrap.appendChild(panel);
    }

    function resolvePreferredConversationIdForBranchView(data, fallbackConversationId) {
      const fallback = String(fallbackConversationId || "").trim();
      const rootConversationId = String(data?.rootConversationId || "").trim();
      const currentConversationId = String(data?.currentConversationId || "").trim();
      const branches = Array.isArray(data?.branches) ? data.branches : [];

      if (!rootConversationId) {
        return currentConversationId || fallback;
      }

      if (currentConversationId && currentConversationId !== rootConversationId) {
        return currentConversationId;
      }

      if (branches.length === 0) {
        return currentConversationId || rootConversationId || fallback;
      }

      const childrenBySource = new Map();
      branches.forEach(branch => {
        const sourceId = String(branch?.sourceConversationId || "").trim();
        if (!sourceId) return;
        if (!childrenBySource.has(sourceId)) {
          childrenBySource.set(sourceId, []);
        }
        childrenBySource.get(sourceId).push(branch);
      });

      let cursor = rootConversationId;
      const visited = new Set([cursor]);

      while (true) {
        const children = (childrenBySource.get(cursor) || [])
          .slice()
          .sort((a, b) => String(a?.createdAt || "").localeCompare(String(b?.createdAt || "")));

        if (children.length === 0) {
          break;
        }

        const newestChild = children[children.length - 1];
        const nextId = String(newestChild?.branchConversationId || "").trim();

        if (!nextId || visited.has(nextId)) {
          break;
        }

        visited.add(nextId);
        cursor = nextId;
      }

      return cursor || currentConversationId || rootConversationId || fallback;
    }

    async function fetchBranchTreeData(conversationId) {
      if (!conversationId) {
        return null;
      }

      try {
        const res = await fetchWithTimeout("/api/admin/conversations/" + encodeURIComponent(conversationId) + "/branches");
        const response = await readAdminJsonResponse(res);

        if (response.redirectedToLogin || !res.ok || !response.isJson) {
          return null;
        }

        return response.data || null;
      } catch {
        return null;
      }
    }

    async function loadBranchTree(conversationId) {
      const data = await fetchBranchTreeData(conversationId);
      if (!data) {
        hideBranchTree();
        return null;
      }
      renderBranchTree(data);
      return data;
    }
    
    async function loadConversations() {
      const list = document.getElementById("list");

      if (debugToggleBtn) {
        debugToggleBtn.style.display = "none";
        debugToggleBtn.classList.remove("active");

      }

      hideBranchTree();
      
      list.textContent = "Chargement des conversations...";
      
      try {

        const response = await readAdminJsonResponse(res);

        if (response.redirectedToLogin) {
          list.innerHTML = '<div class="error">Session admin expiree. Redirection...</div>';

        }
        
        if (!res.ok) {

        const editIconMarkup = `

            <path d="M12.8 7.2l4 4" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"></path>
          </svg>
        `;
        const deleteIconMarkup = `
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6 7h12" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"></path>
            <path d="M9.5 7V5.9A1.4 1.4 0 0 1 10.9 4.5h2.2a1.4 1.4 0 0 1 1.4 1.4V7" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"></path>
            <path d="M8.2 10.2v6.1M12 10.2v6.1M15.8 10.2v6.1" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"></path>
            <path d="M7.2 7l.7 11.2A1.7 1.7 0 0 0 9.6 19.8h4.8a1.7 1.7 0 0 0 1.7-1.6L16.8 7" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"></path>
          </svg>
        `;

        const renameConversation = async conv => {
          const currentTitle = String(conv.displayTitle || "").trim();
          const raw = window.prompt("Nouveau titre de conversation", currentTitle || "");
          if (raw === null) {
            return;
          }

          const nextTitle = String(raw || "").trim().slice(0, 60);

          const res = await fetchWithTimeout("/api/admin/conversations/" + encodeURIComponent(conv.id) + "/title", {
            method: "PATCH",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ title: nextTitle || null })
          });
          const response = await readAdminJsonResponse(res);

          if (response.redirectedToLogin) {
            return;
          }

          if (!res.ok) {
            const message = typeof response.data?.error === "string" ? response.data.error : "Renommage impossible";
            alert(message);
            return;
          }

          await loadConversations();
        };

        const deleteConversation = async conv => {
          const ok = window.confirm("Supprimer cette conversation de Firebase ?\n\nCette action est irreversible.");
          if (!ok) {
            return;
          }

          const res = await fetchWithTimeout("/api/admin/conversations/" + encodeURIComponent(conv.id), {
            method: "DELETE"
          });
          const response = await readAdminJsonResponse(res);

          if (response.redirectedToLogin) {
            return;
          }

          if (!res.ok) {
            const message = typeof response.data?.error === "string" ? response.data.error : "Suppression impossible";
            alert(message);
            return;
          }

          await loadConversations();
        };

        data.forEach(conv => {
          const card = document.createElement("div");

          card.dataset.convId = conv.id;

          const renameSwipeBtn = document.createElement("button");

          renameSwipeBtn.setAttribute("aria-label", "Renommer la conversation");

          deleteSwipeBtn.className = "admin-swipe-action admin-swipe-action-delete";
          deleteSwipeBtn.setAttribute("aria-label", "Supprimer la conversation");
          deleteSwipeBtn.innerHTML = deleteIconMarkup;

          const openBtn = document.createElement("button");
          openBtn.type = "button";
          openBtn.className = "admin-conversation-open-btn";

          const mainLine = document.createElement("div");
          mainLine.className = "admin-conversation-main";

          const updatedDate = new Date(conv.updatedAt || conv.createdAt);
          const formattedDate = updatedDate.toLocaleString("fr-FR", {
            day: "2-digit",
            month: "2-digit",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit"
          });

          const userDisplay = conv.userLabel || conv.userId || "user inconnu";
          mainLine.textContent = formattedDate + " — " + userDisplay;

          const title = document.createElement("div");
          title.className = "admin-conversation-title";
          title.textContent = conv.displayTitle || "(sans titre)";

          const count = document.createElement("div");
          count.className = "admin-conversation-count";
          count.textContent = (conv.messageCount || 0) + " messages";

          let swipeStartX = 0;
          let swipeStartY = 0;
          let swipeDeltaX = 0;
          let swipeActive = false;
          let swipePointerId = null;
          let swipeDirectionLocked = false;
          let swipeBaseOffset = 0;
          const swipeRevealWidth = 72;

          const closeSwipeActions = () => {
            swipeActive = false;
            swipeDeltaX = 0;
            swipeBaseOffset = 0;
            swipePointerId = null;
            swipeDirectionLocked = false;
            card.classList.remove("is-swipe-open-left", "is-swipe-open-right");
            openBtn.style.transform = "translateX(0)";

            if (activeAdminConversationSwipeElement === card) {
              activeAdminConversationSwipeElement = null;
              activeAdminConversationSwipeCloser = null;
            }
          };

          const applySwipeOffset = offset => {
            const clamped = Math.max(-swipeRevealWidth, Math.min(swipeRevealWidth, offset));
            swipeDeltaX = clamped;
            openBtn.style.transform = `translateX(${clamped}px)`;
            card.classList.toggle("is-swipe-open-left", clamped < -24);
            card.classList.toggle("is-swipe-open-right", clamped > 24);

            if (clamped < -24 || clamped > 24) {
              activeAdminConversationSwipeElement = card;
              activeAdminConversationSwipeCloser = closeSwipeActions;
            } else if (activeAdminConversationSwipeElement === card) {
              activeAdminConversationSwipeElement = null;
              activeAdminConversationSwipeCloser = null;
            }
          };

          const startSwipe = event => {
            if (event.target.closest(".admin-swipe-action")) return;
            if (event.type === "mousedown" && event.button !== 0) return;

            if (activeAdminConversationSwipeCloser && activeAdminConversationSwipeElement && activeAdminConversationSwipeElement !== card) {
              activeAdminConversationSwipeCloser();
            }

            swipeActive = true;
            swipeDirectionLocked = false;
            swipeBaseOffset = swipeDeltaX;
            swipePointerId = event.pointerId || null;
            swipeStartX = event.touches && event.touches[0] ? event.touches[0].clientX : (event.clientX || 0);
            swipeStartY = event.touches && event.touches[0] ? event.touches[0].clientY : (event.clientY || 0);
          };

          const moveSwipe = event => {
            if (!swipeActive) return;
            if (swipePointerId !== null && event.pointerId !== undefined && event.pointerId !== swipePointerId) return;

            const clientX = event.touches && event.touches[0] ? event.touches[0].clientX : (event.clientX || 0);
            const clientY = event.touches && event.touches[0] ? event.touches[0].clientY : (event.clientY || 0);
            const deltaX = clientX - swipeStartX;
            const deltaY = clientY - swipeStartY;

            if (!swipeDirectionLocked) {
              if (Math.abs(deltaY) > 10 && Math.abs(deltaY) > Math.abs(deltaX)) {
                swipeActive = false;
                return;
              }

              if (Math.abs(deltaX) > 8) {
                swipeDirectionLocked = true;
              } else {
                return;
              }
            }

            if (event.cancelable) {
              event.preventDefault();
            }

            applySwipeOffset(swipeBaseOffset + deltaX);
          };

          const endSwipe = () => {
            if (!swipeActive && !swipeDirectionLocked) return;

            if (swipeDeltaX <= -40) {
              applySwipeOffset(-swipeRevealWidth);
            } else if (swipeDeltaX >= 40) {
              applySwipeOffset(swipeRevealWidth);
            } else {
              closeSwipeActions();
            }

            swipeActive = false;
            swipePointerId = null;
            swipeDirectionLocked = false;
          };

          openBtn.addEventListener("click", e => {
            if (card.classList.contains("is-swipe-open-left") || card.classList.contains("is-swipe-open-right")) {
              e.preventDefault();
              e.stopPropagation();
              closeSwipeActions();
              return;
            }
            window.location.href = "/admin.html?c=" + encodeURIComponent(conv.id);
          });

          renameSwipeBtn.addEventListener("click", async e => {
            e.preventDefault();
            e.stopPropagation();
            closeSwipeActions();
            await renameConversation(conv);
          });

          deleteSwipeBtn.addEventListener("click", async e => {
            e.preventDefault();
            e.stopPropagation();
            closeSwipeActions();
            await deleteConversation(conv);
          });

          card.addEventListener("touchstart", startSwipe, { passive: true });
          card.addEventListener("touchmove", moveSwipe, { passive: false });
          card.addEventListener("touchend", endSwipe);
          card.addEventListener("touchcancel", closeSwipeActions);
          card.addEventListener("mousedown", startSwipe);
          card.addEventListener("mousemove", moveSwipe);
          card.addEventListener("mouseup", endSwipe);
          card.addEventListener("mouseleave", endSwipe);

          openBtn.appendChild(mainLine);
          openBtn.appendChild(title);
          openBtn.appendChild(count);

          card.appendChild(renameSwipeBtn);
          card.appendChild(deleteSwipeBtn);
          card.appendChild(openBtn);
          list.appendChild(card);
        });
      } catch (err) {
        const isTimeout = err && (err.name === "AbortError" || String(err.message || "").toLowerCase().includes("aborted"));
        list.innerHTML = isTimeout ?
          '<div class="error">Le serveur ne repond pas a temps. Reessaie dans quelques secondes.</div>' :
          '<div class="error">Erreur JS conversations: ' + err.message + "</div>";
      }
    }
    
    async function loadMessages(conversationId) {
      const list = document.getElementById("list");
      const debugToggleBtn = document.getElementById("debugToggleBtn");
      const branchTreeData = await fetchBranchTreeData(conversationId);
      const preferredConversationId = resolvePreferredConversationIdForBranchView(branchTreeData, conversationId);

      if (preferredConversationId && preferredConversationId !== conversationId) {
        window.location.replace("/admin.html?c=" + encodeURIComponent(preferredConversationId));
        return;
      }

      const branchTreePromise = (async () => {
        if (branchTreeData) {
          renderBranchTree(branchTreeData);
        }
        return branchTreeData;
      })();

      if (debugToggleBtn) {
        debugToggleBtn.style.display = "none";
        debugToggleBtn.classList.remove("active");
        debugToggleBtn.onclick = null;
      }
      
      list.textContent = "Chargement des messages...";
      
      try {
        const res = await fetchWithTimeout("/api/admin/conversations/" + encodeURIComponent(conversationId) + "/messages");
        const response = await readAdminJsonResponse(res);

        if (response.redirectedToLogin) {
          list.innerHTML = '<div class="error">Session admin expiree. Redirection...</div>';
          return;
        }

        if (!res.ok) {
          const errorMessage = typeof response.data?.error === "string" ? response.data.error : "Erreur HTTP messages: " + res.status;
            list.innerHTML = '<div class="error">' + errorMessage + '</div>';
          return;
        }

        if (!response.isJson) {
          list.innerHTML = '<div class="error">Reponse serveur invalide</div>';
          return;
        }

        const data = response.data;
        list.innerHTML = "";
        
        if (!Array.isArray(data) || !data.length) {
          list.innerHTML = '<div class="empty">Aucun message</div>';
          return;
        }
        
        function extractCompareLabel(content) {
          const text = String(content || "");
          const match = text.match(/^\[(Référence|Override 1|Override 1 \+ 2)\]\n\n([\s\S]*)$/);
          
          if (!match) {
            return {
              label: "",
              content: text
            };
          }
          
          return {
            label: match[1],
            content: match[2]
          };
        }
        
        function getCompareLabelStyle(label) {
          if (label === "Référence") {
            return {
              color: "#245e66",
              border: "1px solid rgba(36,94,102,0.22)",
              background: "rgba(36,94,102,0.08)"
            };
          }
          
          if (label === "Override 1") {
            return {
              color: "#7a3fd1",
              border: "1px solid rgba(122,63,209,0.22)",
              background: "rgba(122,63,209,0.08)"
            };
          }
          
          if (label === "Override 1 + 2") {
            return {
              color: "#c05621",
              border: "1px solid rgba(192,86,33,0.22)",
              background: "rgba(192,86,33,0.08)"
            };
          }
          
          return {
            color: "#245e66",
            border: "1px solid rgba(36,94,102,0.18)",
            background: "rgba(36,94,102,0.06)"
          };
        }
        
        function normalizeDebugMeta(debugMeta) {
          return normalizeReplayDebugMeta(debugMeta);
        }

        function buildNaturalDebugSummary(meta) {
          const lines = [];

          const infoSubmodeLabel =
            meta.infoSubmode === "pure" ? "information generale" :
            meta.infoSubmode === "app_features" ? "information sur l'app" :
            meta.infoSubmode === "psychoeducation" ? "psychoeducation" :
            null;

          if (infoSubmodeLabel) {
            lines.push(`Le tour a ete interprete en mode ${infoSubmodeLabel}.`);
          }

          if (meta.conversationStateKey) {
            lines.push(`Etat de conversation retenu: ${meta.conversationStateKey}.`);
          }

          if (meta.interpretationRejection === true) {
            lines.push("Un rejet d'interpretation a ete detecte et pris en compte.");
          }

          if (meta.needsSoberReadjustment === true) {
            lines.push("Un reajustement sobre a ete applique sur ce tour.");
          }

          if (meta.relationalAdjustmentTriggered === true) {
            lines.push("Un ajustement relationnel a ete declenche.");
          }

          if (Number.isInteger(meta.explorationCalibrationLevel)) {
            lines.push(`Niveau de structuration retenu: ${meta.explorationCalibrationLevel}/4.`);
          }

          lines.push(
            `Lecture structurelle: alliance ${meta.allianceState || "good"}, engagement ${meta.engagementLevel || "active"}, fenetre de traitement ${meta.processingWindow || "open"}.`
          );

          if (meta.stagnationTurns > 0) {
            lines.push(`Stagnation detectee depuis ${meta.stagnationTurns} tour(s).`);
          }

          if (meta.dependencyRiskLevel && meta.dependencyRiskLevel !== "low") {
            lines.push(`Risque de dependance estime: ${meta.dependencyRiskLevel} (${meta.dependencyRiskScore}/100).`);
          }

          if (meta.externalSupportMode && meta.externalSupportMode !== "none") {
            lines.push(`Rapport au soutien externe detecte: ${meta.externalSupportMode}.`);
          }

          if (meta.closureIntent === true) {
            lines.push("Une intention de cloture de session a ete detectee.");
          }

          if (meta.rewriteSource) {
            lines.push(`La reponse finale a ete re-ecrite via: ${meta.rewriteSource}.`);
          }

          if (meta.memoryRewriteSource) {
            lines.push(`La memoire a ete re-ecrite via: ${meta.memoryRewriteSource}.`);
          }

          if (meta.criticTriggered === true) {
            lines.push(meta.criticIssues.length > 0 ?
              `Le critic pass a corrige ${meta.criticIssues.length} point(s).` :
              "Le critic pass a ete lance sans correction necessaire.");
          }

          if (meta.confidenceSignal && meta.confidenceSignal === "low") {
            lines.push(`Signal de confiance : faible (le bot a signale une incertitude).`);
          }

          if (meta.pipelineStages.length > 0) {
            const totalMs = meta.pipelineStages.reduce((acc, stage) => acc + (Number.isFinite(stage.deltaMs) ? stage.deltaMs : 0), 0);
            lines.push(`Pipeline execute en ${totalMs} ms sur ${meta.pipelineStages.length} etape(s).`);
          }

          return lines;
        }
        
        function buildDebugSections(debug, debugMeta) {
          const safeDebug = Array.isArray(debug) ? debug : [];
          const meta = normalizeDebugMeta(debugMeta);
          const sections = [];
          const signalLines = [];

          if (meta.infoSubmode === "pure") {
            signalLines.push("Sous-mode info : information generale");
          } else if (meta.infoSubmode === "app_features") {
            signalLines.push("Sous-mode info : information sur l'app");
          } else if (meta.infoSubmode === "psychoeducation") {
            signalLines.push("Sous-mode info : psychoeducation");
          }

          if (meta.interpretationRejection === true) {
            signalLines.push("Rejet d'interprétation détecté : oui");
          }

          if (meta.explorationSubmode) {
            signalLines.push(`Sous-mode exploration : ${meta.explorationSubmode}`);
          }
          
          if (meta.topChips.length) {
            sections.push({
              title: "Chips",
              content: meta.topChips.join("\n")
            });
          }

          if (signalLines.length) {
            sections.push({
              title: "Signaux",
              content: signalLines.join("\n")
            });
          }

          const naturalSummaryLines = buildNaturalDebugSummary(meta);
          if (naturalSummaryLines.length > 0) {
            sections.push({
              title: "Lecture interne",
              content: naturalSummaryLines.join("\n")
            });
          }
          
          if (meta.memory) {
            sections.push({
              title: "Mémoire",
              content: meta.memory
            });
          }
          
          if (meta.directivityText) {
            sections.push({
              title: "Directivité",
              content: meta.directivityText
            });
          }

          if (meta.therapeuticAllianceSource) {
            sections.push({
              title: "Réponse avant ajustement relationnel",
              content: meta.therapeuticAllianceSource
            });
          }

          if (meta.memoryCompressed && meta.memoryBeforeCompression) {
            sections.push({
              title: "M\u00e9moire avant r\u00e9\u00e9criture",
              content: meta.memoryBeforeCompression
            });
          } else {
            sections.push({
              title: "Pas de r\u00e9\u00e9criture",
              content: "\u2014"
            });
          }
          
          if (meta.writerMode) {
            sections.push({
              title: "Contrat de posture (V3)",
              content: [
                `Mode : ${meta.writerMode}`,
                meta.intent ? `Intention : ${meta.intent}` : null,
                (meta.forbidden && meta.forbidden.length) ? `Interdit : ${meta.forbidden.join(", ")}` : null,
                meta.confidenceSignal ? `Signal confiance : ${meta.confidenceSignal}` : null,
              ].filter(Boolean).join("\n")
            });
          }

          if (meta.memoryRewriteSource) {
            sections.push({
              title: "R\u00e9écriture m\u00e9moire",
              content: meta.memoryRewriteSource
            });
          }
          
          const overrideLines = safeDebug.filter(line => {
            const text = String(line || "");
            return (
              text.startsWith("override1Applied:") ||
              text.startsWith("override1Missing:") ||
              text.startsWith("override2Applied:") ||
              text.startsWith("override2Missing:")
            );
          });
          
          if (overrideLines.length) {
            sections.push({
              title: "Overrides appliqués",
              content: overrideLines.join("\n")
            });
          }
          
          return sections.filter(section => String(section.content || "").trim());
        }
        
        function buildAssistantVariants(msg) {
          const source = Array.isArray(msg.comparisonResults) && msg.comparisonResults.length ?
            msg.comparisonResults :
            Array.isArray(msg.results) && msg.results.length ?
            msg.results :
            null;
          
          if (source) {
            return source.map(entry => ({
              label: String(entry.label || "").trim(),
              content: String(entry.reply || ""),
              debug: Array.isArray(entry.debug) ? entry.debug : [],
              debugMeta: entry.debugMeta && typeof entry.debugMeta === "object" ? entry.debugMeta : {}
            }));
          }
          
          const parsed = extractCompareLabel(msg.content || "");
          
          return [{
            label: parsed.label,
            content: parsed.content,
            debug: Array.isArray(msg.debug) ? msg.debug : [],
            debugMeta: msg.debugMeta && typeof msg.debugMeta === "object" ? msg.debugMeta : {}
          }];
        }
        
        function createDebugDetails(debugSections) {
          if (!Array.isArray(debugSections) || debugSections.length === 0) {
            return null;
          }

          function getSectionPalette(title) {
            if (title === "Mémoire") {
              return {
                titleColor: "#8a5a18",
                blockBackground: "#fff8eb",
                blockBorder: "#e8c06e"
              };
            }

            if (title === "Directivité") {
              return {
                titleColor: "#2d5d96",
                blockBackground: "#ecf5ff",
                blockBorder: "#75a3db"
              };
            }

            if (title === "Signaux") {
              return {
                titleColor: "#2d6a3c",
                blockBackground: "#edf9f1",
                blockBorder: "#6db380"
              };
            }

            if (title.indexOf("Conflit") === 0) {
              return {
                titleColor: "#9c3b2c",
                blockBackground: "#fff0ee",
                blockBorder: "#e07e6a"
              };
            }

            return {
              titleColor: "#245e66",
              blockBackground: "#ffffff",
              blockBorder: "#d6e2e1"
            };
          }
          
          const debugWrap = document.createElement("div");
          debugWrap.style.marginTop = "10px";
          
          const debugDetails = document.createElement("details");
          debugDetails.className = "admin-debug-details";
          debugDetails.style.border = "1px solid #d6e2e1";
          debugDetails.style.borderRadius = "12px";
          debugDetails.style.background = "#f8fbfb";
          debugDetails.style.overflow = "hidden";
          
          const debugSummary = document.createElement("summary");
          debugSummary.textContent = "Debug";
          debugSummary.style.listStyle = "none";
          debugSummary.style.cursor = "pointer";
          debugSummary.style.padding = "10px 12px";
          debugSummary.style.fontSize = "13px";
          debugSummary.style.fontWeight = "700";
          debugSummary.style.color = "#245e66";
          debugSummary.style.userSelect = "none";
          
          const debugBox = document.createElement("div");
          debugBox.style.padding = "10px";
          debugBox.style.borderTop = "1px solid #d6e2e1";
          debugBox.style.background = "#eef4f4";
          debugBox.style.display = "flex";
          debugBox.style.flexDirection = "column";
          debugBox.style.gap = "8px";
          
          debugSections.forEach(section => {
            const palette = getSectionPalette(section.title);
            const sectionBlock = document.createElement("div");
            
            const sectionTitle = document.createElement("div");
            sectionTitle.textContent = section.title;
            sectionTitle.style.fontSize = "12px";
            sectionTitle.style.fontWeight = "700";
            sectionTitle.style.textTransform = "uppercase";
            sectionTitle.style.letterSpacing = "0.04em";
            sectionTitle.style.color = palette.titleColor;
            sectionTitle.style.marginBottom = "4px";
            
            const sectionContent = document.createElement("div");
            sectionContent.style.padding = "10px";
            sectionContent.style.borderRadius = "10px";
            sectionContent.style.background = palette.blockBackground;
            sectionContent.style.border = `1px solid ${palette.blockBorder}`;
            sectionContent.style.fontSize = "13px";
            sectionContent.style.lineHeight = "1.45";
            sectionContent.style.color = "#334155";
            sectionContent.style.whiteSpace = "pre-wrap";
            sectionContent.style.wordBreak = "break-word";
            sectionContent.style.overflowWrap = "break-word";
            sectionContent.style.userSelect = "text";
            sectionContent.style.webkitUserSelect = "text";
            sectionContent.style.cursor = "text";
            sectionContent.textContent = section.content;
            
            sectionBlock.appendChild(sectionTitle);
            sectionBlock.appendChild(sectionContent);
            debugBox.appendChild(sectionBlock);
          });
          
          debugDetails.appendChild(debugSummary);
          debugDetails.appendChild(debugBox);
          debugWrap.appendChild(debugDetails);
          
          return debugWrap;
        }
        
        function createAssistantVariantCard(variant) {
          const parsed = extractCompareLabel(
            variant.label ? `[${variant.label}]\n\n${variant.content}` : variant.content
          );
          
          const box = document.createElement("div");
          box.style.marginTop = "10px";
          box.style.padding = "12px";
          box.style.borderRadius = "14px";
          box.style.background = "#f8fbfb";
          box.style.border = "1px solid #d6e2e1";
          
          if (parsed.label) {
            const compareTag = document.createElement("div");
            const compareStyle = getCompareLabelStyle(parsed.label);
            
            compareTag.textContent = parsed.label;
            compareTag.style.display = "inline-flex";
            compareTag.style.alignItems = "center";
            compareTag.style.padding = "5px 9px";
            compareTag.style.marginBottom = "8px";
            compareTag.style.borderRadius = "999px";
            compareTag.style.fontSize = "12px";
            compareTag.style.fontWeight = "700";
            compareTag.style.lineHeight = "1";
            compareTag.style.color = compareStyle.color;
            compareTag.style.border = compareStyle.border;
            compareTag.style.background = compareStyle.background;
            
            box.appendChild(compareTag);
          }
          
          const main = document.createElement("div");
          main.className = "main";
          main.textContent = parsed.content || "";
          box.appendChild(main);
          
          const debugDetails = createDebugDetails(buildDebugSections(variant.debug, variant.debugMeta));
          if (debugDetails) {
            box.appendChild(debugDetails);
          }
          
          return box;
        }
        
        const hasAnyAssistantDebug = data.some(msg => {
          if (msg.role !== "assistant") return false;
          const variants = buildAssistantVariants(msg);
          return variants.some(variant => buildDebugSections(variant.debug, variant.debugMeta).length > 0);
        });

        function updateDebugToggleButtonState() {
          if (!debugToggleBtn) {
            return;
          }

          const debugPanels = Array.from(list.querySelectorAll(".admin-debug-details"));
          const allOpen = debugPanels.length > 0 && debugPanels.every(el => el.open === true);
          debugToggleBtn.classList.toggle("active", allOpen);
        }
        
        data.forEach(msg => {
          const isUser = msg.role === "user";
          
          const wrapper = document.createElement("div");
          wrapper.className = "message-row";
          wrapper.style.justifyContent = isUser ? "flex-end" : "flex-start";
          
          const card = document.createElement("div");
          card.className = "item role-" + msg.role;
          card.style.maxWidth = "78%";
          
          const meta = document.createElement("div");
          meta.className = "meta";
          const userDisplay = msg.userLabel ?? msg.userId ?? "user inconnu";
          
          meta.textContent =
            new Date(msg.timestamp || msg.createdAt || Date.now()).toLocaleString() +
            " • " +
            (isUser ? userDisplay : "assistant");

          if (!isUser) {
            const replayBtn = document.createElement("button");
            replayBtn.type = "button";
            replayBtn.textContent = "Tester ici";
            replayBtn.style.marginLeft = "8px";
            replayBtn.style.fontSize = "11px";
            replayBtn.style.padding = "2px 7px";
            replayBtn.style.borderRadius = "999px";
            replayBtn.style.border = "1px solid #b4c6cb";
            replayBtn.style.background = "#ffffff";
            replayBtn.style.color = "#245e66";
            replayBtn.style.cursor = "pointer";
            replayBtn.onclick = async (e) => {
              e.preventDefault();
              e.stopPropagation();
              replayBtn.disabled = true;
              try {
                await openReplayInChat(conversationId, String(msg.id || ""));
              } finally {
                replayBtn.disabled = false;
              }
            };
            meta.appendChild(replayBtn);
          }
          
          card.appendChild(meta);
          
          if (isUser) {
            const main = document.createElement("div");
            main.className = "main";
            main.textContent = msg.content || "";
            card.appendChild(main);
          } else {
            const variants = buildAssistantVariants(msg);
            
            variants.forEach((variant, index) => {
              if (variants.length === 1 && !variant.label) {
                const main = document.createElement("div");
                main.className = "main";
                main.textContent = variant.content || "";
                card.appendChild(main);
                
                const debugDetails = createDebugDetails(buildDebugSections(variant.debug, variant.debugMeta));
                if (debugDetails) {
                  card.appendChild(debugDetails);
                }
                return;
              }
              
              if (index > 0) {
                const separator = document.createElement("div");
                separator.style.height = "1px";
                separator.style.margin = "10px 0";
                separator.style.background = "#d6e2e1";
                card.appendChild(separator);
              }
              
              card.appendChild(createAssistantVariantCard(variant));
            });
          }

          // Render feedback badge if present
          if (msg.feedback && msg.feedback.type) {
            const fb = msg.feedback;
            const fbRow = document.createElement("div");
            fbRow.style.marginTop = "6px";
            fbRow.style.display = "flex";
            fbRow.style.flexWrap = "wrap";
            fbRow.style.alignItems = "center";
            fbRow.style.gap = "6px";
            fbRow.style.fontSize = "12px";

            const thumbLabel = fb.type === "thumbUp" ? "👍" : "👎";
            const thumbBadge = document.createElement("span");
            thumbBadge.textContent = thumbLabel;
            thumbBadge.style.fontSize = "15px";
            fbRow.appendChild(thumbBadge);

            if (fb.devShare) {
              const sharedBadge = document.createElement("span");
              sharedBadge.textContent = "Transmis au dev";
              const isNegative = fb.type === "thumbDown";
              sharedBadge.style.background = isNegative ? "#fde2e2" : "#d1f0e0";
              sharedBadge.style.color = isNegative ? "#9a1f1f" : "#1a6b3b";
              sharedBadge.style.borderRadius = "999px";
              sharedBadge.style.padding = "2px 8px";
              sharedBadge.style.fontWeight = "600";
              fbRow.appendChild(sharedBadge);
            } else {
              const localBadge = document.createElement("span");
              localBadge.textContent = "Local uniquement";
              localBadge.style.background = "#f0f0f0";
              localBadge.style.color = "#666";
              localBadge.style.borderRadius = "999px";
              localBadge.style.padding = "2px 8px";
              fbRow.appendChild(localBadge);
            }

            if (fb.comment) {
              const commentEl = document.createElement("span");
              commentEl.textContent = "\u00ab\u00a0" + fb.comment + "\u00a0\u00bb";
              commentEl.style.color = "#444";
              commentEl.style.fontStyle = "italic";
              commentEl.style.flex = "1 1 100%";
              commentEl.style.marginTop = "2px";
              fbRow.appendChild(commentEl);
            }

            card.appendChild(fbRow);
          }
          
          wrapper.appendChild(card);
          list.appendChild(wrapper);
        });

        if (debugToggleBtn) {
          if (hasAnyAssistantDebug) {
            debugToggleBtn.style.display = "inline-flex";
            debugToggleBtn.onclick = () => {
              const debugPanels = Array.from(list.querySelectorAll(".admin-debug-details"));
              if (!debugPanels.length) {
                return;
              }

              const shouldOpen = !debugPanels.every(el => el.open === true);
              debugPanels.forEach(el => {
                el.open = shouldOpen;
              });
              updateDebugToggleButtonState();
            };

            list.querySelectorAll(".admin-debug-details").forEach(el => {
              el.addEventListener("toggle", updateDebugToggleButtonState);
            });
            updateDebugToggleButtonState();
          } else {
            debugToggleBtn.style.display = "none";
            debugToggleBtn.classList.remove("active");
            debugToggleBtn.onclick = null;
          }
        }

        await branchTreePromise;
        
      } catch (err) {
        const isTimeout = err && (err.name === "AbortError" || String(err.message || "").toLowerCase().includes("aborted"));
        list.innerHTML = isTimeout ?
          '<div class="error">Le serveur ne repond pas a temps. Reessaie dans quelques secondes.</div>' :
          '<div class="error">Erreur JS messages: ' + err.message + "</div>";
      }
    }
    
    async function init() {
      const list = document.getElementById("list");
      const adminActionsWrap = document.getElementById("adminActionsWrap");
      list.textContent = "Verification de la session admin...";

      const hasSession = await ensureAdminSession();
      if (!hasSession) {
        return;
      }

      setupRootBackToIndex();
      
      const conversationId = getConversationIdFromUrl();
      const conversationMeta = document.getElementById("conversationMeta");
      const title = document.querySelector("h1");
      
      if (conversationId) {
        title.textContent = "Messages";
        if (adminActionsWrap) {
          adminActionsWrap.style.display = "none";
        }
        conversationMeta.style.display = "none";
        conversationMeta.textContent = "";
        await loadMessages(conversationId);
      } else {
        title.textContent = "Conversations";
        if (adminActionsWrap) {
          adminActionsWrap.style.display = "block";
        }
        conversationMeta.style.display = "none";
        conversationMeta.textContent = "";
        await loadConversations();
      }
    }

    function renderInitError(error) {
      const list = document.getElementById("list");
      const message = error && error.message ? error.message : String(error || "Erreur inconnue");
      list.innerHTML = '<div class="error">Erreur d\'initialisation admin: ' + message + '</div>';
    }

    window.addEventListener("error", event => {
      renderInitError(event.error || event.message || "Erreur JavaScript");
    });

    window.addEventListener("unhandledrejection", event => {
      renderInitError(event.reason || "Promesse rejetee");
    });

    document.addEventListener("DOMContentLoaded", () => {
      const adminActionsBtn = document.getElementById("adminActionsBtn");
      const adminWipeDataBtn = document.getElementById("adminWipeDataBtn");

      if (adminActionsBtn) {
        adminActionsBtn.addEventListener("click", toggleAdminActionsMenu);
      }

      if (adminWipeDataBtn) {
        adminWipeDataBtn.addEventListener("click", openAdminWipeModal);
      }

      document.addEventListener("click", event => {
        if (!event.target.closest("#adminActionsWrap")) {
          closeAdminActionsMenu();
        }

        if (
          activeAdminConversationSwipeCloser &&
          activeAdminConversationSwipeElement &&
          !event.target.closest(".admin-conversation-card")
        ) {
          activeAdminConversationSwipeCloser();
        }
      });

      init().catch(renderInitError);
    });
  </script>
</body>

</html>
