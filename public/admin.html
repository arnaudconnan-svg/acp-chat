<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <title>Admin - Conversations</title>
  
  <style>
    * {
      box-sizing: border-box;
    }
    
    html,
    body {
      margin: 0;
      padding: 0;
      background: #d7e4e3;
      color: #1f2937;
      font-family: Arial, sans-serif;
      color-scheme: light;
    }
    
    body {
      min-height: 100vh;
    }
    
    #app {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 12px 12px calc(24px + env(safe-area-inset-bottom, 0px));
    }
    
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #d7e4e3;
      padding: 8px 0 12px;
    }
    
    h1 {
      font-size: 28px;
      line-height: 1.15;
      margin: 0 0 12px;
      color: #1f3f44;
    }
    
    #backBtn {
      display: none;
      width: 100%;
      min-height: 48px;
      border: 1px solid #cfd8db;
      border-radius: 12px;
      background: white;
      color: #245e66;
      font-size: 17px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }
    
    #list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .item {
      background: #f7fbfa;
      border: 1px solid #d6e2e1;
      border-radius: 16px;
      padding: 14px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(43, 79, 82, 0.08);
    }
    
    .item:hover {
      background: #fbfbfc;
    }
    
    .message-row {
      display: flex;
    }
    
    .message-row .item {
      cursor: default;
      box-shadow: none;
    }
    
    .message-row .item:hover {
      background: inherit;
    }
    
    .meta {
      font-size: 12px;
      line-height: 1.4;
      color: #6b7280;
      margin-bottom: 8px;
    }
    
    .main {
      font-size: 16px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: break-word;
    }
    
    .conv-id {
      font-size: 14px;
      line-height: 1.35;
      color: #1f2937;
      font-weight: 600;
      margin-bottom: 6px;
      word-break: break-all;
    }
    
    .loading,
    .empty,
    .error {
      background: white;
      border: 1px solid #dde4e7;
      border-radius: 16px;
      padding: 16px;
      font-size: 16px;
      line-height: 1.5;
    }
    
    .error {
      color: #991b1b;
    }
    
    .role-user {
      background: #4a7478;
      color: white;
      border: none;
    }
    
    .role-user .meta {
      color: rgba(255, 255, 255, 0.78);
    }
    
    .role-user .main {
      color: white;
    }
    
    .role-assistant {
      background: white;
      border: none;
    }
    
    .role-assistant .meta {
      color: #708487;
    }
    
    .role-assistant .main {
      color: #4b6366;
    }
    
    .preview {
      font-size: 16px;
      line-height: 1.5;
      color: #334155;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }
    
    @media (max-width: 640px) {
      #app {
        padding-left: 10px;
        padding-right: 10px;
      }
      
      h1 {
        font-size: 24px;
      }
      
      .item {
        padding: 12px;
        border-radius: 14px;
      }
      
      .main,
      .preview,
      .loading,
      .empty,
      .error {
        font-size: 15px;
      }
      
      .message-row .item {
        max-width: 88% !important;
      }
    }
  </style>
</head>

<body>
  
  <div id="app">
    <div class="topbar">
      
      <h1>Conversations</h1>
      
      <button id="backBtn" onclick="goBack()" style="display:none;">
        ← Retour
      </button>
      
      <div id="conversationMeta" class="meta" style="display:none;"></div>
      
    </div>
    
    <div id="list">Chargement...</div>
  </div>
  
  <script>
    function getConversationIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("c");
    }
    
    function goBack() {
      window.location.href = "/admin.html";
    }
    
    function setupRootBackToIndex() {
      const conversationId = getConversationIdFromUrl();
      if (conversationId) return;
      
      history.replaceState({ adminRoot: true }, "", window.location.href);
      history.pushState({ adminTrap: true }, "", window.location.href);
      
      window.addEventListener("popstate", (e) => {
        if (e.state && e.state.adminRoot) {
          window.location.href = "/index.html";
        }
      });
    }
    
    async function loadConversations() {
      const list = document.getElementById("list");
      list.textContent = "Chargement des conversations...";
      
      try {
        const res = await fetch("/api/admin/conversations");
        
        if (!res.ok) {
          list.innerHTML = '<div class="error">Erreur HTTP conversations: ' + res.status + "</div>";
          return;
        }
        
        const data = await res.json();
        list.innerHTML = "";
        
        if (!Array.isArray(data) || !data.length) {
          list.innerHTML = '<div class="empty">Aucune conversation</div>';
          return;
        }
        
        data.forEach(conv => {
          const card = document.createElement("div");
          card.className = "item";
          card.style.position = "relative";
          card.dataset.convId = conv.id;
          
          const mainLine = document.createElement("div");
          mainLine.style.fontSize = "15px";
          mainLine.style.fontWeight = "600";
          mainLine.style.color = "#1f3f44";
          mainLine.style.marginBottom = "4px";
          
          const updatedDate = new Date(conv.updatedAt || conv.createdAt);
          const formattedDate = updatedDate.toLocaleString("fr-FR", {
            day: "2-digit",
            month: "2-digit",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit"
          });
          
          const userDisplay = conv.userLabel || conv.userId || "user inconnu";
          mainLine.textContent = formattedDate + " — " + userDisplay;
          
          const title = document.createElement("div");
          title.style.fontSize = "15px";
          title.style.color = "#334155";
          title.style.marginBottom = "4px";
          title.style.whiteSpace = "nowrap";
          title.style.overflow = "hidden";
          title.style.textOverflow = "ellipsis";
          title.style.fontWeight = "500";
          
          const sessionTitle = conv.displayTitle || "(sans titre)";
          title.textContent = sessionTitle;
          
          const count = document.createElement("div");
          count.style.fontSize = "13px";
          count.style.color = "#6b7280";
          
          const messageCount = conv.messageCount || 0;
          count.textContent = messageCount + " messages";
          
          const menuBtn = document.createElement("div");
          menuBtn.textContent = "⋮";
          menuBtn.style.position = "absolute";
          menuBtn.style.top = "10px";
          menuBtn.style.right = "10px";
          menuBtn.style.fontSize = "18px";
          menuBtn.style.color = "#6b7280";
          menuBtn.style.cursor = "pointer";
          
          menuBtn.onclick = (e) => {
            e.stopPropagation();
            showBottomSheet(conv);
          };
          
          card.onclick = () => {
            window.location.href = "/admin.html?c=" + encodeURIComponent(conv.id);
          };
          
          card.appendChild(mainLine);
          card.appendChild(title);
          card.appendChild(count);
          card.appendChild(menuBtn);
          
          list.appendChild(card);
        });
      } catch (err) {
        list.innerHTML = '<div class="error">Erreur JS conversations: ' + err.message + "</div>";
      }
    }
    
    async function loadMessages(conversationId) {
      const list = document.getElementById("list");
      list.textContent = "Chargement des messages...";
      
      try {
        const res = await fetch("/api/admin/conversations/" + encodeURIComponent(conversationId) + "/messages");
        
        if (!res.ok) {
          list.innerHTML = '<div class="error">Erreur HTTP messages: ' + res.status + "</div>";
          return;
        }
        
        const data = await res.json();
        list.innerHTML = "";
        
        if (!Array.isArray(data) || !data.length) {
          list.innerHTML = '<div class="empty">Aucun message</div>';
          return;
        }
        
        function formatDebugValue(value, indent = 0) {
          const pad = "  ".repeat(indent);
          
          if (value === null) return "null";
          if (value === undefined) return "undefined";
          if (typeof value === "string") return value;
          if (typeof value === "number" || typeof value === "boolean") return String(value);
          
          if (Array.isArray(value)) {
            if (value.length === 0) return "[]";
            return value.map(item => {
              if (item && typeof item === "object") {
                return pad + "-\n" + formatDebugValue(item, indent + 1);
              }
              return pad + "- " + formatDebugValue(item, 0);
            }).join("\n");
          }
          
          const entries = Object.entries(value);
          if (entries.length === 0) return "{}";
          
          return entries.map(([key, val]) => {
            if (val && typeof val === "object") {
              return pad + key + ":\n" + formatDebugValue(val, indent + 1);
            }
            return pad + key + ": " + formatDebugValue(val, 0);
          }).join("\n");
        }
        
        function extractCompareLabel(content) {
          const text = String(content || "");
          const match = text.match(/^\[(Référence|Override 1|Override 1 \+ 2)\]\n\n([\s\S]*)$/);
          
          if (!match) {
            return {
              label: "",
              content: text
            };
          }
          
          return {
            label: match[1],
            content: match[2]
          };
        }
        
        function getCompareLabelStyle(label) {
          if (label === "Référence") {
            return {
              color: "#245e66",
              border: "1px solid rgba(36,94,102,0.22)",
              background: "rgba(36,94,102,0.08)"
            };
          }
          
          if (label === "Override 1") {
            return {
              color: "#7a3fd1",
              border: "1px solid rgba(122,63,209,0.22)",
              background: "rgba(122,63,209,0.08)"
            };
          }
          
          if (label === "Override 1 + 2") {
            return {
              color: "#c05621",
              border: "1px solid rgba(192,86,33,0.22)",
              background: "rgba(192,86,33,0.08)"
            };
          }
          
          return {
            color: "#245e66",
            border: "1px solid rgba(36,94,102,0.18)",
            background: "rgba(36,94,102,0.06)"
          };
        }
        
        function buildDebugSections(msg) {
          const sections = [];
          const debug = Array.isArray(msg.debug) ? msg.debug : [];
          const debugMeta = msg.debugMeta && typeof msg.debugMeta === "object" ? msg.debugMeta : {};
          
          const topChips = Array.isArray(debugMeta.topChips) ?
            debugMeta.topChips.map(v => String(v || "").trim()).filter(Boolean) :
            [];
          
          if (topChips.length) {
            sections.push({
              title: "Chips",
              content: topChips.join("\n")
            });
          }
          
          const memory = typeof debugMeta.memory === "string" ? debugMeta.memory.trim() : "";
          if (memory) {
            sections.push({
              title: "Mémoire",
              content: memory
            });
          }
          
          const directivityText =
            typeof debugMeta.directivityText === "string" && debugMeta.directivityText.trim() ?
            debugMeta.directivityText.trim() :
            (
              typeof debugMeta.directivityLabel === "string" && debugMeta.directivityLabel.trim() ?
              debugMeta.directivityLabel.trim() :
              ""
            );
          
          if (directivityText) {
            sections.push({
              title: "Directivité",
              content: directivityText
            });
          }
          
          if (debugMeta.modelConflict === true && typeof debugMeta.rewriteSource === "string" && debugMeta.rewriteSource.trim()) {
            sections.push({
              title: "Conflit avec le modèle théorique",
              content: debugMeta.rewriteSource.trim()
            });
          }
          
          const traceLines = debug.filter(line => {
            const text = String(line || "");
            return (
              text.startsWith("mode:") ||
              text.startsWith("suicideLevel:") ||
              text.startsWith("calledMemory:") ||
              text.startsWith("modelConflict:") ||
              text.startsWith("explorationDirectivityLevel:") ||
              text.startsWith("explorationRelanceWindow:") ||
              text.startsWith("override1Applied:") ||
              text.startsWith("override1Missing:") ||
              text.startsWith("override2Applied:") ||
              text.startsWith("override2Missing:") ||
              text.startsWith("trace.") ||
              text.startsWith("rewriteSource:")
            );
          });
          
          if (traceLines.length) {
            sections.push({
              title: "Trace serveur",
              content: traceLines.join("\n")
            });
          }
          
          const rawDebugMeta = Object.keys(debugMeta).length ? formatDebugValue(debugMeta) : "";
          if (rawDebugMeta) {
            sections.push({
              title: "debugMeta brut",
              content: rawDebugMeta
            });
          }
          
          return sections.filter(section => String(section.content || "").trim());
        }
        
        const assistantEntries = data.filter(msg => msg && msg.role === "assistant");
        const hasAnyAssistantDebug = assistantEntries.some(msg => buildDebugSections(msg).length > 0);
        
        if (hasAnyAssistantDebug) {
          const toolbar = document.createElement("div");
          toolbar.style.display = "flex";
          toolbar.style.gap = "8px";
          toolbar.style.marginBottom = "12px";
          toolbar.style.position = "sticky";
          toolbar.style.top = "74px";
          toolbar.style.zIndex = "15";
          toolbar.style.padding = "8px 0";
          toolbar.style.background = "#d7e4e3";
          
          const expandBtn = document.createElement("button");
          expandBtn.type = "button";
          expandBtn.textContent = "Tout déplier";
          expandBtn.style.flex = "1";
          expandBtn.style.minHeight = "44px";
          expandBtn.style.border = "1px solid #cfd8db";
          expandBtn.style.borderRadius = "12px";
          expandBtn.style.background = "white";
          expandBtn.style.color = "#245e66";
          expandBtn.style.fontSize = "15px";
          expandBtn.style.fontWeight = "600";
          expandBtn.style.cursor = "pointer";
          
          const collapseBtn = document.createElement("button");
          collapseBtn.type = "button";
          collapseBtn.textContent = "Tout replier";
          collapseBtn.style.flex = "1";
          collapseBtn.style.minHeight = "44px";
          collapseBtn.style.border = "1px solid #cfd8db";
          collapseBtn.style.borderRadius = "12px";
          collapseBtn.style.background = "white";
          collapseBtn.style.color = "#245e66";
          collapseBtn.style.fontSize = "15px";
          collapseBtn.style.fontWeight = "600";
          collapseBtn.style.cursor = "pointer";
          
          expandBtn.onclick = () => {
            list.querySelectorAll(".admin-debug-details").forEach(el => {
              el.open = true;
            });
          };
          
          collapseBtn.onclick = () => {
            list.querySelectorAll(".admin-debug-details").forEach(el => {
              el.open = false;
            });
          };
          
          toolbar.appendChild(expandBtn);
          toolbar.appendChild(collapseBtn);
          list.appendChild(toolbar);
        }
        
        data.forEach(msg => {
          const isUser = msg.role === "user";
          const parsedContent = extractCompareLabel(msg.content || "");
          
          const wrapper = document.createElement("div");
          wrapper.className = "message-row";
          wrapper.style.justifyContent = isUser ? "flex-end" : "flex-start";
          
          const card = document.createElement("div");
          card.className = "item role-" + msg.role;
          card.style.maxWidth = "78%";
          
          const meta = document.createElement("div");
          meta.className = "meta";
          const userDisplay = msg.userLabel ?? msg.userId ?? "user inconnu";
          
          meta.textContent =
            new Date(msg.timestamp || msg.createdAt || Date.now()).toLocaleString() +
            " • " +
            (isUser ? userDisplay : "assistant");
          
          const main = document.createElement("div");
          main.className = "main";
          main.textContent = parsedContent.content || "";
          
          card.appendChild(meta);
          
          if (!isUser && parsedContent.label) {
            const compareTag = document.createElement("div");
            const compareStyle = getCompareLabelStyle(parsedContent.label);
            
            compareTag.textContent = parsedContent.label;
            compareTag.style.display = "inline-flex";
            compareTag.style.alignItems = "center";
            compareTag.style.padding = "5px 9px";
            compareTag.style.marginBottom = "8px";
            compareTag.style.borderRadius = "999px";
            compareTag.style.fontSize = "12px";
            compareTag.style.fontWeight = "700";
            compareTag.style.lineHeight = "1";
            compareTag.style.color = compareStyle.color;
            compareTag.style.border = compareStyle.border;
            compareTag.style.background = compareStyle.background;
            
            card.appendChild(compareTag);
          }
          
          card.appendChild(main);
          
          if (!isUser) {
            const debugSections = buildDebugSections(msg);
            
            if (debugSections.length > 0) {
              const debugWrap = document.createElement("div");
              debugWrap.style.marginTop = "10px";
              
              const debugDetails = document.createElement("details");
              debugDetails.className = "admin-debug-details";
              debugDetails.style.border = "1px solid #d6e2e1";
              debugDetails.style.borderRadius = "12px";
              debugDetails.style.background = "#f8fbfb";
              debugDetails.style.overflow = "hidden";
              
              const debugSummary = document.createElement("summary");
              debugSummary.textContent = "Debug";
              debugSummary.style.listStyle = "none";
              debugSummary.style.cursor = "pointer";
              debugSummary.style.padding = "10px 12px";
              debugSummary.style.fontSize = "13px";
              debugSummary.style.fontWeight = "700";
              debugSummary.style.color = "#245e66";
              debugSummary.style.userSelect = "none";
              
              const debugBox = document.createElement("div");
              debugBox.style.padding = "10px";
              debugBox.style.borderTop = "1px solid #d6e2e1";
              debugBox.style.background = "#eef4f4";
              debugBox.style.display = "flex";
              debugBox.style.flexDirection = "column";
              debugBox.style.gap = "8px";
              
              debugSections.forEach(section => {
                const sectionBlock = document.createElement("div");
                
                const sectionTitle = document.createElement("div");
                sectionTitle.textContent = section.title;
                sectionTitle.style.fontSize = "12px";
                sectionTitle.style.fontWeight = "700";
                sectionTitle.style.textTransform = "uppercase";
                sectionTitle.style.letterSpacing = "0.04em";
                sectionTitle.style.color = "#245e66";
                sectionTitle.style.marginBottom = "4px";
                
                const sectionContent = document.createElement("div");
                sectionContent.style.padding = "10px";
                sectionContent.style.borderRadius = "10px";
                sectionContent.style.background = "#ffffff";
                sectionContent.style.border = "1px solid #d6e2e1";
                sectionContent.style.fontSize = "13px";
                sectionContent.style.lineHeight = "1.45";
                sectionContent.style.color = "#334155";
                sectionContent.style.whiteSpace = "pre-wrap";
                sectionContent.style.wordBreak = "break-word";
                sectionContent.style.overflowWrap = "break-word";
                sectionContent.style.userSelect = "text";
                sectionContent.style.webkitUserSelect = "text";
                sectionContent.style.cursor = "text";
                sectionContent.textContent = section.content;
                
                sectionBlock.appendChild(sectionTitle);
                sectionBlock.appendChild(sectionContent);
                debugBox.appendChild(sectionBlock);
              });
              
              debugDetails.appendChild(debugSummary);
              debugDetails.appendChild(debugBox);
              debugWrap.appendChild(debugDetails);
              card.appendChild(debugWrap);
            }
          }
          
          wrapper.appendChild(card);
          list.appendChild(wrapper);
        });
        
      } catch (err) {
        list.innerHTML = '<div class="error">Erreur JS messages: ' + err.message + "</div>";
      }
    }
    
    function showBottomSheet(conv) {
      const existing = document.getElementById("bottomSheet");
      if (existing) existing.remove();
      
      const overlay = document.createElement("div");
      overlay.id = "bottomSheet";
      overlay.style.position = "fixed";
      overlay.style.left = "0";
      overlay.style.right = "0";
      overlay.style.bottom = "0";
      overlay.style.background = "#ffffff";
      overlay.style.borderTopLeftRadius = "16px";
      overlay.style.borderTopRightRadius = "16px";
      overlay.style.padding = "16px";
      overlay.style.boxShadow = "0 -4px 20px rgba(0,0,0,0.15)";
      overlay.style.zIndex = "999";
      
      const id = document.createElement("div");
      id.style.marginBottom = "8px";
      id.textContent = "ID: " + conv.id;
      
      const created = document.createElement("div");
      created.textContent =
        "Créée le: " +
        new Date(conv.createdAt).toLocaleString();
      
      const input = document.createElement("input");
      input.type = "text";
      input.placeholder = "Nom utilisateur (ex: MOI)";
      input.value = conv.userLabel || "";
      input.style.width = "100%";
      input.style.marginTop = "12px";
      input.style.padding = "10px";
      input.style.borderRadius = "10px";
      input.style.border = "1px solid #cfd8db";
      
      const saveBtn = document.createElement("button");
      saveBtn.textContent = "Enregistrer";
      saveBtn.style.marginTop = "10px";
      saveBtn.style.width = "100%";
      saveBtn.style.padding = "12px";
      saveBtn.style.borderRadius = "12px";
      saveBtn.style.border = "none";
      saveBtn.style.background = "#245e66";
      saveBtn.style.color = "white";
      saveBtn.style.fontSize = "15px";
      
      saveBtn.onclick = async (e) => {
        e.stopPropagation();
        
        await fetch("/api/admin/user-label", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            userId: conv.userId,
            label: input.value.trim()
          })
        });
        
        overlay.remove();
        
        const card = document.querySelector(`.item[data-conv-id="${conv.id}"]`);
        if (card) {
          const mainLine = card.firstChild;
          if (mainLine) {
            const updatedDate = new Date(conv.updatedAt || conv.createdAt);
            const formattedDate = updatedDate.toLocaleString("fr-FR", {
              day: "2-digit",
              month: "2-digit",
              year: "numeric",
              hour: "2-digit",
              minute: "2-digit"
            });
            
            mainLine.textContent =
              formattedDate + " — " + (input.value.trim() || conv.userId);
          }
        }
      };
      
      overlay.appendChild(id);
      overlay.appendChild(created);
      overlay.appendChild(input);
      overlay.appendChild(saveBtn);
      
      overlay.onclick = (e) => {
        if (e.target === overlay) {
          overlay.remove();
        }
      };
      
      document.body.appendChild(overlay);
    }
    
    async function init() {
      setupRootBackToIndex();
      
      const conversationId = getConversationIdFromUrl();
      const backBtn = document.getElementById("backBtn");
      const conversationMeta = document.getElementById("conversationMeta");
      const title = document.querySelector("h1");
      
      if (conversationId) {
        title.textContent = "Messages";
        backBtn.style.display = "block";
        conversationMeta.style.display = "block";
        conversationMeta.textContent = "Conversation : " + conversationId;
        await loadMessages(conversationId);
      } else {
        title.textContent = "Conversations";
        backBtn.style.display = "none";
        conversationMeta.style.display = "none";
        conversationMeta.textContent = "";
        await loadConversations();
      }
    }
    
    init();
  </script>
</body>

</html>
