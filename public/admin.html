<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin - Conversations</title>

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  background: #f6f7f9;
  color: #1f2937;
  font-family: Arial, sans-serif;
}

body {
  min-height: 100vh;
}

#app {
  max-width: 900px;
  margin: 0 auto;
  padding: 12px 12px 24px;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  background: #f6f7f9;
  padding-bottom: 10px;
}

h1 {
  font-size: 22px;
  line-height: 1.2;
  margin: 0 0 10px;
}

#backBtn {
  display: none;
  width: 100%;
  min-height: 44px;
  border: 1px solid #d1d5db;
  border-radius: 12px;
  background: white;
  color: #111827;
  font-size: 16px;
  padding: 10px 14px;
  margin-bottom: 10px;
}

#list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.item {
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 14px;
  padding: 12px;
  cursor: pointer;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}

.item:hover {
  background: #fbfbfc;
}

.meta {
  font-size: 12px;
  line-height: 1.4;
  color: #6b7280;
  margin-bottom: 6px;
}

.main {
  font-size: 15px;
  line-height: 1.45;
  white-space: pre-wrap;
  word-break: break-word;
}

.conv-id {
  font-size: 13px;
  line-height: 1.35;
  color: #111827;
  font-weight: 600;
  margin-bottom: 4px;
  word-break: break-all;
}

.loading,
.empty,
.error {
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 14px;
  padding: 14px;
  font-size: 15px;
  line-height: 1.45;
}

.error {
  color: #991b1b;
}

.role-user .main {
  color: #0f3d91;
}

.role-assistant .main {
  color: #1f2937;
}
</style>
</head>

<body>
<div id="app">
  <div class="topbar">
    <h1>Conversations</h1>
    
    <button id="backBtn" onclick="goBack()" style="margin-bottom:12px; display:none;">
      ← Retour
    </button>
    
    <div id="list">Chargement...</div>
  </div>
</div>

<script>
function getConversationIdFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get("c");
}

function goBack() {
  window.location.href = "/admin.html";
}

async function loadConversations() {
  const list = document.getElementById("list");
  list.textContent = "Chargement des conversations...";

  try {
    const res = await fetch("/api/admin/conversations");

    if (!res.ok) {
      list.textContent = "Erreur HTTP conversations: " + res.status;
      return;
    }

    const data = await res.json();
    list.innerHTML = "";

    if (!Array.isArray(data) || !data.length) {
      list.textContent = "Aucune conversation";
      return;
    }

    data.forEach(conv => {
      const div = document.createElement("div");
      div.className = "item";
      div.textContent = conv.id + " | " + new Date(conv.createdAt).toLocaleString();

      div.onclick = () => {
        window.location.href = "/admin.html?c=" + encodeURIComponent(conv.id);
      };

      list.appendChild(div);
    });
  } catch (err) {
    list.textContent = "Erreur JS conversations: " + err.message;
  }
}

async function loadMessages(conversationId) {
  const list = document.getElementById("list");
  list.textContent = "Chargement des messages...";

  try {
    const res = await fetch("/api/admin/conversations/" + encodeURIComponent(conversationId) + "/messages");

    if (!res.ok) {
      list.textContent = "Erreur HTTP messages: " + res.status;
      return;
    }

    const data = await res.json();
    list.innerHTML = "";

    if (!Array.isArray(data) || !data.length) {
      list.textContent = "Aucun message";
      return;
    }

    data.forEach(msg => {
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `
        <div style="font-size:12px; color:#666; margin-bottom:4px;">
          ${new Date(msg.timestamp || msg.createdAt || Date.now()).toLocaleString()} - ${msg.role}
        </div>
        <div>${msg.content || ""}</div>
      `;
      list.appendChild(div);
    });
  } catch (err) {
    list.textContent = "Erreur JS messages: " + err.message;
  }
}

async function init() {
  const conversationId = getConversationIdFromUrl();
  const backBtn = document.getElementById("backBtn");

  if (conversationId) {
    backBtn.style.display = "block";
    await loadMessages(conversationId);
  } else {
    backBtn.style.display = "none";
    await loadConversations();
  }
}

init();
</script>
</body>
</html>
