<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <title>Admin - Conversations</title>
  
  <style>
    * {
      box-sizing: border-box;
    }
    
    html,
    body {
      margin: 0;
      padding: 0;
      background: #d7e4e3;
      color: #1f2937;
      font-family: Arial, sans-serif;
      color-scheme: light;
    }
    
    body {
      min-height: 100vh;
    }
    
    #app {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 12px 12px calc(24px + env(safe-area-inset-bottom, 0px));
    }
    
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #d7e4e3;
      padding: 8px 0 12px;
    }
    
    h1 {
      font-size: 28px;
      line-height: 1.15;
      margin: 0 0 12px;
      color: #1f3f44;
    }
    
    #backBtn {
      display: none;
      width: 100%;
      min-height: 48px;
      border: 1px solid #cfd8db;
      border-radius: 12px;
      background: white;
      color: #245e66;
      font-size: 17px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }
    
    #list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .item {
      background: #f7fbfa;
      border: 1px solid #d6e2e1;
      border-radius: 16px;
      padding: 14px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(43, 79, 82, 0.08);
    }
    
    .item:hover {
      background: #fbfbfc;
    }
    
    .message-row {
      display: flex;
    }
    
    .message-row .item {
      cursor: default;
      box-shadow: none;
    }
    
    .message-row .item:hover {
      background: inherit;
    }
    
    .meta {
      font-size: 12px;
      line-height: 1.4;
      color: #6b7280;
      margin-bottom: 8px;
    }
    
    .main {
      font-size: 16px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: break-word;
    }
    
    .conv-id {
      font-size: 14px;
      line-height: 1.35;
      color: #1f2937;
      font-weight: 600;
      margin-bottom: 6px;
      word-break: break-all;
    }
    
    .loading,
    .empty,
    .error {
      background: white;
      border: 1px solid #dde4e7;
      border-radius: 16px;
      padding: 16px;
      font-size: 16px;
      line-height: 1.5;
    }
    
    .error {
      color: #991b1b;
    }
    
    .role-user {
      background: #4a7478;
      color: white;
      border: none;
    }
    
    .role-user .meta {
      color: rgba(255, 255, 255, 0.78);
    }
    
    .role-user .main {
      color: white;
    }
    
    .role-assistant {
      background: white;
      border: none;
    }
    
    .role-assistant .meta {
      color: #708487;
    }
    
    .role-assistant .main {
      color: #4b6366;
    }
    
    .preview {
      font-size: 16px;
      line-height: 1.5;
      color: #334155;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }
    
    @media (max-width: 640px) {
      #app {
        padding-left: 10px;
        padding-right: 10px;
      }
      
      h1 {
        font-size: 24px;
      }
      
      .item {
        padding: 12px;
        border-radius: 14px;
      }
      
      .main,
      .preview,
      .loading,
      .empty,
      .error {
        font-size: 15px;
      }
      
      .message-row .item {
        max-width: 88% !important;
      }
    }
  </style>
</head>

<body>
  
  <div id="app">
    <div class="topbar">
      
      <h1>Conversations</h1>
      
      <button id="backBtn" onclick="goBack()" style="display:none;">
        ← Retour
      </button>
      
      <div id="conversationMeta" class="meta" style="display:none;"></div>
      
      <div id="debugToolbar" style="display:none; gap:8px; margin-top:8px;">
        <button id="expandAllDebugBtn" type="button" style="flex:1; min-height:44px; border:1px solid #cfd8db; border-radius:12px; background:white; color:#245e66; font-size:15px; font-weight:600; cursor:pointer;">
          Tout déplier
        </button>
        <button id="collapseAllDebugBtn" type="button" style="flex:1; min-height:44px; border:1px solid #cfd8db; border-radius:12px; background:white; color:#245e66; font-size:15px; font-weight:600; cursor:pointer;">
          Tout replier
        </button>
      </div>
      
    </div>
    
    <div id="list">Chargement...</div>
  </div>
  
  <script>
    function getConversationIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("c");
    }
    
    function goBack() {
      window.location.href = "/admin.html";
    }
    
    function setupRootBackToIndex() {
      const conversationId = getConversationIdFromUrl();
      if (conversationId) return;
      
      history.replaceState({ adminRoot: true }, "", window.location.href);
      history.pushState({ adminTrap: true }, "", window.location.href);
      
      window.addEventListener("popstate", (e) => {
        if (e.state && e.state.adminRoot) {
          window.location.href = "/index.html";
        }
      });
    }

    async function readAdminJsonResponse(res) {
      if (res?.redirected && typeof res.url === "string" && res.url.includes("/admin-login.html")) {
        window.location.href = res.url;
        return {
          data: null,
          isJson: false,
          redirectedToLogin: true
        };
      }

      const contentType = String(res?.headers?.get("content-type") || "").toLowerCase();

      if (!contentType.includes("application/json")) {
        return {
          data: null,
          isJson: false,
          redirectedToLogin: false
        };
      }

      try {
        return {
          data: await res.json(),
          isJson: true,
          redirectedToLogin: false
        };
      } catch {
        return {
          data: null,
          isJson: false,
          redirectedToLogin: false
        };
      }
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = 12000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);

      try {
        const requestOptions = {
          credentials: "same-origin",
          cache: "no-store",
          ...options,
          signal: controller.signal
        };
        return await fetch(url, requestOptions);
      } finally {
        clearTimeout(timer);
      }
    }

    async function ensureAdminSession() {
      const res = await fetchWithTimeout("/api/admin/session", {
        method: "GET"
      });

      const response = await readAdminJsonResponse(res);
      const isAuthenticated = response.isJson && response.data && response.data.authenticated === true;

      if (!res.ok || !isAuthenticated) {
        const next = encodeURIComponent(window.location.pathname + window.location.search);
        window.location.href = "/admin-login.html?next=" + next;
        return false;
      }

      return true;
    }
    
    async function loadConversations() {
      const list = document.getElementById("list");
      const debugToolbar = document.getElementById("debugToolbar");
      if (debugToolbar) {
        debugToolbar.style.display = "none";
      }
      
      list.textContent = "Chargement des conversations...";
      
      try {
        const res = await fetchWithTimeout("/api/admin/conversations");
        const response = await readAdminJsonResponse(res);

        if (response.redirectedToLogin) {
          list.innerHTML = '<div class="error">Session admin expiree. Redirection...</div>';
          return;
        }
        
        if (!res.ok) {
          const errorMessage = typeof response.data?.error === "string" ? response.data.error : "Erreur HTTP conversations: " + res.status;
          list.innerHTML = '<div class="error">' + errorMessage + "</div>';
          return;
        }

        if (!response.isJson) {
          list.innerHTML = '<div class="error">Reponse serveur invalide</div>';
          return;
        }

        const data = response.data;
        list.innerHTML = "";
        
        if (!Array.isArray(data) || !data.length) {
          list.innerHTML = '<div class="empty">Aucune conversation</div>';
          return;
        }
        
        data.forEach(conv => {
          const card = document.createElement("div");
          card.className = "item";
          card.style.position = "relative";
          card.dataset.convId = conv.id;
          
          const mainLine = document.createElement("div");
          mainLine.style.fontSize = "15px";
          mainLine.style.fontWeight = "600";
          mainLine.style.color = "#1f3f44";
          mainLine.style.marginBottom = "4px";
          
          const updatedDate = new Date(conv.updatedAt || conv.createdAt);
          const formattedDate = updatedDate.toLocaleString("fr-FR", {
            day: "2-digit",
            month: "2-digit",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit"
          });
          
          const userDisplay = conv.userLabel || conv.userId || "user inconnu";
          mainLine.textContent = formattedDate + " — " + userDisplay;
          
          const title = document.createElement("div");
          title.style.fontSize = "15px";
          title.style.color = "#334155";
          title.style.marginBottom = "4px";
          title.style.whiteSpace = "nowrap";
          title.style.overflow = "hidden";
          title.style.textOverflow = "ellipsis";
          title.style.fontWeight = "500";
          
          const sessionTitle = conv.displayTitle || "(sans titre)";
          title.textContent = sessionTitle;
          
          const count = document.createElement("div");
          count.style.fontSize = "13px";
          count.style.color = "#6b7280";
          
          const messageCount = conv.messageCount || 0;
          count.textContent = messageCount + " messages";
          
          const menuBtn = document.createElement("div");
          menuBtn.textContent = "⋮";
          menuBtn.style.position = "absolute";
          menuBtn.style.top = "10px";
          menuBtn.style.right = "10px";
          menuBtn.style.fontSize = "18px";
          menuBtn.style.color = "#6b7280";
          menuBtn.style.cursor = "pointer";
          
          menuBtn.onclick = (e) => {
            e.stopPropagation();
            showBottomSheet(conv);
          };
          
          card.onclick = () => {
            window.location.href = "/admin.html?c=" + encodeURIComponent(conv.id);
          };
          
          card.appendChild(mainLine);
          card.appendChild(title);
          card.appendChild(count);
          card.appendChild(menuBtn);
          
          list.appendChild(card);
        });
      } catch (err) {
        const isTimeout = err && (err.name === "AbortError" || String(err.message || "").toLowerCase().includes("aborted"));
        list.innerHTML = isTimeout ?
          '<div class="error">Le serveur ne repond pas a temps. Reessaie dans quelques secondes.</div>' :
          '<div class="error">Erreur JS conversations: ' + err.message + "</div>";
      }
    }
    
    async function loadMessages(conversationId) {
      const list = document.getElementById("list");
      const debugToolbar = document.getElementById("debugToolbar");
      const expandAllDebugBtn = document.getElementById("expandAllDebugBtn");
      const collapseAllDebugBtn = document.getElementById("collapseAllDebugBtn");
      
      if (debugToolbar) {
        debugToolbar.style.display = "none";
      }
      
      list.textContent = "Chargement des messages...";
      
      try {
        const res = await fetchWithTimeout("/api/admin/conversations/" + encodeURIComponent(conversationId) + "/messages");
        const response = await readAdminJsonResponse(res);

        if (response.redirectedToLogin) {
          list.innerHTML = '<div class="error">Session admin expiree. Redirection...</div>';
          return;
        }

        if (!res.ok) {
          const errorMessage = typeof response.data?.error === "string" ? response.data.error : "Erreur HTTP messages: " + res.status;
          list.innerHTML = '<div class="error">' + errorMessage + "</div>';
          return;
        }

        if (!response.isJson) {
          list.innerHTML = '<div class="error">Reponse serveur invalide</div>';
          return;
        }

        const data = response.data;
        list.innerHTML = "";
        
        if (!Array.isArray(data) || !data.length) {
          list.innerHTML = '<div class="empty">Aucun message</div>';
          return;
        }
        
        function extractCompareLabel(content) {
          const text = String(content || "");
          const match = text.match(/^\[(Référence|Override 1|Override 1 \+ 2)\]\n\n([\s\S]*)$/);
          
          if (!match) {
            return {
              label: "",
              content: text
            };
          }
          
          return {
            label: match[1],
            content: match[2]
          };
        }
        
        function getCompareLabelStyle(label) {
          if (label === "Référence") {
            return {
              color: "#245e66",
              border: "1px solid rgba(36,94,102,0.22)",
              background: "rgba(36,94,102,0.08)"
            };
          }
          
          if (label === "Override 1") {
            return {
              color: "#7a3fd1",
              border: "1px solid rgba(122,63,209,0.22)",
              background: "rgba(122,63,209,0.08)"
            };
          }
          
          if (label === "Override 1 + 2") {
            return {
              color: "#c05621",
              border: "1px solid rgba(192,86,33,0.22)",
              background: "rgba(192,86,33,0.08)"
            };
          }
          
          return {
            color: "#245e66",
            border: "1px solid rgba(36,94,102,0.18)",
            background: "rgba(36,94,102,0.06)"
          };
        }
        
        function normalizeDebugMeta(debugMeta) {
          const safe = debugMeta && typeof debugMeta === "object" ? debugMeta : {};
          
          return {
            topChips: Array.isArray(safe.topChips) ?
              safe.topChips.map(v => String(v || "").trim()).filter(Boolean) : [],
            memory: typeof safe.memory === "string" ? safe.memory.trim() : "",
            directivityText: typeof safe.directivityText === "string" && safe.directivityText.trim() ?
              safe.directivityText.trim() : (
                typeof safe.directivityLabel === "string" && safe.directivityLabel.trim() ?
                safe.directivityLabel.trim() :
                ""
              ),
            modelConflict: safe.modelConflict === true,
            rewriteSource: typeof safe.rewriteSource === "string" ? safe.rewriteSource.trim() : ""
          };
        }
        
        function buildDebugSections(debug, debugMeta) {
          const safeDebug = Array.isArray(debug) ? debug : [];
          const meta = normalizeDebugMeta(debugMeta);
          const sections = [];
          
          if (meta.topChips.length) {
            sections.push({
              title: "Chips",
              content: meta.topChips.join("\n")
            });
          }
          
          if (meta.memory) {
            sections.push({
              title: "Mémoire",
              content: meta.memory
            });
          }
          
          if (meta.directivityText) {
            sections.push({
              title: "Directivité",
              content: meta.directivityText
            });
          }
          
          if (meta.modelConflict && meta.rewriteSource) {
            sections.push({
              title: "Conflit avec le modèle théorique",
              content: meta.rewriteSource
            });
          }
          
          const overrideLines = safeDebug.filter(line => {
            const text = String(line || "");
            return (
              text.startsWith("override1Applied:") ||
              text.startsWith("override1Missing:") ||
              text.startsWith("override2Applied:") ||
              text.startsWith("override2Missing:")
            );
          });
          
          if (overrideLines.length) {
            sections.push({
              title: "Overrides appliqués",
              content: overrideLines.join("\n")
            });
          }
          
          return sections.filter(section => String(section.content || "").trim());
        }
        
        function buildAssistantVariants(msg) {
          const source = Array.isArray(msg.comparisonResults) && msg.comparisonResults.length ?
            msg.comparisonResults :
            Array.isArray(msg.results) && msg.results.length ?
            msg.results :
            null;
          
          if (source) {
            return source.map(entry => ({
              label: String(entry.label || "").trim(),
              content: String(entry.reply || ""),
              debug: Array.isArray(entry.debug) ? entry.debug : [],
              debugMeta: entry.debugMeta && typeof entry.debugMeta === "object" ? entry.debugMeta : {}
            }));
          }
          
          const parsed = extractCompareLabel(msg.content || "");
          
          return [{
            label: parsed.label,
            content: parsed.content,
            debug: Array.isArray(msg.debug) ? msg.debug : [],
            debugMeta: msg.debugMeta && typeof msg.debugMeta === "object" ? msg.debugMeta : {}
          }];
        }
        
        function createDebugDetails(debugSections) {
          if (!Array.isArray(debugSections) || debugSections.length === 0) {
            return null;
          }
          
          const debugWrap = document.createElement("div");
          debugWrap.style.marginTop = "10px";
          
          const debugDetails = document.createElement("details");
          debugDetails.className = "admin-debug-details";
          debugDetails.style.border = "1px solid #d6e2e1";
          debugDetails.style.borderRadius = "12px";
          debugDetails.style.background = "#f8fbfb";
          debugDetails.style.overflow = "hidden";
          
          const debugSummary = document.createElement("summary");
          debugSummary.textContent = "Debug";
          debugSummary.style.listStyle = "none";
          debugSummary.style.cursor = "pointer";
          debugSummary.style.padding = "10px 12px";
          debugSummary.style.fontSize = "13px";
          debugSummary.style.fontWeight = "700";
          debugSummary.style.color = "#245e66";
          debugSummary.style.userSelect = "none";
          
          const debugBox = document.createElement("div");
          debugBox.style.padding = "10px";
          debugBox.style.borderTop = "1px solid #d6e2e1";
          debugBox.style.background = "#eef4f4";
          debugBox.style.display = "flex";
          debugBox.style.flexDirection = "column";
          debugBox.style.gap = "8px";
          
          debugSections.forEach(section => {
            const sectionBlock = document.createElement("div");
            
            const sectionTitle = document.createElement("div");
            sectionTitle.textContent = section.title;
            sectionTitle.style.fontSize = "12px";
            sectionTitle.style.fontWeight = "700";
            sectionTitle.style.textTransform = "uppercase";
            sectionTitle.style.letterSpacing = "0.04em";
            sectionTitle.style.color = "#245e66";
            sectionTitle.style.marginBottom = "4px";
            
            const sectionContent = document.createElement("div");
            sectionContent.style.padding = "10px";
            sectionContent.style.borderRadius = "10px";
            sectionContent.style.background = "#ffffff";
            sectionContent.style.border = "1px solid #d6e2e1";
            sectionContent.style.fontSize = "13px";
            sectionContent.style.lineHeight = "1.45";
            sectionContent.style.color = "#334155";
            sectionContent.style.whiteSpace = "pre-wrap";
            sectionContent.style.wordBreak = "break-word";
            sectionContent.style.overflowWrap = "break-word";
            sectionContent.style.userSelect = "text";
            sectionContent.style.webkitUserSelect = "text";
            sectionContent.style.cursor = "text";
            sectionContent.textContent = section.content;
            
            sectionBlock.appendChild(sectionTitle);
            sectionBlock.appendChild(sectionContent);
            debugBox.appendChild(sectionBlock);
          });
          
          debugDetails.appendChild(debugSummary);
          debugDetails.appendChild(debugBox);
          debugWrap.appendChild(debugDetails);
          
          return debugWrap;
        }
        
        function createAssistantVariantCard(variant) {
          const parsed = extractCompareLabel(
            variant.label ? `[${variant.label}]\n\n${variant.content}` : variant.content
          );
          
          const box = document.createElement("div");
          box.style.marginTop = "10px";
          box.style.padding = "12px";
          box.style.borderRadius = "14px";
          box.style.background = "#f8fbfb";
          box.style.border = "1px solid #d6e2e1";
          
          if (parsed.label) {
            const compareTag = document.createElement("div");
            const compareStyle = getCompareLabelStyle(parsed.label);
            
            compareTag.textContent = parsed.label;
            compareTag.style.display = "inline-flex";
            compareTag.style.alignItems = "center";
            compareTag.style.padding = "5px 9px";
            compareTag.style.marginBottom = "8px";
            compareTag.style.borderRadius = "999px";
            compareTag.style.fontSize = "12px";
            compareTag.style.fontWeight = "700";
            compareTag.style.lineHeight = "1";
            compareTag.style.color = compareStyle.color;
            compareTag.style.border = compareStyle.border;
            compareTag.style.background = compareStyle.background;
            
            box.appendChild(compareTag);
          }
          
          const main = document.createElement("div");
          main.className = "main";
          main.textContent = parsed.content || "";
          box.appendChild(main);
          
          const debugDetails = createDebugDetails(buildDebugSections(variant.debug, variant.debugMeta));
          if (debugDetails) {
            box.appendChild(debugDetails);
          }
          
          return box;
        }
        
        const hasAnyAssistantDebug = data.some(msg => {
          if (msg.role !== "assistant") return false;
          const variants = buildAssistantVariants(msg);
          return variants.some(variant => buildDebugSections(variant.debug, variant.debugMeta).length > 0);
        });
        
        if (debugToolbar && expandAllDebugBtn && collapseAllDebugBtn) {
          if (hasAnyAssistantDebug) {
            debugToolbar.style.display = "flex";
            
            expandAllDebugBtn.onclick = () => {
              list.querySelectorAll(".admin-debug-details").forEach(el => {
                el.open = true;
              });
            };
            
            collapseAllDebugBtn.onclick = () => {
              list.querySelectorAll(".admin-debug-details").forEach(el => {
                el.open = false;
              });
            };
          } else {
            debugToolbar.style.display = "none";
            expandAllDebugBtn.onclick = null;
            collapseAllDebugBtn.onclick = null;
          }
        }
        
        data.forEach(msg => {
          const isUser = msg.role === "user";
          
          const wrapper = document.createElement("div");
          wrapper.className = "message-row";
          wrapper.style.justifyContent = isUser ? "flex-end" : "flex-start";
          
          const card = document.createElement("div");
          card.className = "item role-" + msg.role;
          card.style.maxWidth = "78%";
          
          const meta = document.createElement("div");
          meta.className = "meta";
          const userDisplay = msg.userLabel ?? msg.userId ?? "user inconnu";
          
          meta.textContent =
            new Date(msg.timestamp || msg.createdAt || Date.now()).toLocaleString() +
            " • " +
            (isUser ? userDisplay : "assistant");
          
          card.appendChild(meta);
          
          if (isUser) {
            const main = document.createElement("div");
            main.className = "main";
            main.textContent = msg.content || "";
            card.appendChild(main);
          } else {
            const variants = buildAssistantVariants(msg);
            
            variants.forEach((variant, index) => {
              if (variants.length === 1 && !variant.label) {
                const main = document.createElement("div");
                main.className = "main";
                main.textContent = variant.content || "";
                card.appendChild(main);
                
                const debugDetails = createDebugDetails(buildDebugSections(variant.debug, variant.debugMeta));
                if (debugDetails) {
                  card.appendChild(debugDetails);
                }
                return;
              }
              
              if (index > 0) {
                const separator = document.createElement("div");
                separator.style.height = "1px";
                separator.style.margin = "10px 0";
                separator.style.background = "#d6e2e1";
                card.appendChild(separator);
              }
              
              card.appendChild(createAssistantVariantCard(variant));
            });
          }
          
          wrapper.appendChild(card);
          list.appendChild(wrapper);
        });
        
      } catch (err) {
        const isTimeout = err && (err.name === "AbortError" || String(err.message || "").toLowerCase().includes("aborted"));
        list.innerHTML = isTimeout ?
          '<div class="error">Le serveur ne repond pas a temps. Reessaie dans quelques secondes.</div>' :
          '<div class="error">Erreur JS messages: ' + err.message + "</div>";
      }
    }
    
    function showBottomSheet(conv) {
      const existing = document.getElementById("bottomSheet");
      if (existing) existing.remove();
      
      const overlay = document.createElement("div");
      overlay.id = "bottomSheet";
      overlay.style.position = "fixed";
      overlay.style.left = "0";
      overlay.style.right = "0";
      overlay.style.bottom = "0";
      overlay.style.background = "#ffffff";
      overlay.style.borderTopLeftRadius = "16px";
      overlay.style.borderTopRightRadius = "16px";
      overlay.style.padding = "16px";
      overlay.style.boxShadow = "0 -4px 20px rgba(0,0,0,0.15)";
      overlay.style.zIndex = "999";
      
      const id = document.createElement("div");
      id.style.marginBottom = "8px";
      id.textContent = "ID: " + conv.id;
      
      const created = document.createElement("div");
      created.textContent =
        "Créée le: " +
        new Date(conv.createdAt).toLocaleString();
      
      const input = document.createElement("input");
      input.type = "text";
      input.placeholder = "Nom utilisateur (ex: MOI)";
      input.value = conv.userLabel || "";
      input.style.width = "100%";
      input.style.marginTop = "12px";
      input.style.padding = "10px";
      input.style.borderRadius = "10px";
      input.style.border = "1px solid #cfd8db";

      const feedback = document.createElement("div");
      feedback.style.marginTop = "8px";
      feedback.style.minHeight = "1.2em";
      feedback.style.fontSize = "13px";
      feedback.style.color = "#a12d2d";
      
      const saveBtn = document.createElement("button");
      saveBtn.textContent = "Enregistrer";
      saveBtn.style.marginTop = "10px";
      saveBtn.style.width = "100%";
      saveBtn.style.padding = "12px";
      saveBtn.style.borderRadius = "12px";
      saveBtn.style.border = "none";
      saveBtn.style.background = "#245e66";
      saveBtn.style.color = "white";
      saveBtn.style.fontSize = "15px";
      
      saveBtn.onclick = async (e) => {
        e.stopPropagation();

        feedback.textContent = "";
        saveBtn.disabled = true;

        let res;

        try {
          res = await fetchWithTimeout("/api/admin/user-label", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              userId: conv.userId,
              label: input.value.trim()
            })
          });
        } catch {
          feedback.textContent = "Erreur reseau";
          saveBtn.disabled = false;
          return;
        }

        const response = await readAdminJsonResponse(res);

        if (response.redirectedToLogin) {
          return;
        }

        if (!res.ok) {
          feedback.textContent = typeof response.data?.error === "string" ? response.data.error : (res.status === 400 ? "Requete invalide" : "Erreur serveur");
          saveBtn.disabled = false;
          return;
        }

        if (!response.isJson) {
          feedback.textContent = "Reponse serveur invalide";
          saveBtn.disabled = false;
          return;
        }
        
        overlay.remove();
        
        const card = document.querySelector(`.item[data-conv-id="${conv.id}"]`);
        if (card) {
          const mainLine = card.firstChild;
          if (mainLine) {
            const updatedDate = new Date(conv.updatedAt || conv.createdAt);
            const formattedDate = updatedDate.toLocaleString("fr-FR", {
              day: "2-digit",
              month: "2-digit",
              year: "numeric",
              hour: "2-digit",
              minute: "2-digit"
            });
            
            mainLine.textContent =
              formattedDate + " — " + (input.value.trim() || conv.userId);
          }
        }
      };
      
      overlay.appendChild(id);
      overlay.appendChild(created);
      overlay.appendChild(input);
      overlay.appendChild(feedback);
      overlay.appendChild(saveBtn);
      
      overlay.onclick = (e) => {
        if (e.target === overlay) {
          overlay.remove();
        }
      };
      
      document.body.appendChild(overlay);
    }
    
    async function init() {
      setupRootBackToIndex();

      const list = document.getElementById("list");
      list.textContent = "Verification de la session admin...";

      const hasSession = await ensureAdminSession();
      if (!hasSession) {
        return;
      }
      
      const conversationId = getConversationIdFromUrl();
      const backBtn = document.getElementById("backBtn");
      const conversationMeta = document.getElementById("conversationMeta");
      const title = document.querySelector("h1");
      
      if (conversationId) {
        title.textContent = "Messages";
        backBtn.style.display = "block";
        conversationMeta.style.display = "block";
        conversationMeta.textContent = "Conversation : " + conversationId;
        await loadMessages(conversationId);
      } else {
        title.textContent = "Conversations";
        backBtn.style.display = "none";
        conversationMeta.style.display = "none";
        conversationMeta.textContent = "";
        await loadConversations();
      }
    }

    function renderInitError(error) {
      const list = document.getElementById("list");
      const message = error && error.message ? error.message : String(error || "Erreur inconnue");
      list.innerHTML = '<div class="error">Erreur d\'initialisation admin: ' + message + '</div>';
    }

    window.addEventListener("error", event => {
      renderInitError(event.error || event.message || "Erreur JavaScript");
    });

    window.addEventListener("unhandledrejection", event => {
      renderInitError(event.reason || "Promesse rejetee");
    });

    document.addEventListener("DOMContentLoaded", () => {
      init().catch(renderInitError);
    });
  </script>
</body>

</html>
